// =============================================================================
// ftgo-common-jpa — Shared JPA library for FTGO microservices
// Contains common JPA configurations, ORM mappings, and persistence utilities
// Migrated from monolith module: ftgo-common-jpa
// =============================================================================

version = '1.0.0'

apply plugin: 'maven-publish'
apply plugin: 'ftgo.quality-gate-conventions'

dependencies {
    compile project(':shared-ftgo-common')
    compile "org.springframework.boot:spring-boot-starter-data-jpa:$springBootVersion"

    testCompile "org.springframework.boot:spring-boot-starter-test:$springBootVersion"
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java

            groupId = 'net.chrisrichardson.ftgo'
            artifactId = 'ftgo-common-jpa'
            version = project.version

            pom {
                name = 'FTGO Common JPA Library'
                description = 'Shared JPA library for FTGO microservices containing ORM mappings, persistence utilities, and common JPA configurations.'
            }
        }
    }

    repositories {
        maven {
            name = 'local'
            url = "${rootProject.buildDir}/repo"
        }
    }
}
