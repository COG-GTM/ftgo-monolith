# ============================================================
# FTGO Logging Library - Default Configuration
# ============================================================
# These defaults are applied when the 'logging' Spring profile
# is active or when the library is on the classpath.
#
# Override in service-specific application.properties or via
# environment variables (e.g., FTGO_LOGGING_JSON_ENABLED).
# ============================================================

# --- Logging Core ---
# Enable centralized logging auto-configuration
ftgo.logging.enabled=true

# --- JSON Format ---
# Enable structured JSON log output via logstash-logback-encoder
ftgo.logging.json.enabled=true
ftgo.logging.json.include-caller-data=false
ftgo.logging.json.include-mdc=true

# --- Correlation ID ---
# Extract/generate correlation ID from API Gateway header
ftgo.logging.correlation-id.enabled=true
ftgo.logging.correlation-id.header-name=X-Correlation-ID
ftgo.logging.correlation-id.mdc-key=correlationId
ftgo.logging.correlation-id.generate-if-missing=true

# --- Async Appender ---
# Wrap log appender in async for non-blocking output
ftgo.logging.async.enabled=true
ftgo.logging.async.queue-size=1024
ftgo.logging.async.discarding-threshold=0
ftgo.logging.async.max-flush-time=5000

# --- Elasticsearch (direct shipping - disabled by default) ---
# Prefer Fluentd/Logstash collection over direct shipping
ftgo.logging.elasticsearch.enabled=false
ftgo.logging.elasticsearch.host=elasticsearch
ftgo.logging.elasticsearch.port=9200
ftgo.logging.elasticsearch.index-pattern=ftgo-logs-%d{yyyy.MM.dd}
