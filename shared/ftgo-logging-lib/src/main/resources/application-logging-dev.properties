# ============================================================
# FTGO Logging - Dev/Staging Profile
# ============================================================
# Activate with: spring.profiles.active=dev (or staging)
#
# Dev/staging uses structured JSON output for EFK integration
# with moderate log levels for debugging.
# ============================================================

# --- Logging Core ---
ftgo.logging.enabled=true
ftgo.logging.json.enabled=true
ftgo.logging.json.include-caller-data=false
ftgo.logging.json.include-mdc=true

# --- Correlation ID ---
ftgo.logging.correlation-id.enabled=true
ftgo.logging.correlation-id.generate-if-missing=true

# --- Async Appender ---
ftgo.logging.async.enabled=true
ftgo.logging.async.queue-size=1024
ftgo.logging.async.discarding-threshold=0

# --- Log Levels: INFO for app, WARN for frameworks ---
logging.level.com.ftgo=INFO
logging.level.org.springframework=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.org.apache.http=WARN
logging.level.org.elasticsearch=WARN
