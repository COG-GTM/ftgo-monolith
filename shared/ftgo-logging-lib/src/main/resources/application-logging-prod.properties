# ============================================================
# FTGO Logging - Production Profile
# ============================================================
# Activate with: spring.profiles.active=prod (or production)
#
# Production uses structured JSON output with optimized async
# settings and strict log levels to minimize noise.
# ============================================================

# --- Logging Core ---
ftgo.logging.enabled=true
ftgo.logging.json.enabled=true
ftgo.logging.json.include-caller-data=false
ftgo.logging.json.include-mdc=true

# --- Correlation ID ---
ftgo.logging.correlation-id.enabled=true
ftgo.logging.correlation-id.generate-if-missing=true

# --- Async Appender (production-tuned) ---
ftgo.logging.async.enabled=true
ftgo.logging.async.queue-size=2048
ftgo.logging.async.discarding-threshold=20
ftgo.logging.async.max-flush-time=10000

# --- Log Levels: INFO for app, ERROR for frameworks ---
logging.level.com.ftgo=INFO
logging.level.org.springframework=ERROR
logging.level.org.springframework.web=ERROR
logging.level.org.hibernate=ERROR
logging.level.org.apache.http=ERROR
logging.level.org.elasticsearch=ERROR
