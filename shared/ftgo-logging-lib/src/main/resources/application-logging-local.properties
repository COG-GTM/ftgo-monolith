# ============================================================
# FTGO Logging - Local Development Profile
# ============================================================
# Activate with: spring.profiles.active=local
#
# Local development uses human-readable console output with
# color-coded levels and file rotation for log review.
# ============================================================

# --- Logging Core ---
ftgo.logging.enabled=true
ftgo.logging.json.enabled=false
ftgo.logging.json.include-caller-data=true
ftgo.logging.json.include-mdc=true

# --- Correlation ID ---
ftgo.logging.correlation-id.enabled=true
ftgo.logging.correlation-id.generate-if-missing=true

# --- Async Appender (disabled for immediate output in dev) ---
ftgo.logging.async.enabled=false

# --- Log Levels: DEBUG for app, INFO for frameworks ---
logging.level.com.ftgo=DEBUG
logging.level.org.springframework=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.apache.http=INFO
