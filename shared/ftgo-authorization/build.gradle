// =============================================================================
// FTGO Authorization - Shared Role-Based Access Control Library Build Configuration
// =============================================================================
// Standalone, versioned shared library providing role-based authorization (RBAC)
// for all FTGO microservices. Contains role definitions, permission model,
// method-level security annotations, custom permission evaluator for resource
// ownership validation, and role hierarchy configuration.
//
// Package: net.chrisrichardson.ftgo.authorization
// Version: 1.0.0
//
// Future: When root Gradle is upgraded to 8.7+, replace this with convention plugins:
//   ftgo.java-conventions       - Java 17, UTF-8, standard repositories
//   ftgo.testing-conventions    - JUnit 5, Mockito, integration tests
//   ftgo.publishing-conventions - Maven publishing for shared libraries
// =============================================================================

version = '1.0.0'
group = 'net.chrisrichardson.ftgo'

apply plugin: 'maven-publish'

dependencies {
    // Spring Boot Security starter
    compile "org.springframework.boot:spring-boot-starter-security:$springBootVersion"

    // Spring Boot Web (for servlet support)
    compile "org.springframework.boot:spring-boot-starter-web:$springBootVersion"

    // Jackson JSON serialization (for error responses)
    compile group: 'com.fasterxml.jackson.core', name: 'jackson-databind', version: '2.9.7'

    // SLF4J for logging
    compile 'org.slf4j:slf4j-api:1.7.25'

    // FTGO JWT (for user context and token claims)
    compile project(':shared:ftgo-jwt')

    // Testing
    testCompile "org.springframework.boot:spring-boot-starter-test:$springBootVersion"
    testCompile "org.springframework.security:spring-security-test:5.0.6.RELEASE"
}

// ---------------------------------------------------------------------------
// Maven Publishing Configuration
// ---------------------------------------------------------------------------
// Publishes the library to the local Maven repository and a project-local repo.
// Usage:
//   ./gradlew :shared:ftgo-authorization:publishToMavenLocal
//   ./gradlew :shared:ftgo-authorization:publish
// ---------------------------------------------------------------------------

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java

            groupId = 'net.chrisrichardson.ftgo'
            artifactId = 'ftgo-authorization'
            version = '1.0.0'

            pom {
                name = 'FTGO Authorization Library'
                description = 'Role-based access control (RBAC) with role hierarchy, method-level security, custom permission evaluator, and resource ownership validation for FTGO microservices'
                url = 'https://github.com/COG-GTM/ftgo-monolith'

                licenses {
                    license {
                        name = 'The Apache License, Version 2.0'
                        url = 'http://www.apache.org/licenses/LICENSE-2.0.txt'
                    }
                }
            }
        }
    }
    repositories {
        maven {
            name = 'projectLocal'
            url = "${rootProject.buildDir}/repo"
        }
    }
}
