# ============================================================
# FTGO Tracing Library - Default Configuration
# ============================================================
# These defaults are applied when the 'tracing' Spring profile
# is active or when the library is on the classpath.
#
# Override in service-specific application.properties or via
# environment variables (e.g., MANAGEMENT_TRACING_SAMPLING_PROBABILITY).
# ============================================================

# --- Tracing Core ---
# Enable distributed tracing (disable with ftgo.tracing.enabled=false)
ftgo.tracing.enabled=true
ftgo.tracing.custom-spans-enabled=true

# --- Sampling ---
# Default: sample all requests (override per environment)
# Dev: 1.0 (100%), Staging: 0.5 (50%), Prod: 0.1 (10%)
management.tracing.sampling.probability=1.0

# --- Propagation ---
# B3 format for Zipkin compatibility (also supported by Jaeger)
management.tracing.propagation.type=b3

# --- Zipkin Reporter ---
# Default Zipkin endpoint (override for Jaeger OTLP or different host)
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans

# --- Logging ---
# Include traceId and spanId in log output
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
