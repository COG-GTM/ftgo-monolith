// =============================================================================
// ftgo-order-service-api — Order Service API DTOs for cross-service communication
// Contains request/response DTOs and event objects for the Order Service
// Migrated from monolith module: ftgo-order-service-api
// =============================================================================

version = '1.0.0'

apply plugin: 'maven-publish'

dependencies {
    compile project(':shared-ftgo-common')
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java

            groupId = 'net.chrisrichardson.ftgo'
            artifactId = 'ftgo-order-service-api'
            version = project.version

            pom {
                name = 'FTGO Order Service API'
                description = 'API DTOs and event objects for cross-service communication with the FTGO Order Service.'
            }
        }
    }

    repositories {
        maven {
            name = 'local'
            url = "${rootProject.buildDir}/repo"
        }
    }
}
