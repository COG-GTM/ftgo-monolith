// ============================================================
// ftgo-common-metrics - Shared observability and metrics library
// ============================================================
// Provides common Micrometer 1.12+ metrics configuration,
// custom business metric definitions, and Prometheus registry
// setup for all FTGO microservices.
//
// Package: com.ftgo.common.metrics
//
// Publishing:
//   ./gradlew :shared:ftgo-common-metrics:publishToMavenLocal
//   ./gradlew :shared:ftgo-common-metrics:publish
// ============================================================

apply plugin: 'maven-publish'

version = '1.0.0-SNAPSHOT'
group   = 'com.ftgo'

dependencies {
    // Spring Boot Actuator for metrics endpoint management
    compile "org.springframework.boot:spring-boot-starter-actuator:$springBootVersion"

    // Micrometer core + Prometheus registry
    compile "io.micrometer:micrometer-core:1.12.3"
    compile "io.micrometer:micrometer-registry-prometheus:1.12.3"

    // Spring context for @Configuration, @Bean, @ConditionalOnClass
    compile "org.springframework.boot:spring-boot-autoconfigure:$springBootVersion"
    compile "org.springframework:spring-context:5.3.31"

    // Test dependencies
    testCompile "org.springframework.boot:spring-boot-starter-test:$springBootVersion"
}

// ---------------------------------------------------------------------------
// Maven Publishing Configuration
// ---------------------------------------------------------------------------
publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java

            groupId    = 'com.ftgo'
            artifactId = 'ftgo-common-metrics'
            version    = project.version

            pom {
                name        = 'FTGO Common Metrics Library'
                description = 'Shared Micrometer metrics configuration and custom business metrics for the FTGO platform'
                url         = 'https://github.com/COG-GTM/ftgo-monolith'

                licenses {
                    license {
                        name = 'The Apache License, Version 2.0'
                        url  = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                    }
                }
            }
        }
    }

    repositories {
        maven {
            name = 'localRepo'
            url  = "${project.rootDir}/build/repo"
        }
    }
}
