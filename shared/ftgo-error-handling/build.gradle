// =============================================================================
// FTGO Error Handling - Shared Error Handling Library Build Configuration
// =============================================================================
// Standalone, versioned shared library providing centralized error handling
// for all FTGO microservices. Contains @ControllerAdvice-based global exception
// handler, standardized ErrorResponse DTO, error code constants, Bean Validation
// support, and inter-service communication error handling.
//
// Package: com.ftgo.errorhandling
// Version: 1.0.0
//
// Future: When root Gradle is upgraded to 8.7+, replace this with convention plugins:
//   ftgo.java-conventions       - Java 17, UTF-8, standard repositories
//   ftgo.testing-conventions    - JUnit 5, Mockito, integration tests
//   ftgo.publishing-conventions - Maven publishing for shared libraries
// =============================================================================

version = '1.0.0'
group = 'net.chrisrichardson.ftgo'

apply plugin: 'maven-publish'

dependencies {
    // Spring Boot Web (for @ControllerAdvice, @RestController, HttpStatus)
    compile "org.springframework.boot:spring-boot-starter-web:$springBootVersion"

    // Bean Validation API (javax.validation / jakarta.validation)
    compile "org.springframework.boot:spring-boot-starter-validation:$springBootVersion"

    // Jackson JSON serialization (for ErrorResponse serialization)
    compile group: 'com.fasterxml.jackson.core', name: 'jackson-databind', version: '2.9.7'
    compile "com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.9.7"

    // SLF4J for logging
    compile 'org.slf4j:slf4j-api:1.7.25'

    // FTGO shared libraries (optional - for handling FTGO-specific exceptions)
    compile project(":shared:ftgo-common")
    compile project(":shared:ftgo-domain")

    // Testing
    testCompile "org.springframework.boot:spring-boot-starter-test:$springBootVersion"
    testCompile "org.springframework.boot:spring-boot-starter-web:$springBootVersion"
}

// ---------------------------------------------------------------------------
// Maven Publishing Configuration
// ---------------------------------------------------------------------------
// Publishes the library to the local Maven repository and a project-local repo.
// Usage:
//   ./gradlew :shared:ftgo-error-handling:publishToMavenLocal
//   ./gradlew :shared:ftgo-error-handling:publish
// ---------------------------------------------------------------------------

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java

            groupId = 'net.chrisrichardson.ftgo'
            artifactId = 'ftgo-error-handling'
            version = '1.0.0'

            pom {
                name = 'FTGO Error Handling Library'
                description = 'Centralized error handling with @ControllerAdvice, standardized error responses, error codes, and Bean Validation for FTGO microservices'
                url = 'https://github.com/COG-GTM/ftgo-monolith'

                licenses {
                    license {
                        name = 'The Apache License, Version 2.0'
                        url = 'http://www.apache.org/licenses/LICENSE-2.0.txt'
                    }
                }
            }
        }
    }
    repositories {
        maven {
            name = 'projectLocal'
            url = "${rootProject.buildDir}/repo"
        }
    }
}
