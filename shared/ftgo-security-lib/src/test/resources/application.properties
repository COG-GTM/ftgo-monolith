# Test configuration for ftgo-security-lib
spring.application.name=ftgo-security-lib-test

# Expose actuator endpoints for testing
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always

# CORS test configuration
ftgo.security.cors.allowed-origins=http://localhost:3000,http://localhost:8080

# JWT test configuration
# This is a test-only 256-bit secret key — NEVER use in production
ftgo.security.jwt.secret=ftgo-test-secret-key-that-is-at-least-32-bytes-long-for-hs256
ftgo.security.jwt.expiration-ms=3600000
ftgo.security.jwt.refresh-expiration-ms=86400000
ftgo.security.jwt.issuer=ftgo-platform
ftgo.security.jwt.enabled=true
