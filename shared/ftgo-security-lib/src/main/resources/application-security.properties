# =============================================================================
# FTGO Security Library — Default Security Properties
# =============================================================================
# These defaults are loaded when the 'security' profile is active.
# Services can override any property in their own application.properties.

# --- CORS Configuration ---
ftgo.security.cors.allowed-origins=http://localhost:3000,http://localhost:8080
ftgo.security.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
ftgo.security.cors.allowed-headers=*
ftgo.security.cors.max-age=3600

# --- JWT Configuration ---
# Secret key MUST be provided via environment variable: FTGO_SECURITY_JWT_SECRET
# NEVER hardcode the secret in configuration files.
# Minimum 256-bit (32-byte) key required for HS256.
ftgo.security.jwt.secret=${FTGO_SECURITY_JWT_SECRET:}
ftgo.security.jwt.expiration-ms=3600000
ftgo.security.jwt.refresh-expiration-ms=86400000
ftgo.security.jwt.issuer=ftgo-platform
ftgo.security.jwt.enabled=true

# --- Actuator Endpoints ---
# Expose health and info endpoints by default
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
