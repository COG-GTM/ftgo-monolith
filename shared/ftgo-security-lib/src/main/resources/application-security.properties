# ============================================================
# FTGO Security - Default Security Profile Properties
# ============================================================
# Activate with: spring.profiles.active=security
# These properties provide sensible defaults for all microservices.
# Override in service-specific application.properties as needed.
# ============================================================

# --- CORS Configuration ---
# Default: allow all origins (development). Override in production.
ftgo.security.cors.allowed-origins=*
ftgo.security.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
ftgo.security.cors.allowed-headers=Authorization,Content-Type,X-Requested-With,Accept,Origin,X-Correlation-Id
ftgo.security.cors.exposed-headers=X-Correlation-Id
ftgo.security.cors.allow-credentials=false
ftgo.security.cors.max-age=3600

# --- Public Paths ---
# Endpoints that do not require authentication
ftgo.security.public-paths=/actuator/health,/actuator/info

# --- Actuator Security ---
# Expose only health and info by default; other endpoints require authentication
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when-authorized

# --- JWT Authentication ---
# Enable JWT authentication (disabled by default; falls back to HTTP Basic)
ftgo.security.jwt.enabled=false
# Token issuer (iss claim)
ftgo.security.jwt.issuer=ftgo-platform
# Access token lifetime (ISO-8601 duration)
ftgo.security.jwt.access-token-expiration=PT15M
# Refresh token lifetime (ISO-8601 duration)
ftgo.security.jwt.refresh-token-expiration=P7D
# Signing secret — NEVER hardcode! Inject via environment variable:
#   ftgo.security.jwt.secret=${JWT_SECRET}

# --- Datasource Credentials ---
# NEVER hardcode credentials. Use environment variables:
#   SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
# spring.datasource.username=${DB_USERNAME}
# spring.datasource.password=${DB_PASSWORD}
