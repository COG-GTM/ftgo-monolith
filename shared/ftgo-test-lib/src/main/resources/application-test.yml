# =============================================================================
# Shared test profile configuration for FTGO microservices
# =============================================================================
# This file is included automatically when @ActiveProfiles("test") is used.
# Services can override any of these settings in their own application-test.yml.
#
# Usage: Copy this file to your service's src/test/resources/ directory and
# customize as needed. Or rely on the defaults provided here.
# =============================================================================

spring:
  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# Logging
logging:
  level:
    root: WARN
    com.ftgo: DEBUG
    net.chrisrichardson.ftgo: DEBUG
    org.springframework.test: INFO
    org.testcontainers: INFO

# Actuator (minimal for tests)
management:
  endpoints:
    web:
      exposure:
        include: health
