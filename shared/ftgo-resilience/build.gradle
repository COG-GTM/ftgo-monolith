// =============================================================================
// FTGO Resilience - Shared Resilience Library Build Configuration
// =============================================================================
// Provides circuit breaker, retry, bulkhead, rate limiter, health indicators,
// service discovery, and graceful shutdown for all FTGO microservices.
// Uses Resilience4j with Spring Boot auto-configuration and Micrometer metrics.
//
// Package: com.ftgo.resilience
// Version: 1.0.0
//
// Future: When root Gradle is upgraded to 8.7+, replace this with convention plugins:
//   ftgo.java-conventions          - Java 17, UTF-8, standard repositories
//   ftgo.resilience-conventions    - Resilience4j, health checks, service discovery
//   ftgo.publishing-conventions    - Maven publishing for shared libraries
// =============================================================================

version = ftgoResilienceVersion
group = 'net.chrisrichardson.ftgo'

apply plugin: 'maven-publish'

dependencies {
    // Spring Boot base (for auto-configuration support)
    compile "org.springframework.boot:spring-boot-starter:$springBootVersion"

    // Spring Boot Actuator (health endpoints)
    compile "org.springframework.boot:spring-boot-starter-actuator:$springBootVersion"

    // Spring Boot Web (for REST client support)
    compile "org.springframework.boot:spring-boot-starter-web:$springBootVersion"

    // Resilience4j Spring Boot 2 starter (compatible with Spring Boot 2.x)
    compile 'io.github.resilience4j:resilience4j-spring-boot2:1.7.1'
    compile 'io.github.resilience4j:resilience4j-circuitbreaker:1.7.1'
    compile 'io.github.resilience4j:resilience4j-retry:1.7.1'
    compile 'io.github.resilience4j:resilience4j-bulkhead:1.7.1'
    compile 'io.github.resilience4j:resilience4j-ratelimiter:1.7.1'
    compile 'io.github.resilience4j:resilience4j-micrometer:1.7.1'

    // Micrometer for metrics
    compile "io.micrometer:micrometer-core:$micrometerVersion"

    // SLF4J API
    compile 'org.slf4j:slf4j-api:1.7.25'

    // Testing
    testCompile "org.springframework.boot:spring-boot-starter-test:$springBootVersion"
}

// ---------------------------------------------------------------------------
// Maven Publishing Configuration
// ---------------------------------------------------------------------------
publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java

            groupId = 'net.chrisrichardson.ftgo'
            artifactId = 'ftgo-resilience'
            version = ftgoResilienceVersion

            pom {
                name = 'FTGO Resilience Library'
                description = 'Circuit breaker, retry, bulkhead, rate limiter, health indicators, and service discovery for FTGO microservices'
                url = 'https://github.com/COG-GTM/ftgo-monolith'

                licenses {
                    license {
                        name = 'The Apache License, Version 2.0'
                        url = 'http://www.apache.org/licenses/LICENSE-2.0.txt'
                    }
                }
            }
        }
    }
    repositories {
        maven {
            name = 'projectLocal'
            url = "${rootProject.buildDir}/repo"
        }
    }
}
