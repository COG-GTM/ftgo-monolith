# =============================================================================
# FTGO OpenAPI Library - Default Configuration
# =============================================================================
# These properties provide sensible defaults for SpringDoc OpenAPI 3.
# Services can override any of these in their own application.properties
# or application.yml.
#
# To use: add @PropertySource("classpath:ftgo-openapi-defaults.properties")
# or rely on the auto-configuration in FtgoOpenApiAutoConfiguration.
# =============================================================================

# --- SpringDoc Configuration ---
# Enable SpringDoc OpenAPI
springdoc.api-docs.enabled=true

# OpenAPI JSON endpoint
springdoc.api-docs.path=/v3/api-docs

# Swagger UI path (SpringDoc serves at /swagger-ui/index.html by default)
springdoc.swagger-ui.path=/swagger-ui.html

# Sort operations alphabetically
springdoc.swagger-ui.operationsSorter=alpha

# Sort tags alphabetically
springdoc.swagger-ui.tagsSorter=alpha

# Disable try-it-out by default (enable per-service as needed)
springdoc.swagger-ui.tryItOutEnabled=false

# Show request duration in Swagger UI
springdoc.swagger-ui.displayRequestDuration=true

# Display operation ID in Swagger UI
springdoc.swagger-ui.displayOperationId=false

# Default models expansion depth
springdoc.swagger-ui.defaultModelsExpandDepth=1

# Default model expansion depth
springdoc.swagger-ui.defaultModelExpandDepth=2

# --- Date/Time Format ---
# All dates/times should use ISO 8601 format
spring.jackson.date-format=com.fasterxml.jackson.databind.util.StdDateFormat
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
