# Test configuration for ftgo-resilience-lib
spring.application.name=ftgo-resilience-test

# Resilience4j test overrides
ftgo.resilience.enabled=true
ftgo.resilience.circuit-breaker.wait-duration-in-open-state-seconds=1
ftgo.resilience.retry.initial-interval-millis=50
ftgo.resilience.shutdown.timeout-seconds=5

# Disable downstream health checks in tests (no real services)
ftgo.resilience.health.downstream-checks-enabled=false

# Use local development discovery overrides
ftgo.resilience.discovery.namespace=test
