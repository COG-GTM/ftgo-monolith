# =============================================================================
# FTGO Resilience Library — Default Configuration
# =============================================================================
# These defaults are loaded automatically when ftgo-resilience-lib is on the
# classpath. Services can override any property in their own application.properties.
# =============================================================================

# --- Actuator Health Probes (K8s) ---
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=readinessState,db,diskSpace,downstreamServices

# --- Actuator Endpoints ---
management.endpoints.web.exposure.include=health,info,metrics,prometheus,circuitbreakers,retries,bulkheads,ratelimiters

# --- Graceful Shutdown ---
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# --- Resilience4j Circuit Breaker Defaults ---
ftgo.resilience.circuit-breaker.failure-rate-threshold=50
ftgo.resilience.circuit-breaker.sliding-window-size=10
ftgo.resilience.circuit-breaker.minimum-number-of-calls=5
ftgo.resilience.circuit-breaker.wait-duration-in-open-state=30s
ftgo.resilience.circuit-breaker.permitted-number-of-calls-in-half-open-state=3
ftgo.resilience.circuit-breaker.automatic-transition-from-open-to-half-open-enabled=true

# --- Resilience4j Retry Defaults ---
ftgo.resilience.retry.max-attempts=3
ftgo.resilience.retry.wait-duration=1s
ftgo.resilience.retry.multiplier=2.0
ftgo.resilience.retry.exponential-backoff=true

# --- Resilience4j Bulkhead Defaults ---
ftgo.resilience.bulkhead.max-concurrent-calls=25
ftgo.resilience.bulkhead.max-wait-duration=0s

# --- Resilience4j Rate Limiter Defaults ---
ftgo.resilience.rate-limiter.limit-for-period=50
ftgo.resilience.rate-limiter.limit-refresh-period=1s
ftgo.resilience.rate-limiter.timeout-duration=500ms

# --- K8s Service Discovery Defaults ---
ftgo.discovery.namespace=default
ftgo.discovery.cluster-domain=cluster.local
