# ============================================================
# FTGO Resilience Library - Default Configuration
# ============================================================
# These defaults are applied when the 'resilience' Spring profile
# is active or when the library is on the classpath.
#
# Override in service-specific application.properties or via
# environment variables.
# ============================================================

# --- Resilience Core ---
ftgo.resilience.enabled=true

# --- Health Checks ---
ftgo.resilience.health.enabled=true
ftgo.resilience.health.downstream-checks-enabled=true
ftgo.resilience.health.downstream-timeout-seconds=5
ftgo.resilience.health.disk-space-enabled=true
ftgo.resilience.health.disk-space-threshold-mb=100

# --- Actuator Health Probes (K8s Readiness/Liveness) ---
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.health.group.readiness.include=readinessState,db,diskSpace,downstreamService
management.endpoint.health.group.readiness.show-details=always
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.liveness.show-details=always

# --- Actuator Endpoints ---
management.endpoints.web.exposure.include=health,info,metrics,prometheus,circuitbreakers,retries,bulkheads,ratelimiters

# --- Circuit Breaker Defaults ---
ftgo.resilience.circuit-breaker.failure-rate-threshold=50
ftgo.resilience.circuit-breaker.minimum-number-of-calls=5
ftgo.resilience.circuit-breaker.permitted-number-of-calls-in-half-open-state=3
ftgo.resilience.circuit-breaker.wait-duration-in-open-state-seconds=30
ftgo.resilience.circuit-breaker.sliding-window-size=10
ftgo.resilience.circuit-breaker.sliding-window-type=COUNT_BASED
ftgo.resilience.circuit-breaker.slow-call-duration-threshold-seconds=2
ftgo.resilience.circuit-breaker.slow-call-rate-threshold=80

# --- Resilience4j Circuit Breaker (native config) ---
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=30s
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true

# --- Retry Defaults ---
ftgo.resilience.retry.max-attempts=3
ftgo.resilience.retry.initial-interval-millis=1000
ftgo.resilience.retry.multiplier=2.0
ftgo.resilience.retry.max-interval-millis=8000

# --- Resilience4j Retry (native config) ---
resilience4j.retry.configs.default.maxAttempts=3
resilience4j.retry.configs.default.waitDuration=1s
resilience4j.retry.configs.default.enableExponentialBackoff=true
resilience4j.retry.configs.default.exponentialBackoffMultiplier=2.0

# --- Bulkhead Defaults ---
ftgo.resilience.bulkhead.max-concurrent-calls=25
ftgo.resilience.bulkhead.max-wait-duration-millis=500

# --- Resilience4j Bulkhead (native config) ---
resilience4j.bulkhead.configs.default.maxConcurrentCalls=25
resilience4j.bulkhead.configs.default.maxWaitDuration=500ms

# --- Rate Limiter Defaults ---
ftgo.resilience.rate-limiter.limit-for-period=50
ftgo.resilience.rate-limiter.limit-refresh-period-millis=1000
ftgo.resilience.rate-limiter.timeout-duration-millis=500

# --- Resilience4j Rate Limiter (native config) ---
resilience4j.ratelimiter.configs.default.limitForPeriod=50
resilience4j.ratelimiter.configs.default.limitRefreshPeriod=1s
resilience4j.ratelimiter.configs.default.timeoutDuration=500ms

# --- Service Discovery ---
ftgo.resilience.discovery.enabled=true
ftgo.resilience.discovery.namespace=ftgo
ftgo.resilience.discovery.cluster-domain=svc.cluster.local

# --- Graceful Shutdown ---
ftgo.resilience.shutdown.enabled=true
ftgo.resilience.shutdown.timeout-seconds=30
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
