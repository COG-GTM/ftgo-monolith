// =============================================================================
// FTGO Security - Shared Security Library Build Configuration
// =============================================================================
// Standalone, versioned shared library providing Spring Security foundation
// configuration for all FTGO microservices. Contains base SecurityFilterChain,
// CORS configuration, CSRF strategy, actuator endpoint security, exception
// handlers, and security utility classes.
//
// Package: net.chrisrichardson.ftgo.security
// Version: 1.0.0
//
// Future: When root Gradle is upgraded to 8.7+, replace this with convention plugins:
//   ftgo.java-conventions       - Java 17, UTF-8, standard repositories
//   ftgo.testing-conventions    - JUnit 5, Mockito, integration tests
//   ftgo.publishing-conventions - Maven publishing for shared libraries
// =============================================================================

version = '1.0.0'
group = 'net.chrisrichardson.ftgo'

apply plugin: 'maven-publish'

dependencies {
    // Spring Boot Security starter
    compile "org.springframework.boot:spring-boot-starter-security:$springBootVersion"

    // Spring Boot Web (for CORS, exception handling)
    compile "org.springframework.boot:spring-boot-starter-web:$springBootVersion"

    // Spring Boot Actuator (for actuator endpoint security)
    compile "org.springframework.boot:spring-boot-starter-actuator:$springBootVersion"

    // Jackson JSON serialization (for error responses)
    compile group: 'com.fasterxml.jackson.core', name: 'jackson-databind', version: '2.9.7'
    compile "com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.9.7"

    // Testing
    testCompile "org.springframework.boot:spring-boot-starter-test:$springBootVersion"
    testCompile "org.springframework.security:spring-security-test:5.0.6.RELEASE"
}

// ---------------------------------------------------------------------------
// Maven Publishing Configuration
// ---------------------------------------------------------------------------
// Publishes the library to the local Maven repository and a project-local repo.
// Usage:
//   ./gradlew :shared:ftgo-security:publishToMavenLocal
//   ./gradlew :shared:ftgo-security:publish
// ---------------------------------------------------------------------------

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java

            groupId = 'net.chrisrichardson.ftgo'
            artifactId = 'ftgo-security'
            version = '1.0.0'

            pom {
                name = 'FTGO Security Library'
                description = 'Shared Spring Security configuration, CORS, CSRF, actuator security, exception handlers, and utilities for FTGO microservices'
                url = 'https://github.com/COG-GTM/ftgo-monolith'

                licenses {
                    license {
                        name = 'The Apache License, Version 2.0'
                        url = 'http://www.apache.org/licenses/LICENSE-2.0.txt'
                    }
                }
            }
        }
    }
    repositories {
        maven {
            name = 'projectLocal'
            url = "${rootProject.buildDir}/repo"
        }
    }
}
