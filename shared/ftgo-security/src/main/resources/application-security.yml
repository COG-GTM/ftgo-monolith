# =============================================================================
# FTGO Security - Default Security Profile Configuration
# =============================================================================
# This profile provides sensible security defaults for all FTGO microservices.
# Activate with: spring.profiles.active=security
#
# Override any property in your service's application.yml or via environment
# variables (e.g., FTGO_SECURITY_CORS_ALLOWED_ORIGINS=http://prod-gateway.ftgo.com)
# =============================================================================

ftgo:
  security:
    # Public paths accessible without authentication
    public-paths:
      - /actuator/health
      - /actuator/health/**
      - /actuator/info

    # CORS configuration
    cors:
      enabled: true
      allowed-origins:
        - http://localhost:3000
        - http://localhost:8080
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      allowed-headers:
        - Authorization
        - Content-Type
        - Accept
        - Origin
        - X-Requested-With
        - X-XSRF-TOKEN
      exposed-headers:
        - Authorization
        - X-Total-Count
      allow-credentials: true
      max-age: 3600
      pattern: "/**"

    # Actuator endpoint security
    actuator:
      public-endpoints:
        - health
        - info

# Actuator endpoint exposure
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
