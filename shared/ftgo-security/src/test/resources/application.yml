# Test configuration for security integration tests
ftgo:
  security:
    public-paths:
      - /actuator/health
      - /actuator/health/**
      - /actuator/info
    cors:
      enabled: true
      allowed-origins:
        - http://localhost:3000
        - http://localhost:8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
