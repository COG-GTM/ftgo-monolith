groups:
  - name: ftgo-service-alerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) / rate(http_server_requests_seconds_count[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on {{ $labels.application }}"
          description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.application }}"

      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(http_server_requests_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p99 latency on {{ $labels.application }}"
          description: "p99 latency is {{ $value }}s on {{ $labels.application }}"

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"

  - name: ftgo-business-alerts
    rules:
      - alert: HighOrderFailureRate
        expr: rate(ftgo_order_failed_total[5m]) / rate(ftgo_order_created_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High order failure rate"
          description: "Order failure rate is {{ $value | humanizePercentage }}"

      - alert: HighTicketRejectionRate
        expr: rate(ftgo_restaurant_tickets_rejected_total[5m]) / rate(ftgo_restaurant_tickets_created_total[5m]) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High ticket rejection rate"
          description: "Ticket rejection rate is {{ $value | humanizePercentage }}"

      - alert: HighDeliveryFailureRate
        expr: rate(ftgo_courier_deliveries_failed_total[5m]) / rate(ftgo_courier_deliveries_assigned_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High delivery failure rate"
          description: "Delivery failure rate is {{ $value | humanizePercentage }}"

      - alert: HighConsumerValidationFailureRate
        expr: rate(ftgo_consumer_validations_failed_total[5m]) / rate(ftgo_consumer_validations_total[5m]) > 0.15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High consumer validation failure rate"
          description: "Consumer validation failure rate is {{ $value | humanizePercentage }}"
