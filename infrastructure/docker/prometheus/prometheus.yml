# ============================================================
# FTGO Platform - Prometheus Configuration
# ============================================================
# Scrape configuration for all FTGO microservices.
# Each service exposes metrics at /actuator/prometheus.
#
# Usage:
#   docker-compose -f docker-compose.monitoring.yml up
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    cluster: 'ftgo-local'
    environment: 'development'

# Alert manager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

# Load alerting rules
rule_files:
  - '/etc/prometheus/alerts/*.yml'

# Scrape configurations
scrape_configs:
  # ----------------------------------------------------------
  # Prometheus self-monitoring
  # ----------------------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # ----------------------------------------------------------
  # FTGO Order Service
  # ----------------------------------------------------------
  - job_name: 'ftgo-order-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['ftgo-order-service:8081']
        labels:
          service: 'order-service'
          bounded_context: 'order'

  # ----------------------------------------------------------
  # FTGO Consumer Service
  # ----------------------------------------------------------
  - job_name: 'ftgo-consumer-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['ftgo-consumer-service:8082']
        labels:
          service: 'consumer-service'
          bounded_context: 'consumer'

  # ----------------------------------------------------------
  # FTGO Restaurant Service
  # ----------------------------------------------------------
  - job_name: 'ftgo-restaurant-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['ftgo-restaurant-service:8083']
        labels:
          service: 'restaurant-service'
          bounded_context: 'restaurant'

  # ----------------------------------------------------------
  # FTGO Courier Service
  # ----------------------------------------------------------
  - job_name: 'ftgo-courier-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['ftgo-courier-service:8084']
        labels:
          service: 'courier-service'
          bounded_context: 'courier'
