# ============================================================
# FTGO Platform - Fluentd Configuration
# ============================================================
# Collects structured JSON logs from FTGO microservices,
# enriches them with metadata, and forwards to Elasticsearch.
#
# Log Flow:
#   Docker container stdout (JSON) -> Fluentd -> Elasticsearch
#
# Index naming:  ftgo-logs-YYYY.MM.DD
# ============================================================

# ----------------------------------------------------------
# Input: Docker Fluentd Log Driver (TCP/UDP)
# ----------------------------------------------------------
# Receives logs from containers configured with:
#   logging:
#     driver: fluentd
#     options:
#       fluentd-address: localhost:24224
#       tag: ftgo.{{.Name}}
# ----------------------------------------------------------
<source>
  @type forward
  port 24224
  bind 0.0.0.0
  <transport tcp>
  </transport>
</source>

# ----------------------------------------------------------
# Input: HTTP (for health checks and direct submission)
# ----------------------------------------------------------
<source>
  @type http
  port 9880
  bind 0.0.0.0
</source>

# ----------------------------------------------------------
# Filter: Parse JSON log messages from FTGO services
# ----------------------------------------------------------
# Docker containers emit logs as {"log": "<JSON>", "stream": "stdout", ...}
# This filter parses the inner JSON from the "log" field.
# ----------------------------------------------------------
<filter ftgo.**>
  @type parser
  key_name log
  reserve_data true
  remove_key_name_field true
  <parse>
    @type json
    time_key @timestamp
    time_format %Y-%m-%dT%H:%M:%S.%L%Z
    keep_time_key true
  </parse>
</filter>

# ----------------------------------------------------------
# Filter: Add Kubernetes/container metadata
# ----------------------------------------------------------
<filter ftgo.**>
  @type record_transformer
  <record>
    environment "#{ENV['FTGO_ENVIRONMENT'] || 'development'}"
    hostname "#{Socket.gethostname}"
  </record>
</filter>

# ----------------------------------------------------------
# Output: Elasticsearch
# ----------------------------------------------------------
# Sends parsed and enriched log entries to Elasticsearch.
# Logs are indexed by date for easy retention management.
# ----------------------------------------------------------
<match ftgo.**>
  @type elasticsearch
  host elasticsearch
  port 9200
  logstash_format true
  logstash_prefix ftgo-logs
  logstash_dateformat %Y.%m.%d
  include_tag_key true
  tag_key fluentd_tag
  type_name _doc
  # Retry configuration
  reconnect_on_error true
  reload_on_failure true
  reload_connections false
  request_timeout 15s
  # Buffering
  <buffer>
    @type file
    path /fluentd/buffer/elasticsearch
    flush_mode interval
    flush_interval 5s
    flush_thread_count 2
    retry_type exponential_backoff
    retry_wait 1s
    retry_max_interval 60s
    retry_forever true
    chunk_limit_size 8m
    queue_limit_length 256
    overflow_action block
  </buffer>
</match>

# ----------------------------------------------------------
# Output: Catch-all (non-FTGO logs go to stdout)
# ----------------------------------------------------------
<match **>
  @type stdout
</match>
