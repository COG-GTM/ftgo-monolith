apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer-service
spec:
  template:
    spec:
      containers:
        - name: consumer-service
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
