# Production: Higher resource limits
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftgo-order-service
spec:
  template:
    spec:
      containers:
        - name: ftgo-order-service
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
