# ============================================================
# Production Environment - Log Retention Patch (90 days)
# ============================================================
# Overrides the Elasticsearch ILM policy for production.
# Logs are retained for 90 days with warm/cold tiers.
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: elasticsearch-ilm-config
  namespace: ftgo-prod
data:
  ilm-policy.json: |
    {
      "policy": {
        "phases": {
          "hot": {
            "min_age": "0ms",
            "actions": {
              "rollover": {
                "max_size": "10gb",
                "max_age": "1d"
              },
              "set_priority": {
                "priority": 100
              }
            }
          },
          "warm": {
            "min_age": "7d",
            "actions": {
              "forcemerge": {
                "max_num_segments": 1
              },
              "shrink": {
                "number_of_shards": 1
              },
              "set_priority": {
                "priority": 50
              }
            }
          },
          "cold": {
            "min_age": "30d",
            "actions": {
              "set_priority": {
                "priority": 0
              }
            }
          },
          "delete": {
            "min_age": "90d",
            "actions": {
              "delete": {}
            }
          }
        }
      }
    }
