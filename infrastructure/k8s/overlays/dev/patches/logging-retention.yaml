# ============================================================
# Dev Environment - Log Retention Patch (7 days)
# ============================================================
# Overrides the Elasticsearch ILM policy for development.
# Logs are retained for 7 days before deletion.
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: elasticsearch-ilm-config
  namespace: ftgo
data:
  ilm-policy.json: |
    {
      "policy": {
        "phases": {
          "hot": {
            "min_age": "0ms",
            "actions": {
              "rollover": {
                "max_size": "2gb",
                "max_age": "1d"
              },
              "set_priority": {
                "priority": 100
              }
            }
          },
          "delete": {
            "min_age": "7d",
            "actions": {
              "delete": {}
            }
          }
        }
      }
    }
