# Staging: INFO-level logging, moderate pool sizes
apiVersion: v1
kind: ConfigMap
metadata:
  name: ftgo-order-service-config
data:
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_COM_FTGO: "INFO"
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "10"
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "5"
