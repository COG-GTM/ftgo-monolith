# ============================================================
# Staging Environment - Log Retention Patch (30 days)
# ============================================================
# Overrides the Elasticsearch ILM policy for staging.
# Logs are retained for 30 days before deletion.
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: elasticsearch-ilm-config
  namespace: ftgo-staging
data:
  ilm-policy.json: |
    {
      "policy": {
        "phases": {
          "hot": {
            "min_age": "0ms",
            "actions": {
              "rollover": {
                "max_size": "5gb",
                "max_age": "1d"
              },
              "set_priority": {
                "priority": 100
              }
            }
          },
          "warm": {
            "min_age": "7d",
            "actions": {
              "forcemerge": {
                "max_num_segments": 1
              },
              "set_priority": {
                "priority": 50
              }
            }
          },
          "delete": {
            "min_age": "30d",
            "actions": {
              "delete": {}
            }
          }
        }
      }
    }
