# Staging: Moderate resource limits (between dev and prod)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftgo-order-service
spec:
  template:
    spec:
      containers:
        - name: ftgo-order-service
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
