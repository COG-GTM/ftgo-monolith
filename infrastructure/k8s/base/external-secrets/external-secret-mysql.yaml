# ============================================================
# ExternalSecret - MySQL Credentials
# ============================================================
# Creates ftgo-mysql-secret from an external secrets provider.
# Replaces the hardcoded Secret in mysql/secret.yaml when
# external-secrets operator is installed and configured.
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ftgo-mysql-external-secret
  labels:
    app.kubernetes.io/name: ftgo-mysql
    app.kubernetes.io/component: secret-management
    app.kubernetes.io/part-of: ftgo-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ftgo-secret-store
    kind: ClusterSecretStore
  target:
    name: ftgo-mysql-secret
    creationPolicy: Owner
  data:
    - secretKey: root-password
      remoteRef:
        key: /ftgo/mysql/root-password
    - secretKey: username
      remoteRef:
        key: /ftgo/mysql/username
    - secretKey: password
      remoteRef:
        key: /ftgo/mysql/password
