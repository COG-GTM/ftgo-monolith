# ============================================================
# ExternalSecret - ClusterSecretStore Template
# ============================================================
# Template for integrating with an external secrets provider
# (e.g., AWS Secrets Manager, HashiCorp Vault, Azure Key Vault).
#
# Prerequisites:
#   1. Install external-secrets operator:
#      helm install external-secrets external-secrets/external-secrets \
#        -n external-secrets --create-namespace
#   2. Configure provider credentials
#   3. Apply this ClusterSecretStore
#
# Supported backends:
#   - AWS Secrets Manager
#   - HashiCorp Vault
#   - Azure Key Vault
#   - GCP Secret Manager
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: ftgo-secret-store
  labels:
    app.kubernetes.io/part-of: ftgo-platform
    app.kubernetes.io/component: secret-management
spec:
  provider:
    # === AWS Secrets Manager (uncomment to use) ===
    # aws:
    #   service: SecretsManager
    #   region: us-east-1
    #   auth:
    #     jwt:
    #       serviceAccountRef:
    #         name: external-secrets-sa
    #         namespace: external-secrets

    # === HashiCorp Vault (default template) ===
    fake:
      data:
        - key: "/ftgo/mysql/root-password"
          value: "placeholder"
        - key: "/ftgo/mysql/username"
          value: "placeholder"
        - key: "/ftgo/mysql/password"
          value: "placeholder"
        - key: "/ftgo/services/db-username"
          value: "placeholder"
        - key: "/ftgo/services/db-password"
          value: "placeholder"
