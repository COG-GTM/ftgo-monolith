# ============================================================
# ExternalSecrets - Service Database Credentials
# ============================================================
# Creates per-service DB secrets from an external secrets provider.
# Replaces hardcoded Secret resources when external-secrets
# operator is installed and configured.
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ftgo-order-db-external-secret
  labels:
    app.kubernetes.io/name: ftgo-order-service
    app.kubernetes.io/component: secret-management
    app.kubernetes.io/part-of: ftgo-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ftgo-secret-store
    kind: ClusterSecretStore
  target:
    name: ftgo-order-db-secret
    creationPolicy: Owner
  data:
    - secretKey: url
      remoteRef:
        key: /ftgo/order-service/db-url
    - secretKey: username
      remoteRef:
        key: /ftgo/services/db-username
    - secretKey: password
      remoteRef:
        key: /ftgo/services/db-password
---
