# ============================================================
# Elasticsearch Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: ftgo
  labels:
    app: elasticsearch
    app.kubernetes.io/name: elasticsearch
    app.kubernetes.io/component: logging
    app.kubernetes.io/part-of: ftgo-platform
spec:
  type: ClusterIP
  ports:
    - port: 9200
      targetPort: 9200
      name: http
    - port: 9300
      targetPort: 9300
      name: transport
  selector:
    app: elasticsearch
