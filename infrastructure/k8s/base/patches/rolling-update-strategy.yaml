# ============================================================
# Rolling Update Strategy Patch
# ============================================================
# Applied to all Deployments to ensure zero-downtime deployments.
# - maxSurge: 1 - allows one extra pod during rollout
# - maxUnavailable: 0 - never reduce below desired count
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftgo-order-service
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  minReadySeconds: 10
  revisionHistoryLimit: 5
