# ============================================================
# FTGO Courier Service - Deployment + Service
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftgo-courier-service
  labels:
    app: ftgo-courier-service
    app.kubernetes.io/name: ftgo-courier-service
    app.kubernetes.io/component: service
    version: "1.0.0"
    team: ftgo-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ftgo-courier-service
  template:
    metadata:
      labels:
        app: ftgo-courier-service
        app.kubernetes.io/name: ftgo-courier-service
        version: "1.0.0"
    spec:
      containers:
        - name: ftgo-courier-service
          image: ftgo/ftgo-courier-service:latest
          ports:
            - containerPort: 8084
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: ftgo-courier-db-secret
                  key: url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ftgo-courier-db-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ftgo-courier-db-secret
                  key: password
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ftgo-courier-service
  labels:
    app: ftgo-courier-service
    app.kubernetes.io/name: ftgo-courier-service
    app.kubernetes.io/component: service
spec:
  type: ClusterIP
  ports:
    - port: 8084
      targetPort: 8084
      protocol: TCP
      name: http
  selector:
    app: ftgo-courier-service
