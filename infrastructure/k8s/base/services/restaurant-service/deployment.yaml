# ============================================================
# FTGO Restaurant Service - Deployment + Service
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftgo-restaurant-service
  labels:
    app: ftgo-restaurant-service
    app.kubernetes.io/name: ftgo-restaurant-service
    app.kubernetes.io/component: service
    version: "1.0.0"
    team: ftgo-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ftgo-restaurant-service
  template:
    metadata:
      labels:
        app: ftgo-restaurant-service
        app.kubernetes.io/name: ftgo-restaurant-service
        version: "1.0.0"
    spec:
      containers:
        - name: ftgo-restaurant-service
          image: ftgo/ftgo-restaurant-service:latest
          ports:
            - containerPort: 8083
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: ftgo-restaurant-db-secret
                  key: url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ftgo-restaurant-db-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ftgo-restaurant-db-secret
                  key: password
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
      terminationGracePeriodSeconds: 45
---
apiVersion: v1
kind: Service
metadata:
  name: ftgo-restaurant-service
  labels:
    app: ftgo-restaurant-service
    app.kubernetes.io/name: ftgo-restaurant-service
    app.kubernetes.io/component: service
spec:
  type: ClusterIP
  ports:
    - port: 8083
      targetPort: 8083
      protocol: TCP
      name: http
  selector:
    app: ftgo-restaurant-service
