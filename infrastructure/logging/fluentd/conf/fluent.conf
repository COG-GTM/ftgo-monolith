<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

<filter ftgo.**>
  @type record_transformer
  <record>
    cluster ftgo
    environment ${tag_parts[1]}
  </record>
</filter>

<match ftgo.**>
  @type elasticsearch
  host elasticsearch
  port 9200
  logstash_format true
  logstash_prefix ftgo-logs
  include_tag_key true
  flush_interval 5s
  retry_limit 5
  retry_wait 1s
</match>
