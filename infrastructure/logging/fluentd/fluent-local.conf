# =============================================================================
# Fluentd Configuration for FTGO Local Development (Docker Compose)
# =============================================================================
# Simplified configuration for local development without Kubernetes.
# Receives logs via the fluentd logging driver or forward input on port 24224.
# =============================================================================

# -----------------------------------------------------------------------
# Source: Forward input (Docker Compose / direct forwarding)
# -----------------------------------------------------------------------
<source>
  @type forward
  port 24224
  bind 0.0.0.0
  tag ftgo
</source>

# -----------------------------------------------------------------------
# Filter: Parse JSON from Docker Compose forward input
# -----------------------------------------------------------------------
<filter ftgo.**>
  @type parser
  key_name log
  reserve_data true
  remove_key_name_field false
  emit_invalid_record_to_error false
  <parse>
    @type json
    time_key @timestamp
    time_format %Y-%m-%dT%H:%M:%S.%L%z
    keep_time_key true
  </parse>
</filter>

# -----------------------------------------------------------------------
# Filter: Add environment tag
# -----------------------------------------------------------------------
<filter **>
  @type record_transformer
  <record>
    environment "#{ENV['FTGO_ENVIRONMENT'] || 'development'}"
    cluster "#{ENV['FTGO_CLUSTER'] || 'local'}"
  </record>
</filter>

# -----------------------------------------------------------------------
# Output: Elasticsearch
# -----------------------------------------------------------------------
<match **>
  @type elasticsearch
  @id out_es
  @log_level info

  # Connection settings
  host "#{ENV['ELASTICSEARCH_HOST'] || 'elasticsearch'}"
  port "#{ENV['ELASTICSEARCH_PORT'] || '9200'}"
  scheme "#{ENV['ELASTICSEARCH_SCHEME'] || 'http'}"

  # Index settings
  index_name ftgo-logs
  type_name _doc

  # Use logstash-compatible index naming for daily rotation
  logstash_format true
  logstash_prefix ftgo-logs
  logstash_dateformat %Y.%m.%d

  # Include tag and timestamp
  include_tag_key true
  tag_key fluentd_tag
  include_timestamp true

  # Buffer settings for reliability
  <buffer>
    @type file
    path /var/log/fluentd-buffers/ftgo-logs.buffer
    flush_mode interval
    flush_interval 5s
    flush_thread_count 2
    retry_type exponential_backoff
    retry_wait 1s
    retry_max_interval 60s
    retry_forever true
    chunk_limit_size 8M
    queue_limit_length 32
    overflow_action block
  </buffer>

  # Reconnection settings
  reconnect_on_error true
  reload_on_failure true
  reload_connections false
  request_timeout 30s
</match>
