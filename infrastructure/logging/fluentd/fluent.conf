# =============================================================================
# Fluentd Configuration for FTGO Log Aggregation
# =============================================================================
# Collects structured JSON logs from all FTGO microservices and forwards them
# to Elasticsearch. Used in both Docker Compose (local dev) and Kubernetes.
#
# Architecture:
#   [FTGO Services] -> stdout (JSON) -> [Fluentd] -> [Elasticsearch]
#
# For Kubernetes: Fluentd runs as a DaemonSet, tailing container logs from
#   /var/log/containers/*.log
# For Docker Compose: Fluentd receives logs via the fluentd logging driver
#   or forward input on port 24224.
# =============================================================================

# -----------------------------------------------------------------------
# Source: Forward input (Docker Compose / direct forwarding)
# -----------------------------------------------------------------------
<source>
  @type forward
  port 24224
  bind 0.0.0.0
  tag ftgo
</source>

# -----------------------------------------------------------------------
# Source: Kubernetes container logs (when running as DaemonSet)
# -----------------------------------------------------------------------
<source>
  @type tail
  path /var/log/containers/ftgo-*.log
  pos_file /var/log/fluentd-ftgo-containers.log.pos
  tag kubernetes.*
  read_from_head true
  <parse>
    @type json
    time_key time
    time_format %Y-%m-%dT%H:%M:%S.%NZ
    keep_time_key true
  </parse>
</source>

# -----------------------------------------------------------------------
# Filter: Add Kubernetes metadata (pod name, namespace, labels)
# -----------------------------------------------------------------------
<filter kubernetes.**>
  @type kubernetes_metadata
  @id filter_kube_metadata
  kubernetes_url "#{ENV['KUBERNETES_SERVICE_HOST']}:#{ENV['KUBERNETES_SERVICE_PORT']}"
  cache_size 1000
  watch true
  de_dot true
  annotation_match ["fluentd.io/*"]
</filter>

# -----------------------------------------------------------------------
# Filter: Parse JSON log body from container logs
# -----------------------------------------------------------------------
<filter kubernetes.**>
  @type parser
  key_name log
  reserve_data true
  remove_key_name_field true
  <parse>
    @type json
    time_key @timestamp
    time_format %Y-%m-%dT%H:%M:%S.%L%z
    keep_time_key true
  </parse>
</filter>

# -----------------------------------------------------------------------
# Filter: Parse JSON from Docker Compose forward input
# -----------------------------------------------------------------------
<filter ftgo.**>
  @type parser
  key_name log
  reserve_data true
  remove_key_name_field false
  emit_invalid_record_to_error false
  <parse>
    @type json
    time_key @timestamp
    time_format %Y-%m-%dT%H:%M:%S.%L%z
    keep_time_key true
  </parse>
</filter>

# -----------------------------------------------------------------------
# Filter: Add environment tag
# -----------------------------------------------------------------------
<filter **>
  @type record_transformer
  <record>
    environment "#{ENV['FTGO_ENVIRONMENT'] || 'development'}"
    cluster "#{ENV['FTGO_CLUSTER'] || 'local'}"
  </record>
</filter>

# -----------------------------------------------------------------------
# Output: Elasticsearch
# -----------------------------------------------------------------------
<match **>
  @type elasticsearch
  @id out_es
  @log_level info

  # Connection settings
  host "#{ENV['ELASTICSEARCH_HOST'] || 'elasticsearch'}"
  port "#{ENV['ELASTICSEARCH_PORT'] || '9200'}"
  scheme "#{ENV['ELASTICSEARCH_SCHEME'] || 'http'}"

  # Index settings
  index_name ftgo-logs
  type_name _doc

  # Use logstash-compatible index naming for daily rotation
  logstash_format true
  logstash_prefix ftgo-logs
  logstash_dateformat %Y.%m.%d

  # Include tag and timestamp
  include_tag_key true
  tag_key fluentd_tag
  include_timestamp true

  # Buffer settings for reliability
  <buffer>
    @type file
    path /var/log/fluentd-buffers/ftgo-logs.buffer
    flush_mode interval
    flush_interval 5s
    flush_thread_count 2
    retry_type exponential_backoff
    retry_wait 1s
    retry_max_interval 60s
    retry_forever true
    chunk_limit_size 8M
    queue_limit_length 32
    overflow_action block
  </buffer>

  # Reconnection settings
  reconnect_on_error true
  reload_on_failure true
  reload_connections false
  request_timeout 30s
</match>
