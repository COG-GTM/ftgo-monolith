input {
  beats {
    port => 5044
  }

  tcp {
    port => 5000
    codec => json_lines
  }

  udp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if [message] =~ /^\s*$/ {
    drop { }
  }

  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "log"
      skip_on_invalid_json => true
    }
  }

  if [log][timestamp] {
    date {
      match => ["[log][timestamp]", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSZ"]
      target => "@timestamp"
    }
  }

  if [log][traceId] {
    mutate {
      add_field => {
        "trace_id" => "%{[log][traceId]}"
      }
    }
  }

  if [log][spanId] {
    mutate {
      add_field => {
        "span_id" => "%{[log][spanId]}"
      }
    }
  }

  if [log][service] {
    mutate {
      add_field => {
        "service_name" => "%{[log][service]}"
      }
    }
  } else if [docker][container][name] {
    mutate {
      add_field => {
        "service_name" => "%{[docker][container][name]}"
      }
    }
  }

  if [log][level] {
    mutate {
      add_field => {
        "log_level" => "%{[log][level]}"
      }
    }
  }

  mutate {
    remove_field => ["host", "agent", "ecs", "input", "tags"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "ftgo-logs-%{+YYYY.MM.dd}"
    template_name => "ftgo-logs"
    template => "/usr/share/logstash/pipeline/ftgo-logs-template.json"
    template_overwrite => true
  }
}
