version: '3.8'

services:
  zipkin:
    image: openzipkin/zipkin:3.0
    container_name: ftgo-zipkin
    ports:
      - "9411:9411"
    environment:
      - STORAGE_TYPE=mem
    restart: unless-stopped

  # Alternative: Jaeger all-in-one for development
