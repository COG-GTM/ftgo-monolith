// =============================================================================
// FTGO API Gateway - Spring Cloud Gateway
// =============================================================================
// Standalone Spring Boot application serving as the single entry point for
// all FTGO microservices. Handles routing, authentication, rate limiting,
// circuit breaking, and cross-cutting concerns.
//
// This is a STANDALONE build - it is NOT part of the legacy monolith Gradle
// build. Build independently with:
//   cd infrastructure/api-gateway && ./gradlew build
//
// See docs/api-gateway.md for architecture and configuration details.
// =============================================================================

plugins {
    id 'java'
    id 'org.springframework.boot' version '3.2.4'
    id 'io.spring.dependency-management' version '1.1.4'
}

group = 'net.chrisrichardson.ftgo'
version = '1.0.0-SNAPSHOT'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

ext {
    set('springCloudVersion', '2023.0.1')
}

repositories {
    mavenCentral()
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
    }
}

dependencies {
    // Spring Cloud Gateway (reactive, Netty-based)
    implementation 'org.springframework.cloud:spring-cloud-starter-gateway'

    // Circuit Breaker - Resilience4j
    implementation 'org.springframework.cloud:spring-cloud-starter-circuitbreaker-reactor-resilience4j'

    // Rate Limiting - Redis backed
    implementation 'org.springframework.boot:spring-boot-starter-data-redis-reactive'

    // Security - JWT validation
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'io.jsonwebtoken:jjwt-api:0.12.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.5'

    // Actuator for health checks and monitoring
    implementation 'org.springframework.boot:spring-boot-starter-actuator'

    // Micrometer for metrics
    implementation 'io.micrometer:micrometer-registry-prometheus'

    // Logging
    implementation 'net.logstash.logback:logstash-logback-encoder:7.4'

    // Testing
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'io.projectreactor:reactor-test'
}

tasks.named('test') {
    useJUnitPlatform()
}

// Build info for actuator
springBoot {
    buildInfo()
}
