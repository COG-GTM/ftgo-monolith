# =============================================================================
# Test Profile Configuration
# =============================================================================
# Disables Redis and JWT validation for unit/integration tests.
# =============================================================================

spring:
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      redis:
        enabled: false

ftgo:
  services:
    order-service:
      url: http://localhost:9081
    consumer-service:
      url: http://localhost:9082
    restaurant-service:
      url: http://localhost:9083
    courier-service:
      url: http://localhost:9084

  gateway:
    jwt:
      secret: test-secret-key-for-unit-tests-must-be-at-least-32-characters-long
      enabled: false
      excluded-paths: /actuator/**,/fallback/**

    rate-limit:
      default-replenish-rate: 100
      default-burst-capacity: 200
      default-requested-tokens: 1

    circuit-breaker:
      failure-rate-threshold: 50
      wait-duration-in-open-state: 5
      sliding-window-size: 5
      permitted-calls-in-half-open: 2
      timeout-duration: 3

    cors:
      allowed-origins: "*"
      allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
      allowed-headers: "*"
      exposed-headers: X-Correlation-Id,X-RateLimit-Remaining
      allow-credentials: false
      max-age: 3600
