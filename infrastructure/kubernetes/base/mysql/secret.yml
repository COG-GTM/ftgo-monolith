#   kubectl create secret generic ftgo-db-secret \
#     --from-literal=root-password=<value> \
#     --from-literal=username=<value> \
#     --from-literal=password=<value> \
#     --dry-run=client -o yaml | kubeseal --format yaml > sealed-secret.yml
apiVersion: v1
kind: Secret
metadata:
  name: ftgo-db-secret
  labels:
    app.kubernetes.io/name: ftgo-mysql
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: ftgo
type: Opaque
data:
  # Placeholder: override via Kustomize overlays per environment
  root-password: REPLACE_VIA_SEALED_SECRET
  username: REPLACE_VIA_SEALED_SECRET
  password: REPLACE_VIA_SEALED_SECRET
