apiVersion: v1
kind: ConfigMap
metadata:
  name: ftgo-courier-service-config
  labels:
    app.kubernetes.io/name: ftgo-courier-service
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: ftgo
data:
  SPRING_PROFILES_ACTIVE: "kubernetes"
  SPRING_DATASOURCE_URL: "jdbc:mysql://ftgo-mysql:3306/ftgo_courier_service?useSSL=false&allowPublicKeyRetrieval=true"
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: "com.mysql.cj.jdbc.Driver"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_JPA_SHOW_SQL: "false"
  SERVER_PORT: "8080"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics,prometheus"
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_COMPONENTS: "always"
  MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED: "true"
  MANAGEMENT_HEALTH_READINESSSTATE_ENABLED: "true"
  # Graceful Shutdown
  SERVER_SHUTDOWN: "graceful"
  SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE: "30s"
  # Service Discovery (K8s DNS)
  FTGO_SERVICE_DISCOVERY_NAMESPACE: "ftgo"
  FTGO_SERVICE_DISCOVERY_CLUSTER_DOMAIN: "cluster.local"
  FTGO_SERVICE_DISCOVERY_DEFAULT_PORT: "8080"
  # Resilience4j Circuit Breaker
  RESILIENCE4J_CIRCUITBREAKER_CONFIGS_DEFAULT_SLIDING_WINDOW_TYPE: "COUNT_BASED"
  RESILIENCE4J_CIRCUITBREAKER_CONFIGS_DEFAULT_SLIDING_WINDOW_SIZE: "10"
  RESILIENCE4J_CIRCUITBREAKER_CONFIGS_DEFAULT_FAILURE_RATE_THRESHOLD: "50"
  RESILIENCE4J_CIRCUITBREAKER_CONFIGS_DEFAULT_MINIMUM_NUMBER_OF_CALLS: "5"
  RESILIENCE4J_CIRCUITBREAKER_CONFIGS_DEFAULT_WAIT_DURATION_IN_OPEN_STATE: "30s"
  RESILIENCE4J_CIRCUITBREAKER_CONFIGS_DEFAULT_PERMITTED_NUMBER_OF_CALLS_IN_HALF_OPEN_STATE: "3"
  RESILIENCE4J_CIRCUITBREAKER_CONFIGS_DEFAULT_AUTOMATIC_TRANSITION_FROM_OPEN_TO_HALF_OPEN_ENABLED: "true"
  # Resilience4j Retry
  RESILIENCE4J_RETRY_CONFIGS_DEFAULT_MAX_ATTEMPTS: "3"
  RESILIENCE4J_RETRY_CONFIGS_DEFAULT_WAIT_DURATION: "1s"
  RESILIENCE4J_RETRY_CONFIGS_DEFAULT_ENABLE_EXPONENTIAL_BACKOFF: "true"
  RESILIENCE4J_RETRY_CONFIGS_DEFAULT_EXPONENTIAL_BACKOFF_MULTIPLIER: "2"
  # Resilience4j Bulkhead
  RESILIENCE4J_BULKHEAD_CONFIGS_DEFAULT_MAX_CONCURRENT_CALLS: "25"
  RESILIENCE4J_BULKHEAD_CONFIGS_DEFAULT_MAX_WAIT_DURATION: "500ms"
  # Resilience4j Rate Limiter
  RESILIENCE4J_RATELIMITER_CONFIGS_DEFAULT_LIMIT_FOR_PERIOD: "50"
  RESILIENCE4J_RATELIMITER_CONFIGS_DEFAULT_LIMIT_REFRESH_PERIOD: "1s"
  RESILIENCE4J_RATELIMITER_CONFIGS_DEFAULT_TIMEOUT_DURATION: "500ms"
  JAVA_OPTS: "-Xmx768m -Xms256m"
