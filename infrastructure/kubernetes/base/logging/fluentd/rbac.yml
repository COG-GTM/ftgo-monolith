apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluentd
  namespace: ftgo-logging
  labels:
    app.kubernetes.io/name: fluentd
    app.kubernetes.io/part-of: ftgo
    app.kubernetes.io/component: logging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluentd
  labels:
    app.kubernetes.io/name: fluentd
    app.kubernetes.io/part-of: ftgo
    app.kubernetes.io/component: logging
rules:
  - apiGroups: [""]
    resources:
      - pods
      - namespaces
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluentd
  labels:
    app.kubernetes.io/name: fluentd
    app.kubernetes.io/part-of: ftgo
    app.kubernetes.io/component: logging
roleRef:
  kind: ClusterRole
  name: fluentd
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: fluentd
    namespace: ftgo-logging
