apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentd-config
  namespace: ftgo-logging
  labels:
    app.kubernetes.io/name: fluentd
    app.kubernetes.io/part-of: ftgo
    app.kubernetes.io/component: logging
data:
  fluent.conf: |
    # =============================================================================
    # Fluentd Configuration for FTGO K8s Log Collection
    # =============================================================================

    # Source: Kubernetes container logs
    <source>
      @type tail
      path /var/log/containers/ftgo-*.log
      pos_file /var/log/fluentd-ftgo-containers.log.pos
      tag kubernetes.*
      read_from_head true
      <parse>
        @type json
        time_key time
        time_format %Y-%m-%dT%H:%M:%S.%NZ
        keep_time_key true
      </parse>
    </source>

    # Filter: Add Kubernetes metadata
    <filter kubernetes.**>
      @type kubernetes_metadata
      @id filter_kube_metadata
    </filter>

    # Filter: Parse JSON log body
    <filter kubernetes.**>
      @type parser
      key_name log
      reserve_data true
      remove_key_name_field true
      <parse>
        @type json
        time_key @timestamp
        time_format %Y-%m-%dT%H:%M:%S.%L%z
        keep_time_key true
      </parse>
    </filter>

    # Filter: Add environment metadata
    <filter **>
      @type record_transformer
      <record>
        environment "#{ENV['FTGO_ENVIRONMENT'] || 'development'}"
        cluster "#{ENV['FTGO_CLUSTER'] || 'local'}"
      </record>
    </filter>

    # Output: Elasticsearch
    <match **>
      @type elasticsearch
      @id out_es
      @log_level info
      host "#{ENV['FLUENT_ELASTICSEARCH_HOST'] || 'elasticsearch'}"
      port "#{ENV['FLUENT_ELASTICSEARCH_PORT'] || '9200'}"
      scheme "#{ENV['FLUENT_ELASTICSEARCH_SCHEME'] || 'http'}"
      logstash_format true
      logstash_prefix ftgo-logs
      logstash_dateformat %Y.%m.%d
      include_tag_key true
      tag_key fluentd_tag
      include_timestamp true
      <buffer>
        @type file
        path /var/log/fluentd-buffers/ftgo-logs.buffer
        flush_mode interval
        flush_interval 5s
        flush_thread_count 2
        retry_type exponential_backoff
        retry_wait 1s
        retry_max_interval 60s
        retry_forever true
        chunk_limit_size 8M
        queue_limit_length 32
        overflow_action block
      </buffer>
      reconnect_on_error true
      reload_on_failure true
      reload_connections false
      request_timeout 30s
    </match>
