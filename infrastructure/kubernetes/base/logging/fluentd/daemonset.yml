apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentd
  namespace: ftgo-logging
  labels:
    app.kubernetes.io/name: fluentd
    app.kubernetes.io/part-of: ftgo
    app.kubernetes.io/component: logging
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fluentd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fluentd
        app.kubernetes.io/part-of: ftgo
        app.kubernetes.io/component: logging
    spec:
      serviceAccountName: fluentd
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
      containers:
        - name: fluentd
          image: fluent/fluentd-kubernetes-daemonset:v1.16-debian-elasticsearch8-1
          env:
            - name: FLUENT_ELASTICSEARCH_HOST
              value: "elasticsearch.ftgo-logging.svc.cluster.local"
            - name: FLUENT_ELASTICSEARCH_PORT
              value: "9200"
            - name: FLUENT_ELASTICSEARCH_SCHEME
              value: "http"
            - name: FLUENT_ELASTICSEARCH_LOGSTASH_PREFIX
              value: "ftgo-logs"
            - name: FLUENT_ELASTICSEARCH_LOGSTASH_FORMAT
              value: "true"
            - name: FTGO_ENVIRONMENT
              value: "development"
            - name: FTGO_CLUSTER
              value: "local"
            - name: FLUENT_CONTAINER_TAIL_PARSER_TYPE
              value: "json"
            - name: FLUENT_CONTAINER_TAIL_TAG
              value: "kubernetes.*"
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              cpu: 500m
              memory: 500Mi
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: dockercontainerlogdirectory
              mountPath: /var/log/containers
              readOnly: true
            - name: fluentd-config
              mountPath: /fluentd/etc/fluent.conf
              subPath: fluent.conf
            - name: fluentd-buffer
              mountPath: /var/log/fluentd-buffers
      terminationGracePeriodSeconds: 30
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: dockercontainerlogdirectory
          hostPath:
            path: /var/log/containers
        - name: fluentd-config
          configMap:
            name: fluentd-config
        - name: fluentd-buffer
          emptyDir: {}
