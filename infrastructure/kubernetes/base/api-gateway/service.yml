apiVersion: v1
kind: Service
metadata:
  name: ftgo-api-gateway
  labels:
    app.kubernetes.io/name: ftgo-api-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: ftgo
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: ftgo-api-gateway
