apiVersion: v1
kind: ConfigMap
metadata:
  name: ftgo-api-gateway-config
  labels:
    app.kubernetes.io/name: ftgo-api-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: ftgo
data:
  SPRING_PROFILES_ACTIVE: "kubernetes"
  SERVER_PORT: "8080"
  # Downstream service URLs (Kubernetes DNS)
  ORDER_SERVICE_URL: "http://ftgo-order-service:8080"
  CONSUMER_SERVICE_URL: "http://ftgo-consumer-service:8080"
  RESTAURANT_SERVICE_URL: "http://ftgo-restaurant-service:8080"
  COURIER_SERVICE_URL: "http://ftgo-courier-service:8080"
  # Redis
  REDIS_HOST: "ftgo-redis"
  REDIS_PORT: "6379"
  # JWT
  JWT_ENABLED: "true"
  # Rate Limiting
  RATE_LIMIT_REPLENISH_RATE: "10"
  RATE_LIMIT_BURST_CAPACITY: "20"
  RATE_LIMIT_REQUESTED_TOKENS: "1"
  # Circuit Breaker
  CB_FAILURE_RATE_THRESHOLD: "50"
  CB_WAIT_DURATION: "30"
  CB_SLIDING_WINDOW_SIZE: "10"
  CB_PERMITTED_HALF_OPEN: "3"
  CB_TIMEOUT_DURATION: "5"
  # CORS
  CORS_ALLOWED_ORIGINS: "*"
  # Actuator
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics,prometheus,gateway,circuitbreakers"
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
  MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED: "true"
  MANAGEMENT_HEALTH_READINESSSTATE_ENABLED: "true"
  # JVM
  JAVA_OPTS: "-Xmx768m -Xms256m"
