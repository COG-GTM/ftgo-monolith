# =============================================================================
# Zipkin Service
# =============================================================================
# Exposes the Zipkin server within the cluster for trace collection from
# FTGO microservices. Services send traces to http://zipkin.ftgo-tracing:9411.
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: zipkin
  namespace: ftgo-tracing
  labels:
    app.kubernetes.io/name: zipkin
    app.kubernetes.io/part-of: ftgo
    app.kubernetes.io/component: tracing
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9411
      targetPort: 9411
      protocol: TCP
  selector:
    app.kubernetes.io/name: zipkin
