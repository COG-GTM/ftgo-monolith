---
# SealedSecrets Controller Configuration
# Install Bitnami SealedSecrets controller to manage encrypted secrets in Git.
#
# Installation:
#   kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.24.5/controller.yaml
#
# Usage:
#   1. Install kubeseal CLI
#   2. Create a regular Secret YAML
#   3. Encrypt with: kubeseal --format yaml < secret.yml > sealed-secret.yml
#   4. Commit the SealedSecret to Git (never commit raw Secret)
#   5. The controller decrypts SealedSecrets into regular Secrets in-cluster
#
# For more info: https://github.com/bitnami-labs/sealed-secrets
apiVersion: v1
kind: Namespace
metadata:
  name: sealed-secrets
  labels:
    app.kubernetes.io/name: sealed-secrets
---
