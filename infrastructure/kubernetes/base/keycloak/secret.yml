# =============================================================================
# Keycloak Secrets
# =============================================================================
# IMPORTANT: This file contains placeholder values for development/testing only.
# In production, use SealedSecrets, External Secrets Operator, or another
# secrets management solution to inject actual credentials.
#
# For production deployment:
#   1. Generate strong passwords for all credentials
#   2. Create a SealedSecret or use an external secrets provider
#   3. Never commit production secrets to version control
#
# Example using kubectl to create secrets manually:
#   kubectl create secret generic keycloak-secret \
#     --namespace=ftgo \
#     --from-literal=admin-username=admin \
#     --from-literal=admin-password=<STRONG_PASSWORD> \
#     --from-literal=db-username=keycloak \
#     --from-literal=db-password=<STRONG_PASSWORD>
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
  namespace: ftgo
  labels:
    app: keycloak
    component: identity
    part-of: ftgo-platform
  annotations:
    description: "Keycloak admin and database credentials - REPLACE in production"
type: Opaque
stringData:
  # Keycloak admin credentials
  admin-username: admin
  admin-password: CHANGE_ME_IN_PRODUCTION
  # PostgreSQL database credentials
  db-username: keycloak
  db-password: CHANGE_ME_IN_PRODUCTION
