apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/tracing

# Development overrides: in-memory storage, lower resource limits
patches:
  - target:
      kind: ConfigMap
      name: zipkin-config
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: zipkin-config
      data:
        storage-type: "mem"
        java-opts: "-Xms128m -Xmx256m"
  - target:
      kind: Deployment
      name: zipkin
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: zipkin
      spec:
        template:
          spec:
            containers:
              - name: zipkin
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    cpu: 250m
                    memory: 256Mi
