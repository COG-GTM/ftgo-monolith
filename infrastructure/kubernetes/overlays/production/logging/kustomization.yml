apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/logging

patches:
  # Production: full resources, 90-day retention, security enabled
  - target:
      kind: StatefulSet
      name: elasticsearch
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/3/value
        value: "-Xms2g -Xmx2g"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "4Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "4Gi"
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: "200Gi"
  - target:
      kind: DaemonSet
      name: fluentd
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/5/value
        value: "production"
      - op: replace
        path: /spec/template/spec/containers/0/env/6/value
        value: "production"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "500Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
  - target:
      kind: Deployment
      name: kibana
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"
