apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/tracing

# Production overrides: Elasticsearch storage, higher resources, replicas
patches:
  - target:
      kind: ConfigMap
      name: zipkin-config
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: zipkin-config
      data:
        # Production should use persistent storage (Elasticsearch)
        # Configure ES_HOSTS env var in the deployment overlay
        storage-type: "elasticsearch"
        java-opts: "-Xms512m -Xmx1024m"
  - target:
      kind: Deployment
      name: zipkin
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: zipkin
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: zipkin
                resources:
                  requests:
                    cpu: 250m
                    memory: 512Mi
                  limits:
                    cpu: 1000m
                    memory: 1024Mi
                env:
                  - name: ES_HOSTS
                    value: "http://elasticsearch.ftgo-logging:9200"
