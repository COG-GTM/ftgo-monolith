apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ftgo-staging

resources:
  - ../../base

patches:
  # Staging: match production replica count for realistic testing
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: HorizontalPodAutoscaler
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 6

commonLabels:
  environment: staging

# Staging environment ConfigMap overrides
configMapGenerator:
  - name: ftgo-order-service-config
    behavior: merge
    literals:
      - SPRING_PROFILES_ACTIVE=kubernetes,staging
      - SPRING_JPA_SHOW_SQL=false
  - name: ftgo-consumer-service-config
    behavior: merge
    literals:
      - SPRING_PROFILES_ACTIVE=kubernetes,staging
      - SPRING_JPA_SHOW_SQL=false
  - name: ftgo-restaurant-service-config
    behavior: merge
    literals:
      - SPRING_PROFILES_ACTIVE=kubernetes,staging
      - SPRING_JPA_SHOW_SQL=false
  - name: ftgo-courier-service-config
    behavior: merge
    literals:
      - SPRING_PROFILES_ACTIVE=kubernetes,staging
      - SPRING_JPA_SHOW_SQL=false
  - name: ftgo-api-gateway-config
    behavior: merge
    literals:
      - SPRING_PROFILES_ACTIVE=kubernetes,staging
      - JWT_ENABLED=true
  # Staging resilience overrides: production-like with slightly relaxed limits
  - name: ftgo-resilience-staging-config
    literals:
      - RESILIENCE4J_CIRCUITBREAKER_CONFIGS_DEFAULT_FAILURE_RATE_THRESHOLD=50
      - RESILIENCE4J_CIRCUITBREAKER_CONFIGS_DEFAULT_WAIT_DURATION_IN_OPEN_STATE=30s
      - RESILIENCE4J_RETRY_CONFIGS_DEFAULT_MAX_ATTEMPTS=3
      - RESILIENCE4J_BULKHEAD_CONFIGS_DEFAULT_MAX_CONCURRENT_CALLS=25
      - RESILIENCE4J_RATELIMITER_CONFIGS_DEFAULT_LIMIT_FOR_PERIOD=50
      - MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS=always

# Staging secrets - use SealedSecrets in real deployments
# These placeholders demonstrate the pattern; replace with sealed-secrets
secretGenerator:
  - name: ftgo-db-secret
    behavior: replace
    literals:
      - root-password=REPLACE_VIA_SEALED_SECRET
      - username=REPLACE_VIA_SEALED_SECRET
      - password=REPLACE_VIA_SEALED_SECRET
    type: Opaque
  - name: ftgo-order-service-secret
    behavior: replace
    literals:
      - db-username=REPLACE_VIA_SEALED_SECRET
      - db-password=REPLACE_VIA_SEALED_SECRET
    type: Opaque
  - name: ftgo-consumer-service-secret
    behavior: replace
    literals:
      - db-username=REPLACE_VIA_SEALED_SECRET
      - db-password=REPLACE_VIA_SEALED_SECRET
    type: Opaque
  - name: ftgo-restaurant-service-secret
    behavior: replace
    literals:
      - db-username=REPLACE_VIA_SEALED_SECRET
      - db-password=REPLACE_VIA_SEALED_SECRET
    type: Opaque
  - name: ftgo-courier-service-secret
    behavior: replace
    literals:
      - db-username=REPLACE_VIA_SEALED_SECRET
      - db-password=REPLACE_VIA_SEALED_SECRET
    type: Opaque
  - name: ftgo-api-gateway-secret
    behavior: replace
    literals:
      - jwt-secret=REPLACE_VIA_SEALED_SECRET
      - redis-password=REPLACE_VIA_SEALED_SECRET
    type: Opaque
