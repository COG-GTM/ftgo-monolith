global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'order-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['order-service:8080']
        labels:
          service: 'order-service'
          domain: 'order'

  - job_name: 'consumer-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['consumer-service:8080']
        labels:
          service: 'consumer-service'
          domain: 'consumer'

  - job_name: 'courier-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['courier-service:8080']
        labels:
          service: 'courier-service'
          domain: 'courier'

  - job_name: 'restaurant-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['restaurant-service:8080']
        labels:
          service: 'restaurant-service'
          domain: 'restaurant'
