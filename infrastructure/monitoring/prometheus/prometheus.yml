# =============================================================================
# Prometheus Configuration for FTGO Microservices
# =============================================================================
# Scrapes metrics from all FTGO microservices via Spring Boot Actuator
# /actuator/prometheus endpoints.
#
# Usage:
#   docker compose -f docker-compose.monitoring.yml up prometheus
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Load alerting rules
rule_files:
  - "alert_rules.yml"

# Alertmanager configuration (optional - for future integration)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

scrape_configs:
  # -------------------------------------------------------------------------
  # Prometheus self-monitoring
  # -------------------------------------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # -------------------------------------------------------------------------
  # FTGO Order Service
  # -------------------------------------------------------------------------
  - job_name: 'ftgo-order-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['ftgo-order-service:8080']
        labels:
          service: 'ftgo-order-service'
          domain: 'order'

  # -------------------------------------------------------------------------
  # FTGO Consumer Service
  # -------------------------------------------------------------------------
  - job_name: 'ftgo-consumer-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['ftgo-consumer-service:8080']
        labels:
          service: 'ftgo-consumer-service'
          domain: 'consumer'

  # -------------------------------------------------------------------------
  # FTGO Restaurant Service
  # -------------------------------------------------------------------------
  - job_name: 'ftgo-restaurant-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['ftgo-restaurant-service:8080']
        labels:
          service: 'ftgo-restaurant-service'
          domain: 'restaurant'

  # -------------------------------------------------------------------------
  # FTGO Courier Service
  # -------------------------------------------------------------------------
  - job_name: 'ftgo-courier-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['ftgo-courier-service:8080']
        labels:
          service: 'ftgo-courier-service'
          domain: 'courier'
