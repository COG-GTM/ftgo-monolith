// ============================================================================
// FTGO Microservices Platform - Root Build Configuration
// ============================================================================
// This root build applies shared settings to all subprojects.
// Individual module configuration is handled by convention plugins in buildSrc/:
//   - ftgo.java-conventions         : Java 17, UTF-8, compiler options
//   - ftgo.spring-boot-conventions  : Spring Boot + dependency management
//   - ftgo.testing-conventions      : JUnit 5, Rest-Assured, integration tests
//   - ftgo.docker-conventions       : Docker image builds (Spring Boot Buildpacks)
//   - ftgo.publishing-conventions   : Maven publishing for shared libraries
//
// Dependencies are centralized in gradle/libs.versions.toml (version catalog).
// ============================================================================

plugins {
    alias(libs.plugins.versions)
}

// Register the WaitForMySql task at the root level for database readiness checks
tasks.register('waitForMySql', WaitForMySql)

subprojects {
    group = 'net.chrisrichardson.ftgo'

    repositories {
        mavenCentral()
    }
}
