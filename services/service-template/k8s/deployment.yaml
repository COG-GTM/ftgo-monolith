apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{service-name}}"
  labels:
    app: "{{service-name}}"
    context: "{{context}}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "{{service-name}}"
  template:
    metadata:
      labels:
        app: "{{service-name}}"
        context: "{{context}}"
    spec:
      containers:
        - name: "{{service-name}}"
          image: "ftgo/{{service-name}}:latest"
          ports:
            - containerPort: "{{port}}"
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/ftgo_{{context}}_service"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: password
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: "{{port}}"
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: "{{port}}"
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: "{{service-name}}"
spec:
  selector:
    app: "{{service-name}}"
  ports:
    - port: "{{port}}"
      targetPort: "{{port}}"
  type: ClusterIP
