apiVersion: apps/v1
kind: Deployment
metadata:
  name: <service-name>
  labels:
    app: <service-name>
    part-of: ftgo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: <service-name>
  template:
    metadata:
      labels:
        app: <service-name>
    spec:
      containers:
        - name: <service-name>
          image: ftgo/<service-name>:latest
          ports:
            - containerPort: <port>
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: <port>
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: <port>
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: <service-name>
  labels:
    app: <service-name>
spec:
  type: ClusterIP
  ports:
    - port: <port>
      targetPort: <port>
  selector:
    app: <service-name>
