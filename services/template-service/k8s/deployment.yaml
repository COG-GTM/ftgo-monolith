apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftgo-template-service
  labels:
    app: ftgo-template-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ftgo-template-service
  template:
    metadata:
      labels:
        app: ftgo-template-service
        version: v1
    spec:
      containers:
        - name: ftgo-template-service
          image: ftgo/template-service:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: ftgo-template-service-config
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
