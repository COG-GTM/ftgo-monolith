server:
  port: 8080

spring:
  application:
    name: __SERVICE_NAME__
  datasource:
    url: jdbc:mysql://localhost:3306/ftgo___SERVICE_NAME_UNDERSCORE__
    username: ${DB_USERNAME:ftgo}
    password: ${DB_PASSWORD:ftgo}
    driver-class-name: com.mysql.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
