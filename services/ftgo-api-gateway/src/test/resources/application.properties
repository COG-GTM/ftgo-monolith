# =============================================================================
# FTGO API Gateway — Test Configuration
# =============================================================================

spring.application.name=ftgo-api-gateway-test
spring.main.web-application-type=reactive

# Disable SSL for tests
server.ssl.enabled=false

# JWT test configuration
ftgo.security.jwt.secret=this-is-a-test-secret-key-that-is-at-least-32-bytes-long-for-hs256
ftgo.security.jwt.issuer=ftgo-platform
ftgo.security.jwt.enabled=true

# Disable Redis for unit tests (rate limiting will be unavailable)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

# Service URLs for testing
ftgo.gateway.services.order-service-url=http://localhost:8081
ftgo.gateway.services.consumer-service-url=http://localhost:8082
ftgo.gateway.services.restaurant-service-url=http://localhost:8083
ftgo.gateway.services.courier-service-url=http://localhost:8084

# Logging
logging.level.com.ftgo.gateway=DEBUG
