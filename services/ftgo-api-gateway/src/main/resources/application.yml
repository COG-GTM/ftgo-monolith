# =============================================================================
# FTGO API Gateway — Application Configuration
# =============================================================================

server:
  port: 8080
  # SSL/TLS configuration (enabled via profile or environment variable)
  ssl:
    enabled: ${FTGO_GATEWAY_SSL_ENABLED:false}
    key-store: ${FTGO_GATEWAY_SSL_KEY_STORE:classpath:certs/gateway-keystore.p12}
    key-store-password: ${FTGO_GATEWAY_SSL_KEY_STORE_PASSWORD:changeit}
    key-store-type: PKCS12
    key-alias: ${FTGO_GATEWAY_SSL_KEY_ALIAS:ftgo-gateway}

spring:
  application:
    name: ftgo-api-gateway
  main:
    web-application-type: reactive

  # Redis configuration for rate limiting
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      timeout: 2000ms

  cloud:
    gateway:
      # Default filters applied to all routes
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: ${FTGO_GATEWAY_RATE_LIMIT_REPLENISH_RATE:10}
            redis-rate-limiter.burstCapacity: ${FTGO_GATEWAY_RATE_LIMIT_BURST_CAPACITY:20}
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@apiKeyKeyResolver}"
        - name: Retry
          args:
            retries: 3
            statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
            methods: GET
            backoff:
              firstBackoff: 100ms
              maxBackoff: 500ms
              factor: 2
              basedOnPreviousValue: false

      # Global CORS (supplementary to GatewayCorsConfig bean)
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: ${FTGO_GATEWAY_CORS_ORIGINS:http://localhost:3000,http://localhost:8080}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - Authorization
              - Content-Type
              - X-Correlation-ID
              - X-API-Version
            allowCredentials: true
            maxAge: 3600

      # Metrics
      metrics:
        enabled: true

# --- Service URLs -----------------------------------------------------------
ftgo:
  gateway:
    services:
      order-service-url: ${FTGO_ORDER_SERVICE_URL:http://localhost:8081}
      consumer-service-url: ${FTGO_CONSUMER_SERVICE_URL:http://localhost:8082}
      restaurant-service-url: ${FTGO_RESTAURANT_SERVICE_URL:http://localhost:8083}
      courier-service-url: ${FTGO_COURIER_SERVICE_URL:http://localhost:8084}

    cors:
      allowed-origins: ${FTGO_GATEWAY_CORS_ORIGINS:http://localhost:3000,http://localhost:8080}
      allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
      allowed-headers: "*"
      exposed-headers: Authorization,Content-Type,X-Correlation-ID,X-API-Version
      max-age: 3600
      allow-credentials: true

    rate-limit:
      default-replenish-rate: 10
      default-burst-capacity: 20
      default-requested-tokens: 1
      per-route:
        orders:
          replenish-rate: 50
          burst-capacity: 100
        consumers:
          replenish-rate: 30
          burst-capacity: 60
        restaurants:
          replenish-rate: 30
          burst-capacity: 60
        couriers:
          replenish-rate: 30
          burst-capacity: 60

  security:
    jwt:
      secret: ${FTGO_SECURITY_JWT_SECRET:default-dev-secret-key-must-be-at-least-32-bytes-long}
      issuer: ftgo-platform
      enabled: true

# --- Actuator ---------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,gateway
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    gateway:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true

# --- Resilience4j Circuit Breaker -------------------------------------------
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        minimumNumberOfCalls: 5
        registerHealthIndicator: true
    instances:
      orderServiceCircuitBreaker:
        baseConfig: default
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        waitDurationInOpenState: 15s
      consumerServiceCircuitBreaker:
        baseConfig: default
      restaurantServiceCircuitBreaker:
        baseConfig: default
      courierServiceCircuitBreaker:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 4s

# --- Logging ----------------------------------------------------------------
logging:
  level:
    com.ftgo.gateway: INFO
    org.springframework.cloud.gateway: INFO
    io.github.resilience4j: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId:-}] %-5level %logger{36} - %msg%n"
