// ============================================================
// ftgo-api-gateway - API Gateway microservice
// ============================================================
// Spring Cloud Gateway entry point for all FTGO microservices.
// Handles routing, JWT authentication, rate limiting, circuit
// breaking, CORS, and request/response logging.
//
// Package: com.ftgo.gateway
//
// Note: This module does NOT apply the root buildscript's
// org.springframework.boot plugin (which is 2.7.18). Instead it
// uses dependency-management with the Spring Boot 3.2.3 BOM and
// Spring Cloud 2023.0.0 BOM, then creates an executable fat JAR.
// ============================================================

apply plugin: 'io.spring.dependency-management'
apply plugin: 'application'

group = 'com.ftgo'
version = '1.0.0-SNAPSHOT'

// Main class for the application plugin
application {
    mainClass = 'com.ftgo.gateway.FtgoApiGatewayApplication'
}

// Spring Boot 3.2.3 + Spring Cloud 2023.0.0 BOMs
def springBoot3Version = '3.2.3'

dependencyManagement {
    imports {
        mavenBom "org.springframework.boot:spring-boot-dependencies:${springBoot3Version}"
        mavenBom "org.springframework.cloud:spring-cloud-dependencies:2023.0.0"
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Spring Cloud Gateway (reactive, Netty-based)
    implementation 'org.springframework.cloud:spring-cloud-starter-gateway'

    // Circuit Breaker (Resilience4j via Spring Cloud)
    implementation 'org.springframework.cloud:spring-cloud-starter-circuitbreaker-reactor-resilience4j'

    // Spring Boot Actuator for health checks and metrics
    implementation 'org.springframework.boot:spring-boot-starter-actuator'

    // Spring Security (reactive WebFlux security)
    implementation 'org.springframework.security:spring-security-config'
    implementation 'org.springframework.security:spring-security-web'

    // Redis for rate limiting (optional runtime dependency)
    implementation 'org.springframework.boot:spring-boot-starter-data-redis-reactive'

    // JWT validation
    implementation 'io.jsonwebtoken:jjwt-api:0.12.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.5'

    // Jackson for JSON serialization
    implementation 'com.fasterxml.jackson.core:jackson-databind'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'

    // Micrometer for metrics/prometheus
    implementation 'io.micrometer:micrometer-registry-prometheus'

    // Spring Boot configuration metadata generation
    annotationProcessor "org.springframework.boot:spring-boot-configuration-processor:${springBoot3Version}"

    // Test dependencies
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'io.projectreactor:reactor-test'
    testImplementation 'org.mockito:mockito-core'
    testImplementation 'org.mockito:mockito-junit-jupiter'
    testImplementation 'org.assertj:assertj-core'
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

// ---------------------------------------------------------------------------
// Executable Fat JAR
// ---------------------------------------------------------------------------
jar {
    manifest {
        attributes(
            'Main-Class': 'com.ftgo.gateway.FtgoApiGatewayApplication',
            'Implementation-Title': 'ftgo-api-gateway',
            'Implementation-Version': project.version
        )
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    archiveBaseName.set('ftgo-api-gateway')
}
