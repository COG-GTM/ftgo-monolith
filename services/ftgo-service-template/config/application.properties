# ============================================================
# FTGO Service Template - Application Configuration
# ============================================================
# Replace "template" with your service name.

spring.application.name=ftgo-template-service

# Server
server.port=8080

# Database (per-service database pattern)
spring.datasource.url=jdbc:mysql://localhost:3306/ftgo_template_service
spring.datasource.username=ftgo_user
spring.datasource.password=ftgo_password
spring.datasource.driver-class-name=com.mysql.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5InnoDBDialect

# Actuator & Metrics
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# Metrics Security - use a separate management port to isolate metrics endpoints
# management.server.port=8081

# Custom Business Metrics (enable per service as needed)
# ftgo.metrics.order.enabled=true
# ftgo.metrics.consumer.enabled=true
# ftgo.metrics.restaurant.enabled=true
# ftgo.metrics.courier.enabled=true

# Logging
# See docs/logging-standards.md for log level guidelines per environment.
# Default levels (overridden per profile in logback-spring.xml):
logging.level.com.ftgo=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# Centralized Logging (ftgo-logging-lib)
ftgo.logging.enabled=true
ftgo.logging.json.enabled=true
ftgo.logging.correlation-id.enabled=true
ftgo.logging.correlation-id.header-name=X-Correlation-ID
ftgo.logging.async.enabled=true
ftgo.logging.async.queue-size=1024

# Logging Aspect (enable to log method entry/exit for service packages)
# ftgo.logging.aspect.enabled=true
