# =============================================================================
# TEMPLATE: Test Configuration (Unit Tests)
# =============================================================================
# This configuration is used for unit tests that need a minimal Spring context.
# Most unit tests should NOT need a Spring context at all.
#
# Usage: @ActiveProfiles("test") or @SpringBootTest(properties = ...)
#
# Location: src/test/resources/application-test.properties
# =============================================================================

# --- Database (in-memory for unit tests) ---
# Use H2 for tests that need a lightweight database without Testcontainers
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# --- Flyway (disabled for unit tests) ---
spring.flyway.enabled=false

# --- Security (disabled for non-security unit tests) ---
ftgo.security.jwt.enabled=false

# --- Logging ---
logging.level.com.ftgo=DEBUG
logging.level.org.springframework.test=WARN
logging.level.org.hibernate.SQL=DEBUG

# --- Actuator (minimal for tests) ---
management.endpoints.enabled-by-default=false
