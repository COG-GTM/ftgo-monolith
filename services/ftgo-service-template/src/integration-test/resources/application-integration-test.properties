# =============================================================================
# TEMPLATE: Integration Test Configuration
# =============================================================================
# This configuration is used for integration tests that run with Testcontainers.
#
# Database connection properties are set dynamically by AbstractMySqlIntegrationTest
# via @DynamicPropertySource, so they do NOT need to be specified here.
#
# Usage: @ActiveProfiles("integration-test")
#
# Location: src/integration-test/resources/application-integration-test.properties
# =============================================================================

# --- Flyway (enabled for integration tests to validate migrations) ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- JPA ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Security ---
# Enable security for integration tests that need to test the full auth flow.
# Disable for tests that only care about persistence.
ftgo.security.jwt.enabled=false

# --- Logging ---
logging.level.com.ftgo=DEBUG
logging.level.org.springframework.test=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.testcontainers=INFO

# --- Actuator ---
management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true
