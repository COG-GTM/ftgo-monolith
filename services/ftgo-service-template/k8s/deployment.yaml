apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftgo-SERVICENAME-service
  namespace: ftgo
  labels:
    app: ftgo-SERVICENAME-service
    version: "1.0.0"
    team: ftgo-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ftgo-SERVICENAME-service
  template:
    metadata:
      labels:
        app: ftgo-SERVICENAME-service
        version: "1.0.0"
    spec:
      containers:
        - name: ftgo-SERVICENAME-service
          image: ftgo/ftgo-SERVICENAME-service:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: ftgo-SERVICENAME-db-secret
                  key: url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ftgo-SERVICENAME-db-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ftgo-SERVICENAME-db-secret
                  key: password
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ftgo-SERVICENAME-service
  namespace: ftgo
  labels:
    app: ftgo-SERVICENAME-service
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: ftgo-SERVICENAME-service
