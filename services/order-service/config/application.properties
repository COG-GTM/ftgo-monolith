# Order Service Configuration
# =============================
# This file contains service-specific configuration for the Order microservice.
# Environment-specific overrides should use Spring profiles (application-{profile}.properties).

spring.application.name=order-service
server.port=8084

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/ftgo_order_service
spring.datasource.driver-class-name=com.mysql.jdbc.Driver
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=validate

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
