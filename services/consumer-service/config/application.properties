# Consumer Service Configuration
# ================================
# This file contains service-specific configuration for the Consumer microservice.
# Environment-specific overrides should use Spring profiles (application-{profile}.properties).

spring.application.name=consumer-service
server.port=8082

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/ftgo_consumer_service
spring.datasource.driver-class-name=com.mysql.jdbc.Driver
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=validate

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
