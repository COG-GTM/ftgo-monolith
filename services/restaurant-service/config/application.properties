# Restaurant Service Configuration
# ==================================
# This file contains service-specific configuration for the Restaurant microservice.
# Environment-specific overrides should use Spring profiles (application-{profile}.properties).

spring.application.name=restaurant-service
server.port=8083

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/ftgo_restaurant_service
spring.datasource.driver-class-name=com.mysql.jdbc.Driver
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=validate

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
