// =============================================================================
// FTGO Restaurant Service - Microservice Build Configuration
// =============================================================================
// This build file will be used when the Restaurant Service is extracted as an
// independent microservice. Currently, the monolith's ftgo-restaurant-service
// module (at the repo root) remains the active build.
//
// Package: com.ftgo.restaurant
// Bounded Context: Restaurant
//
// Convention plugins applied (requires root Gradle 8.7+ and includeBuild):
//   ftgo.spring-boot-conventions - Spring Boot 3.x, Java 17, actuator, web
//   ftgo.testing-conventions     - JUnit 5, Mockito, integration tests
//   ftgo.docker-conventions      - Docker image build and push
//
// To activate: uncomment the plugins block and dependencies below after
// the root Gradle wrapper is upgraded and includeBuild('build-logic') is enabled.
// =============================================================================

// plugins {
//     id 'ftgo.spring-boot-conventions'
//     id 'ftgo.testing-conventions'
//     id 'ftgo.docker-conventions'
// }

// Exclude metrics source files from compilation until convention plugins are active.
// These files require Spring Boot 3.x and Micrometer 1.12+ which are provided by
// ftgo.spring-boot-conventions and ftgo.observability-conventions.
sourceSets {
    main {
        java {
            exclude 'com/ftgo/**/metrics/**'
        }
    }
}

