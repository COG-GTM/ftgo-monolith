version: '3.8'

services:
  ftgo-restaurant-service:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ftgo_restaurant
      SPRING_DATASOURCE_USERNAME: ftgo_user
      SPRING_DATASOURCE_PASSWORD: ftgo_password
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ftgo_restaurant
      MYSQL_USER: ftgo_user
      MYSQL_PASSWORD: ftgo_password
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
