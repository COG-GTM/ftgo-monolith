# FTGO Consumer Service
# See config/application.yml for full configuration
spring.application.name=ftgo-consumer-service

# --- Security Configuration ---
spring.profiles.include=security
ftgo.security.cors.allowed-origins=http://localhost:3000,http://localhost:8080

# --- JWT Configuration ---
# Secret key MUST be provided via environment variable: FTGO_SECURITY_JWT_SECRET
ftgo.security.jwt.secret=${FTGO_SECURITY_JWT_SECRET:}
ftgo.security.jwt.expiration-ms=3600000
ftgo.security.jwt.refresh-expiration-ms=86400000
ftgo.security.jwt.issuer=ftgo-platform

# --- Actuator & Health ---
management.endpoints.web.exposure.include=health,info,metrics,prometheus,circuitbreakers,retries,bulkheads,ratelimiters
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=readinessState,db,diskSpace,downstreamServices

# --- Graceful Shutdown ---
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# --- K8s Service Discovery ---
ftgo.discovery.namespace=${FTGO_K8S_NAMESPACE:ftgo-dev}
ftgo.discovery.cluster-domain=cluster.local
ftgo.discovery.services.order-service.host=ftgo-order-service
ftgo.discovery.services.order-service.port=8081
ftgo.discovery.services.restaurant-service.host=ftgo-restaurant-service
ftgo.discovery.services.restaurant-service.port=8083
ftgo.discovery.services.courier-service.host=ftgo-courier-service
ftgo.discovery.services.courier-service.port=8084
