spring:
  application:
    name: ftgo-consumer-service
  datasource:
    url: jdbc:mysql://localhost:3306/ftgo_consumer
    username: ftgo_user
    password: ${DB_PASSWORD:ftgo_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
