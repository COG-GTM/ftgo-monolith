# ============================================================
# FTGO Order Service - Application Configuration
# ============================================================

spring.application.name=ftgo-order-service

# Server
server.port=8081

# Database (per-service database pattern)
spring.datasource.url=jdbc:mysql://localhost:3306/ftgo_order_service
spring.datasource.username=ftgo_user
spring.datasource.password=ftgo_password
spring.datasource.driver-class-name=com.mysql.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5InnoDBDialect

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Logging
logging.level.com.ftgo.order=INFO
logging.level.org.springframework=WARN
