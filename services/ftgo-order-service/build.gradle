plugins {
    id 'ftgo.spring-boot-conventions'
    id 'ftgo.testing-conventions'
    id 'ftgo.docker-conventions'
}

version = '0.1.0-SNAPSHOT'

dependencies {
    implementation project(':libs:ftgo-common-lib')
    implementation project(':apis:ftgo-order-service-api')
    implementation project(':apis:ftgo-consumer-service-api')
    implementation project(':apis:ftgo-restaurant-service-api')

    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'io.micrometer:micrometer-registry-prometheus'

    runtimeOnly 'com.mysql:mysql-connector-j'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}
