apply plugin: 'org.springframework.boot'
apply plugin: 'io.spring.dependency-management'

dependencies {
    implementation project(":libs:ftgo-common")
    implementation project(":libs:ftgo-domain")
    implementation project(":libs:ftgo-openapi-lib")
    implementation project(":apis:ftgo-order-service-api")
    implementation project(":apis:ftgo-consumer-service-api")
    implementation project(":apis:ftgo-restaurant-service-api")

    implementation "org.springframework.boot:spring-boot-starter-web"
    implementation "org.springframework.boot:spring-boot-starter-data-jpa"
    implementation "org.springframework.boot:spring-boot-starter-actuator"
    implementation "io.micrometer:micrometer-registry-prometheus"

    runtimeOnly "mysql:mysql-connector-java"

    testImplementation "org.springframework.boot:spring-boot-starter-test"
    testImplementation "com.h2database:h2"
}
