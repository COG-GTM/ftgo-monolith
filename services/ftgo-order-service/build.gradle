// Microservices version of ftgo-order-service
// This module will eventually replace the monolith's ftgo-order-service
// During migration, both coexist side by side.

apply plugin: 'io.spring.dependency-management'
apply plugin: 'ftgo.quality-gate-conventions'

dependencies {
    // Shared libraries (uncomment as migration progresses)
    // compile project(':shared-ftgo-common')
    // compile project(':shared-ftgo-domain')

    // Spring Boot
    compile "org.springframework.boot:spring-boot-starter-web:$springBootVersion"
    compile "org.springframework.boot:spring-boot-starter-data-jpa:$springBootVersion"
    compile "org.springframework.boot:spring-boot-starter-actuator:$springBootVersion"

    // Security
    compile project(':shared-ftgo-security-lib')

    // Distributed Tracing (Micrometer Tracing + Brave + Zipkin)
    compile project(':shared-ftgo-tracing-lib')

    // Centralized Error Handling (@ControllerAdvice, Bean Validation)
    compile project(':shared-ftgo-error-handling-lib')

    // Testing
    testCompile "org.springframework.boot:spring-boot-starter-test:$springBootVersion"
    testCompile "org.springframework.security:spring-security-test:6.2.4"
}
