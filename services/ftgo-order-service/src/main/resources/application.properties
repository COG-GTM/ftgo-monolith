# FTGO Order Service
# See config/application.yml for full configuration
spring.application.name=ftgo-order-service

# --- Security Configuration ---
# Active profiles: include 'security' to enable shared security defaults
spring.profiles.include=security

# CORS — override allowed origins per environment
ftgo.security.cors.allowed-origins=http://localhost:3000,http://localhost:8080

# --- JWT Configuration ---
# Secret key MUST be provided via environment variable: FTGO_SECURITY_JWT_SECRET
# Minimum 256-bit (32-byte) key required for HS256
ftgo.security.jwt.secret=${FTGO_SECURITY_JWT_SECRET:}
ftgo.security.jwt.expiration-ms=3600000
ftgo.security.jwt.refresh-expiration-ms=86400000
ftgo.security.jwt.issuer=ftgo-platform

# Actuator endpoint exposure
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
