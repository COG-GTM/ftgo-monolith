// API Gateway - Spring Cloud Gateway build configuration
// This module serves as the single entry point for all FTGO microservices

apply plugin: 'ftgo.spring-boot-conventions'
apply plugin: 'ftgo.testing-conventions'
apply plugin: 'ftgo.docker-conventions'

ext {
    springCloudVersion = 'Finchley.RELEASE'
    resilience4jVersion = '0.13.2'
    jjwtVersion = '0.9.1'
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
    }
}

dependencies {
    // Spring Cloud Gateway (reactive, Netty-based)
    compile 'org.springframework.cloud:spring-cloud-starter-gateway'

    // Spring Boot Actuator for health checks and metrics
    compile "org.springframework.boot:spring-boot-starter-actuator:${FtgoVersions.SPRING_BOOT}"

    // Circuit Breaker - Resilience4j (core libs only; spring-boot starter excluded
    // because 0.13.x auto-config depends on Spring Boot 1.x actuator classes)
    compile "io.github.resilience4j:resilience4j-circuitbreaker:${resilience4jVersion}"
    compile "io.github.resilience4j:resilience4j-reactor:${resilience4jVersion}"

    // JWT validation
    compile "io.jsonwebtoken:jjwt:${jjwtVersion}"

    // Caffeine cache for rate limiting
    compile 'com.github.ben-manes.caffeine:caffeine:2.6.2'

    // Observability
    compile "io.micrometer:micrometer-registry-prometheus:${FtgoVersions.MICROMETER}"
}
