server:
  port: 8080

spring:
  application:
    name: ftgo-api-gateway

  # Redis configuration for rate limiting
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000

  cloud:
    gateway:
      # Default filters applied to all routes
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 20
            redis-rate-limiter.burstCapacity: 40
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@apiKeyResolver}"
        - name: Retry
          args:
            retries: 3
            statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
            methods: GET
            backoff:
              firstBackoff: 100ms
              maxBackoff: 500ms
              factor: 2

      # CORS is handled by the CorsConfig bean (CorsWebFilter) for full programmatic control

      # Discovery-based routing disabled (using explicit routes)
      discovery:
        locator:
          enabled: false

      # HTTP client settings
      httpclient:
        connect-timeout: 3000
        response-timeout: 5s

  # JWT validation configuration
  security:
    oauth2:
      resourceserver:
        jwt:
          # Configure one of the following:
          # Option 1: JWK Set URI for key discovery
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:9000/.well-known/jwks.json}
          # Option 2: Issuer URI (uncomment and use instead of jwk-set-uri)
          # issuer-uri: ${JWT_ISSUER_URI:http://localhost:9000}

# Downstream service URLs
ftgo:
  gateway:
    services:
      order-service-url: ${ORDER_SERVICE_URL:http://order-service:8080}
      consumer-service-url: ${CONSUMER_SERVICE_URL:http://consumer-service:8080}
      restaurant-service-url: ${RESTAURANT_SERVICE_URL:http://restaurant-service:8080}
      courier-service-url: ${COURIER_SERVICE_URL:http://courier-service:8080}
    cors:
      allowed-origins: "${CORS_ALLOWED_ORIGINS:*}"
      allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
      allowed-headers: "*"
      max-age: 3600
      allow-credentials: false
    ssl:
      enabled: false
      # key-store: classpath:keystore.p12
      # key-store-password: changeit
      # key-store-type: PKCS12
      # key-alias: ftgo-gateway

# Resilience4j circuit breaker configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
        minimumNumberOfCalls: 5
        slowCallRateThreshold: 80
        slowCallDurationThreshold: 3s
        registerHealthIndicator: true
        recordExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientResponseException
    instances:
      orderServiceCircuitBreaker:
        baseConfig: default
      consumerServiceCircuitBreaker:
        baseConfig: default
      restaurantServiceCircuitBreaker:
        baseConfig: default
      courierServiceCircuitBreaker:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s

# Actuator configuration
management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
    gateway:
      enabled: true
  health:
    circuitbreakers:
      enabled: true

# Logging
logging:
  level:
    net.chrisrichardson.ftgo.apigateway: INFO
    org.springframework.cloud.gateway: INFO
    io.github.resilience4j: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId:-}] %-5level %logger{36} - %msg%n"
