server:
  port: 0

spring:
  application:
    name: api-gateway-test
  main:
    web-application-type: reactive

ftgo:
  jwt:
    secret: test-secret-key-for-unit-testing-only-min-32-characters-long
    expiration: 3600000
    issuer: ftgo-platform-test
    header: Authorization
    prefix: "Bearer "
  gateway:
    cors:
      allowed-origins:
        - http://localhost:3000
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      allowed-headers:
        - "*"
      exposed-headers:
        - X-Correlation-Id
      allow-credentials: true
      max-age: 3600
    default-rate-limit:
      requests-per-second: 10
      burst-capacity: 20
    routes:
      - id: order-service
        path: /api/orders/**
        uri: http://localhost:8081
        strip-prefix: 1
        auth-required: true
        rate-limit: 10
        burst-capacity: 20
      - id: consumer-service
        path: /api/consumers/**
        uri: http://localhost:8082
        strip-prefix: 1
        auth-required: true
        rate-limit: 10
        burst-capacity: 20
      - id: restaurant-service
        path: /api/restaurants/**
        uri: http://localhost:8083
        strip-prefix: 1
        auth-required: true
        rate-limit: 10
        burst-capacity: 20
      - id: courier-service
        path: /api/couriers/**
        uri: http://localhost:8084
        strip-prefix: 1
        auth-required: true
        rate-limit: 10
        burst-capacity: 20

logging:
  level:
    com.ftgo.gateway: DEBUG
