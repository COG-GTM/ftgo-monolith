server:
  port: 0

spring:
  application:
    name: ftgo-api-gateway-test
  cloud:
    gateway:
      default-filters: []
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9999/.well-known/jwks.json
  data:
    redis:
      host: localhost
      port: 6379

ftgo:
  gateway:
    services:
      order-service-url: http://localhost:9091
      consumer-service-url: http://localhost:9092
      restaurant-service-url: http://localhost:9093
      courier-service-url: http://localhost:9094
    ssl:
      enabled: false

management:
  server:
    port: 0

logging:
  level:
    net.chrisrichardson.ftgo.apigateway: DEBUG
