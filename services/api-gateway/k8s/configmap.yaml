apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  labels:
    app: api-gateway
    part-of: ftgo
data:
  SPRING_PROFILES_ACTIVE: "kubernetes"
  SERVER_PORT: "8080"
  GATEWAY_JWT_ENABLED: "true"
  GATEWAY_RATE_LIMIT_ENABLED: "true"
  GATEWAY_RATE_LIMIT_MAX_REQUESTS: "100"
  GATEWAY_RATE_LIMIT_WINDOW_SECONDS: "60"
  GATEWAY_SERVICES_ORDER_SERVICE_URL: "http://order-service:8081"
  GATEWAY_SERVICES_CONSUMER_SERVICE_URL: "http://consumer-service:8082"
  GATEWAY_SERVICES_RESTAURANT_SERVICE_URL: "http://restaurant-service:8083"
  GATEWAY_SERVICES_COURIER_SERVICE_URL: "http://courier-service:8084"
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_COM_FTGO_GATEWAY: "DEBUG"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics,prometheus"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"
