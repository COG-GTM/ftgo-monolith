# Application configuration for the service
# Override with environment-specific profiles: application-{profile}.yml
spring:
  application:
    name: courier-service
  datasource:
    url: jdbc:mysql://localhost:3306/courier-service
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: when-authorized
  metrics:
    tags:
      service: courier-service
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 100ms,250ms,500ms,1s,2s
  prometheus:
    metrics:
      export:
        enabled: true
  server:
    port: 8081
