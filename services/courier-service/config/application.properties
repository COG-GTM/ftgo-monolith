# Courier Service Configuration
# ===============================
# This file contains service-specific configuration for the Courier microservice.
# Environment-specific overrides should use Spring profiles (application-{profile}.properties).

spring.application.name=courier-service
server.port=8085

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/ftgo_courier_service
spring.datasource.driver-class-name=com.mysql.jdbc.Driver
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=validate

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
