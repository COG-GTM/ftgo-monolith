spring:
  application:
    name: ftgo-template-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ftgo_template}
    username: ${SPRING_DATASOURCE_USERNAME:ftgo_user}
    password: ${DB_PASSWORD:ftgo_password}
  jpa:
    hibernate:
      ddl-auto: validate

server:
  port: ${SERVER_PORT:8080}
