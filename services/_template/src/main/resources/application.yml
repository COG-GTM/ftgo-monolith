spring:
  application:
    name: ftgo-template-service
  datasource:
    url: jdbc:mysql://localhost:3306/ftgo_template
    username: ftgo_user
    password: ${DB_PASSWORD:ftgo_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
