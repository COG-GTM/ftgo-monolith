# =============================================================================
# Docker Compose — Microservices (Pull from GHCR)
# =============================================================================
# Runs all FTGO microservices using pre-built images from GitHub Container
# Registry. Intended for local development and integration testing.
#
# Usage:
#   # Pull latest images and start all services
#   docker-compose -f docker-compose-services.yml up -d
#
#   # Start with metrics stack
#   docker-compose -f docker-compose-services.yml -f docker-compose-metrics.yml up -d
#
#   # Override with local builds (see docker-compose-services.override.yml)
#   docker-compose -f docker-compose-services.yml -f docker-compose-services.override.yml up -d
#
# Prerequisites:
#   - Docker & Docker Compose v2+
#   - Authenticated to GHCR: docker login ghcr.io -u <GITHUB_USER> -p <GITHUB_PAT>
#
# Environment variables (optional):
#   IMAGE_TAG  — image tag to pull (default: latest)
# =============================================================================

version: '3.8'

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - ftgo-network
  environment: &common-env
    SPRING_PROFILES_ACTIVE: docker
    SPRING_DATASOURCE_URL: jdbc:mysql://ftgo-mysql:3306/ftgo
    SPRING_DATASOURCE_USERNAME: mysqluser
    SPRING_DATASOURCE_PASSWORD: mysqlpw
    JAVA_OPTS: "-Xmx256m"

services:
  # ---------------------------------------------------------------------------
  # MySQL Database
  # ---------------------------------------------------------------------------
  ftgo-mysql:
    image: ghcr.io/cog-gtm/ftgo-monolith/ftgo-mysql:${IMAGE_TAG:-latest}
    container_name: ftgo-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: mysqluser
      MYSQL_PASSWORD: mysqlpw
      MYSQL_DATABASE: ftgo
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ftgo-network

  # ---------------------------------------------------------------------------
  # API Gateway
  # ---------------------------------------------------------------------------
  ftgo-api-gateway:
    <<: *service-defaults
    image: ghcr.io/cog-gtm/ftgo-monolith/ftgo-api-gateway:${IMAGE_TAG:-latest}
    container_name: ftgo-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      ftgo-order-service:
        condition: service_started
      ftgo-consumer-service:
        condition: service_started
      ftgo-restaurant-service:
        condition: service_started
      ftgo-courier-service:
        condition: service_started
    environment:
      <<: *common-env
      SERVER_PORT: "8080"
      FTGO_ORDER_SERVICE_URL: "http://ftgo-order-service:8081"
      FTGO_CONSUMER_SERVICE_URL: "http://ftgo-consumer-service:8082"
      FTGO_RESTAURANT_SERVICE_URL: "http://ftgo-restaurant-service:8083"
      FTGO_COURIER_SERVICE_URL: "http://ftgo-courier-service:8084"
      SPRING_REDIS_HOST: "ftgo-redis"

  # ---------------------------------------------------------------------------
  # Redis (for API Gateway rate limiting)
  # ---------------------------------------------------------------------------
  ftgo-redis:
    image: redis:7-alpine
    container_name: ftgo-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ftgo-network

  # ---------------------------------------------------------------------------
  # Order Service
  # ---------------------------------------------------------------------------
  ftgo-order-service:
    <<: *service-defaults
    image: ghcr.io/cog-gtm/ftgo-monolith/ftgo-order-service:${IMAGE_TAG:-latest}
    container_name: ftgo-order-service
    ports:
      - "8081:8081"
    depends_on:
      ftgo-mysql:
        condition: service_healthy
    environment:
      <<: *common-env
      SERVER_PORT: "8081"

  # ---------------------------------------------------------------------------
  # Consumer Service
  # ---------------------------------------------------------------------------
  ftgo-consumer-service:
    <<: *service-defaults
    image: ghcr.io/cog-gtm/ftgo-monolith/ftgo-consumer-service:${IMAGE_TAG:-latest}
    container_name: ftgo-consumer-service
    ports:
      - "8082:8082"
    depends_on:
      ftgo-mysql:
        condition: service_healthy
    environment:
      <<: *common-env
      SERVER_PORT: "8082"

  # ---------------------------------------------------------------------------
  # Restaurant Service
  # ---------------------------------------------------------------------------
  ftgo-restaurant-service:
    <<: *service-defaults
    image: ghcr.io/cog-gtm/ftgo-monolith/ftgo-restaurant-service:${IMAGE_TAG:-latest}
    container_name: ftgo-restaurant-service
    ports:
      - "8083:8083"
    depends_on:
      ftgo-mysql:
        condition: service_healthy
    environment:
      <<: *common-env
      SERVER_PORT: "8083"

  # ---------------------------------------------------------------------------
  # Courier Service
  # ---------------------------------------------------------------------------
  ftgo-courier-service:
    <<: *service-defaults
    image: ghcr.io/cog-gtm/ftgo-monolith/ftgo-courier-service:${IMAGE_TAG:-latest}
    container_name: ftgo-courier-service
    ports:
      - "8084:8084"
    depends_on:
      ftgo-mysql:
        condition: service_healthy
    environment:
      <<: *common-env
      SERVER_PORT: "8084"

volumes:
  mysql-data:
    driver: local

networks:
  ftgo-network:
    driver: bridge
