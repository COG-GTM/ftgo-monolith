plugins {
    id 'ftgo.spring-boot-conventions'
    id 'ftgo.testing-conventions'
}

dependencies {
    implementation project(":shared-libraries:ftgo-openapi-lib")
    implementation project(":ftgo-restaurant-service-api")
    implementation project(":ftgo-domain")

    implementation libs.bundles.spring.boot.service
    implementation libs.jakarta.el.api

    testImplementation libs.bundles.rest.assured.testing
}
