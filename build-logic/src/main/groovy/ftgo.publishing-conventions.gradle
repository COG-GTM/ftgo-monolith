// =============================================================================
// ftgo.publishing-conventions - Maven Publishing Convention Plugin
// =============================================================================
// Configures Maven publishing for shared libraries (under shared/).
// Sets up standardized POM metadata, artifact naming, and repository targets.
//
// Usage in build.gradle:
//   plugins {
//       id 'ftgo.publishing-conventions'
//   }
//
// This plugin is intended for shared libraries only (not bootable services).
// Services should use ftgo.spring-boot-conventions instead.
// =============================================================================

plugins {
    id 'ftgo.java-conventions'
    id 'maven-publish'
}

// Shared libraries produce a regular JAR (not a Spring Boot fat JAR)
java {
    withJavadocJar()
    withSourcesJar()
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java

            pom {
                name = project.name
                description = "FTGO shared library: ${project.name}"
                url = 'https://github.com/COG-GTM/ftgo-monolith'

                licenses {
                    license {
                        name = 'MIT License'
                        url = 'https://opensource.org/licenses/MIT'
                    }
                }
            }
        }
    }

    repositories {
        maven {
            name = 'local'
            url = layout.buildDirectory.dir('repo')
        }

        // Add additional repositories as needed:
        // maven {
        //     name = 'artifactory'
        //     url = findProperty('artifactoryUrl') ?: 'https://artifactory.example.com/libs-release'
        //     credentials {
        //         username = findProperty('artifactoryUsername') ?: ''
        //         password = findProperty('artifactoryPassword') ?: ''
        //     }
        // }
    }
}
