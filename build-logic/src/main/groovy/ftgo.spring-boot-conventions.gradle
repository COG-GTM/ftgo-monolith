// =============================================================================
// ftgo.spring-boot-conventions - Spring Boot Convention Plugin
// =============================================================================
// Extends ftgo.java-conventions with Spring Boot and dependency management.
// Configures the Spring Boot plugin, dependency management, and common
// Spring Boot dependencies shared across all microservices.
//
// Usage in build.gradle:
//   plugins {
//       id 'ftgo.spring-boot-conventions'
//   }
//
//   dependencies {
//       // Only service-specific dependencies needed here
//       implementation project(':shared:ftgo-domain')
//   }
// =============================================================================

plugins {
    id 'ftgo.java-conventions'
    id 'ftgo.observability-conventions'
    id 'org.springframework.boot'
    id 'io.spring.dependency-management'
}

dependencies {
    // Common Spring Boot starters for all microservices
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-validation'

    // API documentation
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.4.0'

    // Development tools (optional, not included in production builds)
    developmentOnly 'org.springframework.boot:spring-boot-devtools'

    // Annotation processor for configuration metadata
    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'
}

springBoot {
    buildInfo()
}

bootJar {
    enabled = true
}

jar {
    enabled = false
}
