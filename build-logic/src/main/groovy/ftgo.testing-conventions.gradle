// =============================================================================
// ftgo.testing-conventions - Testing Convention Plugin
// =============================================================================
// Configures standard testing infrastructure for all new FTGO modules.
// Sets up JUnit 5, integration test source set, JaCoCo code coverage,
// and common test dependencies.
//
// Usage in build.gradle:
//   plugins {
//       id 'ftgo.testing-conventions'
//   }
// =============================================================================

plugins {
    id 'ftgo.java-conventions'
    id 'jacoco'
}

// ---------------------------------------------------------------------------
// JaCoCo code coverage configuration
// ---------------------------------------------------------------------------

jacoco {
    toolVersion = '0.8.11'
}

tasks.named('jacocoTestReport') {
    dependsOn tasks.named('test')

    reports {
        xml.required = true
        html.required = true
        csv.required = false
    }

    // Exclude generated code, DTOs, configuration classes from coverage
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: [
                '**/config/**',
                '**/configuration/**',
                '**/*Configuration.class',
                '**/*Config.class',
                '**/*Application.class',
                '**/*Main.class',
                '**/dto/**',
                '**/model/*Request.class',
                '**/model/*Response.class',
            ])
        }))
    }
}

tasks.named('jacocoTestCoverageVerification') {
    dependsOn tasks.named('jacocoTestReport')

    violationRules {
        rule {
            limit {
                minimum = 0.70
            }
        }
    }
}

// ---------------------------------------------------------------------------
// Unit test configuration
// ---------------------------------------------------------------------------

dependencies {
    testImplementation 'org.springframework.boot:spring-boot-starter-test:3.2.5'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testImplementation 'org.mockito:mockito-core:5.11.0'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.11.0'
    testImplementation 'org.assertj:assertj-core:3.25.3'
}

tasks.named('test') {
    useJUnitPlatform()

    testLogging {
        events 'passed', 'skipped', 'failed'
        showStandardStreams = false
        exceptionFormat = 'full'
    }

    // Fail the build on any test failure
    ignoreFailures = false

    // Enable parallel test execution for faster feedback
    maxParallelForks = Runtime.runtime.availableProcessors().intdiv(2) ?: 1

    // Generate JaCoCo coverage data
    finalizedBy tasks.named('jacocoTestReport')
}

// ---------------------------------------------------------------------------
// Integration test source set and task
// ---------------------------------------------------------------------------

sourceSets {
    integrationTest {
        java {
            compileClasspath += sourceSets.main.output + sourceSets.test.output
            runtimeClasspath += sourceSets.main.output + sourceSets.test.output
            srcDir 'src/integration-test/java'
        }
        resources.srcDir 'src/integration-test/resources'
    }
}

configurations {
    integrationTestImplementation.extendsFrom testImplementation
    integrationTestRuntimeOnly.extendsFrom testRuntimeOnly
}

tasks.register('integrationTest', Test) {
    description = 'Runs integration tests.'
    group = 'verification'

    testClassesDirs = sourceSets.integrationTest.output.classesDirs
    classpath = sourceSets.integrationTest.runtimeClasspath

    useJUnitPlatform()

    testLogging {
        events 'passed', 'skipped', 'failed'
        showStandardStreams = true
        exceptionFormat = 'full'
    }

    shouldRunAfter tasks.named('test')
}

// JaCoCo report for integration tests
tasks.register('jacocoIntegrationTestReport', JacocoReport) {
    description = 'Generates JaCoCo coverage report for integration tests.'
    group = 'verification'

    executionData tasks.named('integrationTest')
    sourceSets sourceSets.main

    reports {
        xml.required = true
        html.required = true
        csv.required = false
    }
}

// Include integration tests in the check lifecycle
tasks.named('check') {
    dependsOn tasks.named('integrationTest')
}
