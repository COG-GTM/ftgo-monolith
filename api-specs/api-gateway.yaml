openapi: 3.0.3
info:
  title: FTGO API Gateway
  description: |
    Top-level API Gateway that aggregates and routes requests to the FTGO microservices.
    This gateway serves as the single entry point for all client applications (web, mobile)
    and handles cross-cutting concerns such as authentication, rate limiting, request routing,
    and API composition.

    ## Routing

    | Path Prefix       | Target Service      | Port  |
    |--------------------|---------------------|-------|
    | `/orders/**`       | Order Service       | 8081  |
    | `/consumers/**`    | Consumer Service    | 8082  |
    | `/restaurants/**`  | Restaurant Service  | 8083  |
    | `/couriers/**`     | Courier Service     | 8084  |

    ## API Composition

    Some gateway endpoints aggregate data from multiple services to provide a richer
    response to clients. For example, the order details endpoint enriches order data
    with consumer name, restaurant details, and courier tracking information.
  version: 1.0.0
  contact:
    name: FTGO Platform Team
    email: platform@ftgo.com

servers:
  - url: http://localhost:8080
    description: Local development gateway
  - url: https://api.ftgo.com
    description: Production API gateway

tags:
  - name: Orders
    description: Order management (routed to Order Service)
  - name: Consumers
    description: Consumer management (routed to Consumer Service)
  - name: Restaurants
    description: Restaurant management (routed to Restaurant Service)
  - name: Couriers
    description: Courier management (routed to Courier Service)
  - name: API Composition
    description: Aggregated endpoints that combine data from multiple services

security:
  - bearerAuth: []

paths:
  # ──────────────────────────────────────────────
  # Order Service Routes
  # ──────────────────────────────────────────────
  /orders:
    post:
      tags:
        - Orders
      summary: Create a new order
      description: Routes to Order Service. Creates a new order for a consumer at a restaurant.
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '200':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrderResponse'
        '400':
          description: Invalid request
        '404':
          description: Consumer or restaurant not found
        '401':
          description: Unauthorized
    get:
      tags:
        - Orders
      summary: Get orders for a consumer
      description: Routes to Order Service. Retrieves all orders for a consumer.
      operationId: getOrders
      parameters:
        - name: consumerId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GetOrderResponse'
        '401':
          description: Unauthorized

  /orders/{orderId}:
    get:
      tags:
        - Orders
      summary: Get order by ID
      description: Routes to Order Service. Retrieves order details.
      operationId: getOrder
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetOrderResponse'
        '404':
          description: Order not found
        '401':
          description: Unauthorized

  /orders/{orderId}/cancel:
    post:
      tags:
        - Orders
      summary: Cancel an order
      description: Routes to Order Service. Cancels an order in APPROVED state.
      operationId: cancelOrder
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetOrderResponse'
        '404':
          description: Order not found
        '409':
          description: Order cannot be cancelled in current state
        '401':
          description: Unauthorized

  /orders/{orderId}/revise:
    post:
      tags:
        - Orders
      summary: Revise an order
      description: Routes to Order Service. Revises line item quantities.
      operationId: reviseOrder
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviseOrderRequest'
      responses:
        '200':
          description: Order revised
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetOrderResponse'
        '404':
          description: Order not found
        '409':
          description: Order cannot be revised in current state
        '401':
          description: Unauthorized

  /orders/{orderId}/accept:
    post:
      tags:
        - Orders
      summary: Accept an order
      description: Routes to Order Service. Restaurant accepts the order.
      operationId: acceptOrder
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderAcceptance'
      responses:
        '200':
          description: Order accepted
        '404':
          description: Order not found
        '409':
          description: Invalid state transition
        '401':
          description: Unauthorized

  /orders/{orderId}/preparing:
    post:
      tags:
        - Orders
      summary: Mark order as preparing
      description: Routes to Order Service. Restaurant starts food preparation.
      operationId: noteOrderPreparing
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order marked as preparing
        '404':
          description: Order not found
        '409':
          description: Invalid state transition
        '401':
          description: Unauthorized

  /orders/{orderId}/ready:
    post:
      tags:
        - Orders
      summary: Mark order as ready for pickup
      description: Routes to Order Service. Food is ready for courier pickup.
      operationId: noteOrderReady
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order ready for pickup
        '404':
          description: Order not found
        '409':
          description: Invalid state transition
        '401':
          description: Unauthorized

  /orders/{orderId}/pickedup:
    post:
      tags:
        - Orders
      summary: Mark order as picked up
      description: Routes to Order Service. Courier has picked up the order.
      operationId: noteOrderPickedUp
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order picked up
        '404':
          description: Order not found
        '409':
          description: Invalid state transition
        '401':
          description: Unauthorized

  /orders/{orderId}/delivered:
    post:
      tags:
        - Orders
      summary: Mark order as delivered
      description: Routes to Order Service. Order has been delivered to consumer.
      operationId: noteOrderDelivered
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order delivered
        '404':
          description: Order not found
        '409':
          description: Invalid state transition
        '401':
          description: Unauthorized

  # ──────────────────────────────────────────────
  # Consumer Service Routes
  # ──────────────────────────────────────────────
  /consumers:
    post:
      tags:
        - Consumers
      summary: Register a new consumer
      description: Routes to Consumer Service. Creates a new consumer account.
      operationId: createConsumer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConsumerRequest'
      responses:
        '200':
          description: Consumer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateConsumerResponse'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized

  /consumers/{consumerId}:
    get:
      tags:
        - Consumers
      summary: Get consumer by ID
      description: Routes to Consumer Service. Retrieves consumer details.
      operationId: getConsumer
      parameters:
        - $ref: '#/components/parameters/ConsumerId'
      responses:
        '200':
          description: Consumer details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetConsumerResponse'
        '404':
          description: Consumer not found
        '401':
          description: Unauthorized

  # ──────────────────────────────────────────────
  # Restaurant Service Routes
  # ──────────────────────────────────────────────
  /restaurants:
    post:
      tags:
        - Restaurants
      summary: Register a new restaurant
      description: Routes to Restaurant Service. Creates a new restaurant with menu.
      operationId: createRestaurant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRestaurantRequest'
      responses:
        '200':
          description: Restaurant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateRestaurantResponse'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized

  /restaurants/{restaurantId}:
    get:
      tags:
        - Restaurants
      summary: Get restaurant by ID
      description: Routes to Restaurant Service. Retrieves restaurant details.
      operationId: getRestaurant
      parameters:
        - $ref: '#/components/parameters/RestaurantId'
      responses:
        '200':
          description: Restaurant details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetRestaurantResponse'
        '404':
          description: Restaurant not found
        '401':
          description: Unauthorized

  # ──────────────────────────────────────────────
  # Courier Service Routes
  # ──────────────────────────────────────────────
  /couriers:
    post:
      tags:
        - Couriers
      summary: Register a new courier
      description: Routes to Courier Service. Creates a new courier.
      operationId: createCourier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCourierRequest'
      responses:
        '200':
          description: Courier created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCourierResponse'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized

  /couriers/{courierId}:
    get:
      tags:
        - Couriers
      summary: Get courier by ID
      description: Routes to Courier Service. Retrieves courier details.
      operationId: getCourier
      parameters:
        - $ref: '#/components/parameters/CourierId'
      responses:
        '200':
          description: Courier details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourierResponse'
        '404':
          description: Courier not found
        '401':
          description: Unauthorized

  /couriers/{courierId}/availability:
    post:
      tags:
        - Couriers
      summary: Update courier availability
      description: Routes to Courier Service. Sets courier availability status.
      operationId: updateCourierAvailability
      parameters:
        - $ref: '#/components/parameters/CourierId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourierAvailability'
      responses:
        '200':
          description: Availability updated
        '404':
          description: Courier not found
        '401':
          description: Unauthorized

  /couriers/{courierId}/location:
    post:
      tags:
        - Couriers
      summary: Update courier location
      description: Routes to Courier Service. Updates courier GPS coordinates.
      operationId: updateCourierLocation
      parameters:
        - $ref: '#/components/parameters/CourierId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourierLocationUpdate'
      responses:
        '200':
          description: Location updated
        '404':
          description: Courier not found
        '401':
          description: Unauthorized

  /couriers/{courierId}/workload:
    get:
      tags:
        - Couriers
      summary: Get courier workload
      description: Routes to Courier Service. Retrieves courier workload data.
      operationId: getCourierWorkload
      parameters:
        - $ref: '#/components/parameters/CourierId'
      responses:
        '200':
          description: Courier workload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourierWorkloadResponse'
        '404':
          description: Courier not found
        '401':
          description: Unauthorized

  # ──────────────────────────────────────────────
  # API Composition (aggregated endpoints)
  # ──────────────────────────────────────────────
  /orders/{orderId}/details:
    get:
      tags:
        - API Composition
      summary: Get enriched order details
      description: |
        API composition endpoint that aggregates data from Order Service, Consumer Service,
        Restaurant Service, and Courier Service to provide a complete view of an order.
        This endpoint is handled by the API Gateway and makes parallel calls to the
        downstream services.
      operationId: getOrderDetails
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Enriched order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetailsComposite'
        '404':
          description: Order not found
        '401':
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from the authentication service

  parameters:
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: Unique identifier of the order

    ConsumerId:
      name: consumerId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: Unique identifier of the consumer

    RestaurantId:
      name: restaurantId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: Unique identifier of the restaurant

    CourierId:
      name: courierId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: Unique identifier of the courier

  schemas:
    # ── Order Schemas ──
    CreateOrderRequest:
      type: object
      required:
        - consumerId
        - restaurantId
        - lineItems
      properties:
        consumerId:
          type: integer
          format: int64
        restaurantId:
          type: integer
          format: int64
        lineItems:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/LineItem'

    LineItem:
      type: object
      required:
        - menuItemId
        - quantity
      properties:
        menuItemId:
          type: string
        quantity:
          type: integer
          minimum: 1

    CreateOrderResponse:
      type: object
      properties:
        orderId:
          type: integer
          format: int64

    GetOrderResponse:
      type: object
      properties:
        orderId:
          type: integer
          format: int64
        orderState:
          $ref: '#/components/schemas/OrderState'
        orderTotal:
          $ref: '#/components/schemas/Money'
        restaurantName:
          type: string
        assignedCourierId:
          type: integer
          format: int64
          nullable: true
        courierActions:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/CourierAction'
        estimatedDeliveryTime:
          type: string
          format: date-time
          nullable: true

    ReviseOrderRequest:
      type: object
      required:
        - revisedLineItemQuantities
      properties:
        revisedLineItemQuantities:
          type: object
          additionalProperties:
            type: integer

    OrderAcceptance:
      type: object
      required:
        - readyBy
      properties:
        readyBy:
          type: string
          format: date-time

    OrderState:
      type: string
      enum:
        - APPROVED
        - ACCEPTED
        - PREPARING
        - READY_FOR_PICKUP
        - PICKED_UP
        - DELIVERED
        - CANCELLED

    CourierAction:
      type: object
      properties:
        type:
          type: string
          enum: [PICKUP, DROPOFF]
        time:
          type: string
          format: date-time
          nullable: true

    # ── Consumer Schemas ──
    CreateConsumerRequest:
      type: object
      required:
        - name
      properties:
        name:
          $ref: '#/components/schemas/PersonName'

    CreateConsumerResponse:
      type: object
      properties:
        consumerId:
          type: integer
          format: int64

    GetConsumerResponse:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/PersonName'

    # ── Restaurant Schemas ──
    CreateRestaurantRequest:
      type: object
      required:
        - name
        - menu
      properties:
        name:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        menu:
          $ref: '#/components/schemas/RestaurantMenu'

    CreateRestaurantResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64

    GetRestaurantResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string

    RestaurantMenu:
      type: object
      properties:
        menuItemDTOs:
          type: array
          items:
            $ref: '#/components/schemas/MenuItem'

    MenuItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          $ref: '#/components/schemas/Money'

    # ── Courier Schemas ──
    CreateCourierRequest:
      type: object
      required:
        - name
      properties:
        name:
          $ref: '#/components/schemas/PersonName'
        address:
          $ref: '#/components/schemas/Address'

    CreateCourierResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64

    CourierResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          $ref: '#/components/schemas/PersonName'
        address:
          $ref: '#/components/schemas/Address'
        available:
          type: boolean
        currentLatitude:
          type: number
          format: double
          nullable: true
        currentLongitude:
          type: number
          format: double
          nullable: true
        lastLocationUpdate:
          type: string
          format: date-time
          nullable: true

    CourierAvailability:
      type: object
      required:
        - available
      properties:
        available:
          type: boolean

    CourierLocationUpdate:
      type: object
      required:
        - latitude
        - longitude
      properties:
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double

    CourierWorkloadResponse:
      type: object
      properties:
        courierId:
          type: integer
          format: int64
        activeDeliveries:
          type: integer
        available:
          type: boolean
        currentLatitude:
          type: number
          format: double
          nullable: true
        currentLongitude:
          type: number
          format: double
          nullable: true
        lastLocationUpdate:
          type: string
          format: date-time
          nullable: true

    # ── API Composition Schemas ──
    OrderDetailsComposite:
      type: object
      description: Aggregated order view combining data from multiple services
      properties:
        orderId:
          type: integer
          format: int64
        orderState:
          $ref: '#/components/schemas/OrderState'
        orderTotal:
          $ref: '#/components/schemas/Money'
        consumer:
          type: object
          properties:
            consumerId:
              type: integer
              format: int64
            name:
              $ref: '#/components/schemas/PersonName'
        restaurant:
          type: object
          properties:
            restaurantId:
              type: integer
              format: int64
            name:
              type: string
            address:
              $ref: '#/components/schemas/Address'
        courier:
          type: object
          nullable: true
          properties:
            courierId:
              type: integer
              format: int64
            name:
              $ref: '#/components/schemas/PersonName'
            currentLatitude:
              type: number
              format: double
              nullable: true
            currentLongitude:
              type: number
              format: double
              nullable: true
            actions:
              type: array
              items:
                $ref: '#/components/schemas/CourierAction'
        estimatedDeliveryTime:
          type: string
          format: date-time
          nullable: true
        lineItems:
          type: array
          items:
            type: object
            properties:
              menuItemId:
                type: string
              name:
                type: string
              price:
                $ref: '#/components/schemas/Money'
              quantity:
                type: integer

    # ── Common Schemas ──
    PersonName:
      type: object
      required:
        - firstName
        - lastName
      properties:
        firstName:
          type: string
        lastName:
          type: string

    Address:
      type: object
      properties:
        street1:
          type: string
        street2:
          type: string
          nullable: true
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true

    Money:
      type: object
      properties:
        amount:
          type: string
