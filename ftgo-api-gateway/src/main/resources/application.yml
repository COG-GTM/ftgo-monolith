server:
  port: 8080

spring:
  application:
    name: ftgo-api-gateway

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVICE_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway

ftgo:
  security:
    jwt:
      secret: ${FTGO_JWT_SECRET:ftgo-microservices-secret-key-change-in-production}
      expiration-ms: 86400000
