spring.application.name=ftgo-application

spring.jpa.generate-ddl=false
logging.level.org.springframework.orm.jpa=INFO
logging.level.org.hibernate.SQL=DEBUG
spring.datasource.url=jdbc:mysql://${DOCKER_HOST_IP:localhost}/ftgo?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:mysqluser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mysqlpw}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Service URLs for inter-service communication (when running as monolith, all services are on localhost)
ftgo.services.consumer.url=http://localhost:${server.port:8080}
ftgo.services.restaurant.url=http://localhost:${server.port:8080}
ftgo.services.courier.url=http://localhost:${server.port:8080}
