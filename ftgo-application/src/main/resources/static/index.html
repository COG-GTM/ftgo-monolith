<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTGO - Order Management Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <h1 class="app-title">FTGO</h1>
        <span class="app-subtitle">Order Management</span>
      </div>
      <div class="header-right">
        <button class="btn btn-icon" id="refresh-btn" title="Refresh data">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M13.65 2.35A7.958 7.958 0 008 0C3.58 0 .01 3.58.01 8S3.58 16 8 16c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 018 14 6 6 0 012 8a6 6 0 016-6c1.66 0 3.14.69 4.22 1.78L9 7h7V0l-2.35 2.35z" fill="currentColor"/>
          </svg>
        </button>
        <span class="header-timestamp" id="last-updated"></span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">

      <!-- Stats Row -->
      <section class="stats-row" id="stats-row">
        <!-- Populated by JS -->
      </section>

      <!-- Order Pipeline -->
      <section class="card pipeline-card">
        <div class="card-header">
          <h2 class="card-title">Order Pipeline</h2>
          <span class="card-badge" id="pipeline-total-badge"></span>
        </div>
        <div class="pipeline-bar" id="pipeline-bar">
          <!-- Populated by JS -->
        </div>
        <div class="pipeline-labels" id="pipeline-labels">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- Two-Column Layout: Kanban + Order Detail -->
      <div class="grid-two-col">

        <!-- Kanban Board -->
        <section class="card kanban-card">
          <div class="card-header">
            <h2 class="card-title">Kanban Board</h2>
          </div>
          <div class="kanban-board" id="kanban-board">
            <!-- Populated by JS -->
          </div>
        </section>

        <!-- Order Detail Panel -->
        <section class="card detail-card">
          <div class="card-header">
            <h2 class="card-title">Order Detail</h2>
          </div>
          <div class="detail-panel" id="detail-panel">
            <div class="detail-empty">
              <p>Select an order from the kanban board to view details.</p>
            </div>
          </div>
        </section>

      </div>

      <!-- Recent Orders Table -->
      <section class="card">
        <div class="card-header">
          <h2 class="card-title">Recent Orders</h2>
        </div>
        <div class="table-wrapper">
          <table class="data-table" id="orders-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Restaurant</th>
                <th>Status</th>
                <th>Total</th>
                <th>Courier</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="orders-table-body">
              <!-- Populated by JS -->
            </tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
