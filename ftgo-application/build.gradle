plugins {
    id 'ftgo.spring-boot-conventions'
    id 'ftgo.testing-conventions'
}

// This is the main application - enable bootJar for executable JAR
bootJar { enabled = true }
jar { enabled = false }

dependencies {
    implementation project(":ftgo-consumer-service")
    implementation project(":ftgo-order-service")
    implementation project(":ftgo-restaurant-service")
    implementation project(":ftgo-courier-service")

    implementation project(":shared-libraries:ftgo-openapi-lib")

    implementation libs.spring.boot.starter.actuator
    implementation libs.spring.boot.starter.web

    testImplementation project(":ftgo-end-to-end-tests-common")
}
