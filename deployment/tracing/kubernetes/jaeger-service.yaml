apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: ftgo-tracing
  labels:
    app: jaeger
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/part-of: ftgo
    app.kubernetes.io/component: tracing
spec:
  type: ClusterIP
  selector:
    app: jaeger
  ports:
    - name: zipkin-compact
      port: 5775
      targetPort: 5775
      protocol: UDP
    - name: jaeger-compact
      port: 6831
      targetPort: 6831
      protocol: UDP
    - name: jaeger-binary
      port: 6832
      targetPort: 6832
      protocol: UDP
    - name: config
      port: 5778
      targetPort: 5778
      protocol: TCP
    - name: ui
      port: 16686
      targetPort: 16686
      protocol: TCP
    - name: collector-http
      port: 14268
      targetPort: 14268
      protocol: TCP
    - name: collector-grpc
      port: 14250
      targetPort: 14250
      protocol: TCP
    - name: zipkin
      port: 9411
      targetPort: 9411
      protocol: TCP
