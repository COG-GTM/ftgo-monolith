apiVersion: v1
kind: Service
metadata:
  name: ftgo-mysql
  labels:
    app.kubernetes.io/name: ftgo-mysql
    app.kubernetes.io/part-of: ftgo-platform
spec:
  ports:
    - port: 3306
      targetPort: mysql
      protocol: TCP
      name: mysql
  clusterIP: None
  selector:
    app.kubernetes.io/name: ftgo-mysql
---
# Migrated from apps/v1beta1 to apps/v1 (EM-35)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ftgo-mysql
  labels:
    app.kubernetes.io/name: ftgo-mysql
    app.kubernetes.io/part-of: ftgo-platform
spec:
  serviceName: ftgo-mysql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ftgo-mysql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ftgo-mysql
        app.kubernetes.io/part-of: ftgo-platform
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ftgo-db-secret
                  key: root-password
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: ftgo-db-secret
                  key: username
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ftgo-db-secret
                  key: password
            - name: MYSQL_DATABASE
              value: ftgo
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: ftgo-mysql-persistent-storage
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: ftgo-mysql-persistent-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
