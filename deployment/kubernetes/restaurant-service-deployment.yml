apiVersion: v1
kind: Service
metadata:
  name: restaurant-service
spec:
  ports:
  - port: 8082
    targetPort: 8082
  selector:
    app: restaurant-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: restaurant-service
  template:
    metadata:
      labels:
        app: restaurant-service
    spec:
      containers:
      - name: restaurant-service
        image: ftgo-restaurant-service:latest
        ports:
        - containerPort: 8082
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:mysql://restaurant-mysql:3306/ftgo_restaurant?useSSL=false
        - name: SPRING_DATASOURCE_USERNAME
          value: mysqluser
        - name: SPRING_DATASOURCE_PASSWORD
          value: mysqlpw
        - name: SERVER_PORT
          value: "8082"
