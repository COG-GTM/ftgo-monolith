apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  ports:
  - port: 8084
    targetPort: 8084
  selector:
    app: order-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: ftgo-order-service:latest
        ports:
        - containerPort: 8084
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:mysql://order-mysql:3306/ftgo_order?useSSL=false
        - name: SPRING_DATASOURCE_USERNAME
          value: mysqluser
        - name: SPRING_DATASOURCE_PASSWORD
          value: mysqlpw
        - name: SERVER_PORT
          value: "8084"
        - name: CONSUMER_SERVICE_URL
          value: http://consumer-service:8081
        - name: RESTAURANT_SERVICE_URL
          value: http://restaurant-service:8082
        - name: COURIER_SERVICE_URL
          value: http://courier-service:8083
