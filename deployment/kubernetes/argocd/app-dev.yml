apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ftgo-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ftgo
    environment: dev
  annotations:
    argocd.argoproj.io/manifest-generate-paths: deployment/kubernetes/overlays/dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ftgo
  source:
    repoURL: https://github.com/COG-GTM/ftgo-monolith.git
    targetRevision: main
    path: deployment/kubernetes/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: ftgo-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
