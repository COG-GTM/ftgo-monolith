apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant-service
  labels:
    app.kubernetes.io/name: restaurant-service
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: ftgo
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: restaurant-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: restaurant-service
        app.kubernetes.io/component: service
        app.kubernetes.io/part-of: ftgo
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: restaurant-service
          image: ftgo/restaurant-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: management
              containerPort: 8081
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: restaurant-service-config
                  key: spring-profiles
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: restaurant-service-config
                  key: datasource-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ftgo-db-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ftgo-db-credentials
                  key: password
            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: restaurant-service-config
                  key: java-opts
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: management
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /actuator/health
              port: management
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
