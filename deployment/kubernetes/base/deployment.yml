apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftgo-service
  labels:
    app.kubernetes.io/part-of: ftgo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ftgo-service
  template:
    metadata:
      labels:
        app: ftgo-service
    spec:
      containers:
        - name: ftgo-service
          image: ghcr.io/cog-gtm/ftgo-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: ftgo-config
                  key: spring.profiles.active
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: ftgo-db-secret
                  key: url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ftgo-db-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ftgo-db-secret
                  key: password
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ftgo-service
spec:
  selector:
    app: ftgo-service
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
