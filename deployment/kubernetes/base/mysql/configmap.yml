apiVersion: v1
kind: ConfigMap
metadata:
  name: ftgo-mysql-config
  labels:
    app.kubernetes.io/name: ftgo-mysql
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: ftgo
data:
  database-name: ftgo
  max-connections: "200"
  character-set-server: utf8mb4
  collation-server: utf8mb4_unicode_ci
