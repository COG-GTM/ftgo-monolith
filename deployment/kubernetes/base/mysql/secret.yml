apiVersion: v1
kind: Secret
metadata:
  name: ftgo-db-credentials
  labels:
    app.kubernetes.io/name: ftgo-mysql
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: ftgo
  annotations:
    kubernetes.io/description: >
      Database credentials for FTGO MySQL. In production, replace with
      sealed-secrets or external-secrets-operator managed secrets.
type: Opaque
stringData:
  root-password: REPLACE_WITH_SECURE_PASSWORD
  username: REPLACE_WITH_SECURE_USERNAME
  password: REPLACE_WITH_SECURE_PASSWORD
