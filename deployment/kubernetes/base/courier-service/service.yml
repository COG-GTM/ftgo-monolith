apiVersion: v1
kind: Service
metadata:
  name: courier-service
  labels:
    app.kubernetes.io/name: courier-service
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: ftgo
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: management
      port: 8081
      targetPort: management
      protocol: TCP
  selector:
    app.kubernetes.io/name: courier-service
