apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: ftgo
data:
  spring-profiles: kubernetes
  redis-host: ftgo-redis
  redis-port: "6379"
  jwt-jwk-set-uri: http://auth-service:9000/.well-known/jwks.json
  order-service-url: http://order-service:8080
  consumer-service-url: http://consumer-service:8080
  restaurant-service-url: http://restaurant-service:8080
  courier-service-url: http://courier-service:8080
  cors-allowed-origins: "https://ftgo.example.com"
  java-opts: "-Xms256m -Xmx512m"
  server-port: "8080"
  management-port: "8081"
