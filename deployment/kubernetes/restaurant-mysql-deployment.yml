apiVersion: v1
kind: Service
metadata:
  name: restaurant-mysql
  labels:
    name: restaurant-mysql
spec:
  ports:
  - port: 3306
    targetPort: 3306
  clusterIP: None
  selector:
    role: restaurant-mysql
---
apiVersion: apps/v1beta1
kind: StatefulSet
metadata:
  name: restaurant-mysql
spec:
  serviceName: "restaurant-mysql"
  replicas: 1
  template:
    metadata:
      labels:
        role: restaurant-mysql
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: restaurant-mysql
          image: mysql:5.7
          ports:
              - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: restaurant-mysql-secret
                  key: root-password
            - name: MYSQL_DATABASE
              value: ftgo_restaurant
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: restaurant-mysql-secret
                  key: username
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: restaurant-mysql-secret
                  key: password
          volumeMounts:
            - name: restaurant-mysql-storage
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
  - metadata:
      name: restaurant-mysql-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
---
