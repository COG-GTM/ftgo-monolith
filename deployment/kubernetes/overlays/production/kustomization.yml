apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namePrefix: prod-

patches:
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: add
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: add
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"

configMapGenerator:
  - name: ftgo-config
    literals:
      - spring.profiles.active=production
