apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ftgo-staging

namePrefix: staging-

commonLabels:
  environment: staging

commonAnnotations:
  environment: staging
  team: ftgo

resources:
  - namespace.yml
  - ../../base

patches:
  # Staging uses 2 replicas (same as base)
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2

  # Staging resource limits (moderate)
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi

  # Staging HPA settings
  - target:
      kind: HorizontalPodAutoscaler
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 6

  # Staging MySQL storage
  - target:
      kind: StatefulSet
      name: ftgo-mysql
    patch: |
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: 5Gi

  # Staging ingress host
  - target:
      kind: Ingress
      name: ftgo-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: ftgo-staging.internal

  # Staging-specific Java opts
  - target:
      kind: ConfigMap
      name: order-service-config
    patch: |
      - op: replace
        path: /data/java-opts
        value: "-Xms256m -Xmx512m -Dspring.profiles.active=staging"
  - target:
      kind: ConfigMap
      name: consumer-service-config
    patch: |
      - op: replace
        path: /data/java-opts
        value: "-Xms256m -Xmx512m -Dspring.profiles.active=staging"
  - target:
      kind: ConfigMap
      name: restaurant-service-config
    patch: |
      - op: replace
        path: /data/java-opts
        value: "-Xms256m -Xmx512m -Dspring.profiles.active=staging"
  - target:
      kind: ConfigMap
      name: courier-service-config
    patch: |
      - op: replace
        path: /data/java-opts
        value: "-Xms256m -Xmx512m -Dspring.profiles.active=staging"
