apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ftgo-monitoring
  labels:
    app: prometheus
    app.kubernetes.io/part-of: ftgo
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      scrape_timeout: 10s
      external_labels:
        cluster: ftgo
        environment: kubernetes

    scrape_configs:

      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'ftgo-services'
        metrics_path: '/actuator/prometheus'
        scrape_interval: 10s
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - ftgo
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_port, __address__]
            action: replace
            regex: (\d+);([^:]+):(\d+)
            replacement: $2:$1
            target_label: __address__
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: service
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace

  alert-rules.yml: |
    groups:
      - name: ftgo_service_health
        rules:
          - alert: ServiceDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.job }} is down"
              description: "{{ $labels.job }} has been unreachable for more than 1 minute."

          - alert: HighErrorRate
            expr: |
              (
                sum(rate(http_server_requests_total{outcome="SERVER_ERROR"}[5m])) by (job)
                /
                sum(rate(http_server_requests_total[5m])) by (job)
              ) > 0.05
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High error rate on {{ $labels.job }}"

          - alert: HighLatency
            expr: |
              histogram_quantile(0.95,
                sum(rate(http_server_requests_seconds_bucket[5m])) by (le, job)
              ) > 1.0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High p95 latency on {{ $labels.job }}"

      - name: ftgo_jvm_alerts
        rules:
          - alert: HighHeapUsage
            expr: |
              jvm_memory_used_bytes{area="heap"}
              / jvm_memory_max_bytes{area="heap"} > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High JVM heap usage on {{ $labels.job }}"
