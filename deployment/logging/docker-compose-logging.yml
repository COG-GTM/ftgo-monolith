version: '3.7'

# =============================================================================
# EFK Stack (Elasticsearch, Fluentd, Kibana) for FTGO Centralized Logging
# =============================================================================
# Usage:
#   docker-compose -f deployment/logging/docker-compose-logging.yml up -d
#
# Access:
#   Kibana:        http://localhost:5601
#   Elasticsearch: http://localhost:9200
#   Fluentd:       localhost:24224 (TCP/UDP)
# =============================================================================

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.10.2
    container_name: ftgo-elasticsearch
    environment:
      - discovery.type=single-node
      - cluster.name=ftgo-logging
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
      - ./elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - ftgo-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  fluentd:
    build:
      context: ./fluentd
      dockerfile: Dockerfile
    container_name: ftgo-fluentd
    volumes:
      - ./fluentd/conf/fluent.conf:/fluentd/etc/fluent.conf:ro
    ports:
      - "24224:24224"
      - "24224:24224/udp"
    networks:
      - ftgo-logging
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:7.10.2
    container_name: ftgo-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=ftgo-kibana
    ports:
      - "5601:5601"
    networks:
      - ftgo-logging
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"state\":\"green\"\\|\"overall\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  elasticsearch-data:
    driver: local

networks:
  ftgo-logging:
    driver: bridge
    name: ftgo-logging
