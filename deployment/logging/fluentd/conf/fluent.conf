# =============================================================================
# Fluentd Configuration for FTGO Microservices
# =============================================================================
# Collects structured JSON logs from all FTGO services and forwards them
# to Elasticsearch for indexing and search via Kibana.
# =============================================================================

# -----------------------------------------------------------------------------
# Input: Accept logs via TCP and UDP (Docker log driver / application logs)
# -----------------------------------------------------------------------------
<source>
  @type forward
  port 24224
  bind 0.0.0.0
  tag ftgo
</source>

# -----------------------------------------------------------------------------
# Filter: Parse JSON-formatted log messages from FTGO services
# -----------------------------------------------------------------------------
<filter ftgo.**>
  @type parser
  key_name log
  reserve_data true
  remove_key_name_field true
  <parse>
    @type json
    time_key @timestamp
    time_format %Y-%m-%dT%H:%M:%S.%L%Z
  </parse>
</filter>

# -----------------------------------------------------------------------------
# Filter: Add Kubernetes metadata (used when deployed in K8s)
# -----------------------------------------------------------------------------
<filter kubernetes.**>
  @type parser
  key_name log
  reserve_data true
  remove_key_name_field true
  <parse>
    @type multi_format
    <pattern>
      format json
      time_key @timestamp
      time_format %Y-%m-%dT%H:%M:%S.%L%Z
    </pattern>
    <pattern>
      format none
    </pattern>
  </parse>
</filter>

# -----------------------------------------------------------------------------
# Filter: Concatenate multi-line stack traces
# -----------------------------------------------------------------------------
<filter ftgo.**>
  @type concat
  key message
  multiline_start_regexp /^\d{4}-\d{2}-\d{2}|^\{/
  multiline_end_regexp /\n$/
  timeout_label @OUTPUT
  use_first_timestamp true
</filter>

# -----------------------------------------------------------------------------
# Output: Route logs to Elasticsearch
# -----------------------------------------------------------------------------
<label @OUTPUT>
  <match **>
    @type elasticsearch
    host elasticsearch
    port 9200
    logstash_format true
    logstash_prefix ftgo-logs
    logstash_dateformat %Y.%m.%d
    include_tag_key true
    tag_key @log_name
    flush_interval 5s
    retry_max_interval 30
    retry_forever true
    reconnect_on_error true
    reload_on_failure true
    reload_connections false
    request_timeout 30s
    <buffer>
      @type file
      path /fluentd/log/buffer
      flush_mode interval
      flush_interval 5s
      flush_thread_count 2
      retry_type exponential_backoff
      retry_wait 1s
      retry_max_interval 60s
      chunk_limit_size 8MB
      total_limit_size 512MB
      overflow_action block
    </buffer>
  </match>
</label>

<match **>
  @type elasticsearch
  host elasticsearch
  port 9200
  logstash_format true
  logstash_prefix ftgo-logs
  logstash_dateformat %Y.%m.%d
  include_tag_key true
  tag_key @log_name
  flush_interval 5s
  retry_max_interval 30
  retry_forever true
  reconnect_on_error true
  reload_on_failure true
  reload_connections false
  request_timeout 30s
  <buffer>
    @type file
    path /fluentd/log/buffer-default
    flush_mode interval
    flush_interval 5s
    flush_thread_count 2
    retry_type exponential_backoff
    retry_wait 1s
    retry_max_interval 60s
    chunk_limit_size 8MB
    total_limit_size 512MB
    overflow_action block
  </buffer>
</match>
