// =============================================================================
// ftgo.testing-conventions
// =============================================================================
// Testing configuration for FTGO microservices using JUnit 5.
//
// Usage in a microservice build.gradle:
//   plugins {
//       id 'ftgo.testing-conventions'
//   }
//
// Provides:
//   - JUnit 5 (Jupiter) as the default test framework
//   - Integration test source set and task
//   - Rest-Assured for API testing
//   - Test logging configuration
//   - Common test dependencies
//   - JaCoCo code coverage with configurable thresholds
//   - Parallel test execution
//   - Test execution time tracking
// =============================================================================

plugins {
    id 'ftgo.java-conventions'
    id 'jacoco'
}

// ---------------------------------------------------------------------------
// JaCoCo Code Coverage Configuration
// ---------------------------------------------------------------------------
jacoco {
    toolVersion = '0.8.11'
}

// Configure all test tasks to use JUnit 5
tasks.withType(Test).configureEach {
    useJUnitPlatform()

    testLogging {
        events 'passed', 'skipped', 'failed'
        showExceptions true
        showCauses true
        showStackTraces true
        exceptionFormat 'full'
    }

    // Report generation
    reports {
        html.required = true
        junitXml.required = true
    }

    // Parallel test execution - use available processors
    maxParallelForks = Runtime.runtime.availableProcessors().intdiv(2) ?: 1

    // Fork every 100 test classes to prevent memory leaks
    forkEvery = 100

    // JaCoCo coverage data collection
    finalizedBy jacocoTestReport
}

// ---------------------------------------------------------------------------
// JaCoCo Report and Verification
// ---------------------------------------------------------------------------
tasks.named('jacocoTestReport') {
    dependsOn tasks.named('test')

    reports {
        xml.required = true
        html.required = true
        csv.required = false
    }
}

tasks.named('jacocoTestCoverageVerification') {
    violationRules {
        rule {
            limit {
                // Target: 70% instruction coverage
                minimum = 0.70
            }
        }
    }
}

// Integration test source set
sourceSets {
    integrationTest {
        java {
            compileClasspath += main.output + test.output
            runtimeClasspath += main.output + test.output
            srcDir file('src/integration-test/java')
        }
        resources.srcDir file('src/integration-test/resources')
    }
}

configurations {
    integrationTestImplementation.extendsFrom testImplementation
    integrationTestRuntimeOnly.extendsFrom testRuntimeOnly
}

// Integration test task
tasks.register('integrationTest', Test) {
    description = 'Runs integration tests.'
    group = 'verification'
    testClassesDirs = sourceSets.integrationTest.output.classesDirs
    classpath = sourceSets.integrationTest.runtimeClasspath
    shouldRunAfter tasks.named('test')

    useJUnitPlatform()

    // JaCoCo for integration tests
    finalizedBy 'jacocoIntegrationTestReport'
}

// JaCoCo report for integration tests
tasks.register('jacocoIntegrationTestReport', JacocoReport) {
    description = 'Generates code coverage report for integration tests.'
    group = 'verification'
    dependsOn tasks.named('integrationTest')

    sourceSets sourceSets.main
    executionData tasks.named('integrationTest')

    reports {
        xml.required = true
        html.required = true
        csv.required = false
    }
}

// Make check depend on integration tests
tasks.named('check') {
    dependsOn tasks.named('integrationTest')
}
