          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| JDK | \`8 (temurin)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Test summary - aggregates results from all unit test jobs
  # ---------------------------------------------------------------------------
  unit-test-summary:
    name: Unit Test Summary
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - test-monolith-modules
      - test-order-service
      - test-consumer-service
      - test-restaurant-service
      - test-courier-service
    if: always()
    steps:
      - name: Check test results
        run: |
          echo "## Unit Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Triggered | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Monolith modules | \`${{ needs.detect-changes.outputs.monolith-modules }}\` | \`${{ needs.test-monolith-modules.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| order-service | \`${{ needs.detect-changes.outputs.order-service }}\` | \`${{ needs.test-order-service.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| consumer-service | \`${{ needs.detect-changes.outputs.consumer-service }}\` | \`${{ needs.test-consumer-service.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| restaurant-service | \`${{ needs.detect-changes.outputs.restaurant-service }}\` | \`${{ needs.test-restaurant-service.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| courier-service | \`${{ needs.detect-changes.outputs.courier-service }}\` | \`${{ needs.test-courier-service.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger**: \`${{ github.event_name }}\` on \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

          # Fail if any triggered test job failed
          FAILED="false"
          for result in \
            "${{ needs.test-monolith-modules.result }}" \
            "${{ needs.test-order-service.result }}" \
            "${{ needs.test-consumer-service.result }}" \
            "${{ needs.test-restaurant-service.result }}" \
            "${{ needs.test-courier-service.result }}"; do
            if [[ "$result" == "failure" ]]; then
              FAILED="true"
            fi
          done

          if [[ "$FAILED" == "true" ]]; then
            echo "::error::One or more unit test jobs failed"
            exit 1
          fi
          echo "All triggered unit test jobs passed."
