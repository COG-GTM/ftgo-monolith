          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| JDK | \`8 (temurin)\` |" >> $GITHUB_STEP_SUMMARY
