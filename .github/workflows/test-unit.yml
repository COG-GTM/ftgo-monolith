      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: |
          ./gradlew :services:order-service:test \
            -x :ftgo-end-to-end-tests-common:compileJava \
            -x :ftgo-end-to-end-tests:compileJava

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: order-service-unit-test-reports
          path: services/order-service/build/reports/tests/
          retention-days: 14

      - name: Upload JUnit XML results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: order-service-unit-test-xml
          path: services/order-service/build/test-results/test/*.xml
          retention-days: 14

      - name: Generate test summary
        if: always()
        run: |
          echo "## order-service Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| JDK | \`8 (temurin)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Unit tests: Consumer Service
  # ---------------------------------------------------------------------------
  test-consumer-service:
    name: "Unit Test: consumer-service"
    runs-on: ubuntu-latest
    needs: detect-changes
