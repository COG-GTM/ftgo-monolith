# =============================================================================
# Unit Test Pipeline
# =============================================================================
# Runs unit tests for each microservice independently, triggered only when
# relevant code changes are detected via path-based filtering.
#
# Unit tests validate individual components in isolation without external
# dependencies (no database, no network, no filesystem).
#
# Trigger Rules:
#   - On pull_request targeting feat/microservices-migration, main, or master
#   - On push to feat/microservices-migration, main, or master
#   - Only when files under services/, shared-libraries/, buildSrc/, or root
#     build files are modified
#
# Test Strategy:
#   - Per-service parallel test execution
#   - JUnit 4.12 test framework (monolith modules) / JUnit 5 (new services)
#   - JaCoCo code coverage collection
#   - HTML + JUnit XML report generation
#   - Artifact upload on failure for debugging
# =============================================================================

name: Unit Tests

on:
  push:
    branches:
      - feat/microservices-migration
      - main
      - master
    paths:
      - 'services/**'
      - 'shared-libraries/**'
      - 'buildSrc/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'ftgo-*/src/**'
      - '.github/workflows/test-unit.yml'
  pull_request:
    branches:
      - feat/microservices-migration
      - main
      - master
    paths:
      - 'services/**'
      - 'shared-libraries/**'
      - 'buildSrc/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'ftgo-*/src/**'
      - '.github/workflows/test-unit.yml'

# Cancel redundant test runs on the same branch/PR
concurrency:
  group: test-unit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect which services/modules have changed to enable selective testing
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      order-service: ${{ steps.filter.outputs.order-service }}
      consumer-service: ${{ steps.filter.outputs.consumer-service }}
      restaurant-service: ${{ steps.filter.outputs.restaurant-service }}
      courier-service: ${{ steps.filter.outputs.courier-service }}
      monolith-modules: ${{ steps.filter.outputs.monolith-modules }}
      shared-changed: ${{ steps.filter.outputs.shared }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: filter
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          else
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} 2>/dev/null || echo "")
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Check for shared infrastructure changes that affect all modules
          SHARED_CHANGED="false"
          if echo "$CHANGED_FILES" | grep -qE '^(shared-libraries/|buildSrc/|build\.gradle|settings\.gradle|gradle\.properties)'; then
            SHARED_CHANGED="true"
          fi
          echo "shared=${SHARED_CHANGED}" >> $GITHUB_OUTPUT

          # Check each microservice for changes
          for service in order-service consumer-service restaurant-service courier-service; do
            if [[ "$SHARED_CHANGED" == "true" ]] || echo "$CHANGED_FILES" | grep -q "^services/${service}/"; then
              echo "${service}=true" >> $GITHUB_OUTPUT
            else
              echo "${service}=false" >> $GITHUB_OUTPUT
            fi
          done

          # Check monolith modules for changes
          MONOLITH_CHANGED="false"
          if [[ "$SHARED_CHANGED" == "true" ]] || echo "$CHANGED_FILES" | grep -qE '^ftgo-[^/]+/src/'; then
            MONOLITH_CHANGED="true"
          fi
          echo "monolith-modules=${MONOLITH_CHANGED}" >> $GITHUB_OUTPUT

          echo "--- Outputs ---"
          cat $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # Unit tests: Monolith modules (JUnit 4)
  # ---------------------------------------------------------------------------
  test-monolith-modules:
    name: "Unit Test: Monolith Modules"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.monolith-modules == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run monolith unit tests
        run: |
          ./gradlew test \
            -x :ftgo-end-to-end-tests-common:test \
            -x :ftgo-end-to-end-tests:test \
            -x :ftgo-application:test \
            -x :services:order-service:test \
            -x :services:consumer-service:test \
            -x :services:restaurant-service:test \
            -x :services:courier-service:test \
            -x :services:api-gateway:test \
            --continue

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: monolith-unit-test-reports
          path: |
            ftgo-*/build/reports/tests/
            ftgo-*/build/test-results/
          retention-days: 14

      - name: Upload JUnit XML results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monolith-unit-test-xml
          path: ftgo-*/build/test-results/test/*.xml
          retention-days: 14

      - name: Generate test summary
        if: always()
        run: |
          echo "## Monolith Module Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| JDK | \`8 (temurin)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Framework | \`JUnit 4.12\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Unit tests: Order Service
  # ---------------------------------------------------------------------------
  test-order-service:
    name: "Unit Test: order-service"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.order-service == 'true'
    steps:
      - name: Checkout repository
