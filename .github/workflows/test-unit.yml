      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: |
          ./gradlew :services:consumer-service:test \
            -x :ftgo-end-to-end-tests-common:compileJava \
            -x :ftgo-end-to-end-tests:compileJava

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-service-unit-test-reports
          path: services/consumer-service/build/reports/tests/
          retention-days: 14

      - name: Upload JUnit XML results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-service-unit-test-xml
          path: services/consumer-service/build/test-results/test/*.xml
