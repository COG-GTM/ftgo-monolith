# =============================================================================
# FTGO Consumer Service - CI Build and Test
# =============================================================================
# Builds and tests the Consumer Service on PRs and pushes to main branches.
# Triggers only when consumer-service or shared library code changes.
# =============================================================================

name: "CI: Consumer Service"

on:
  push:
    branches:
      - main
      - master
      - 'feat/microservices-migration'
    paths:
      - 'ftgo-consumer-service/**'
      - 'ftgo-consumer-service-api/**'
      - 'services/ftgo-consumer-service/**'
      - 'ftgo-common/**'
      - 'ftgo-common-jpa/**'
      - 'ftgo-domain/**'
      - 'shared/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/libs.versions.toml'
      - 'buildSrc/**'
      - '.github/workflows/ci-consumer-service.yml'
  pull_request:
    branches:
      - main
      - master
      - 'feat/microservices-migration'
    paths:
      - 'ftgo-consumer-service/**'
      - 'ftgo-consumer-service-api/**'
      - 'services/ftgo-consumer-service/**'
      - 'ftgo-common/**'
      - 'ftgo-common-jpa/**'
      - 'ftgo-domain/**'
      - 'shared/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/libs.versions.toml'
      - 'buildSrc/**'
      - '.github/workflows/ci-consumer-service.yml'

permissions:
  contents: read

jobs:
  build:
    name: Build & Test Consumer Service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Compile Consumer Service
        run: |
          ./gradlew :ftgo-consumer-service:compileJava \
            :ftgo-consumer-service-api:compileJava \
            -x :ftgo-end-to-end-tests-common:compileJava \
            -x :ftgo-end-to-end-tests:compileJava

      - name: Run Consumer Service Tests
        run: |
          # Configure JDK 17 compatibility for legacy test libraries
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/jdk17-compat.gradle << 'INIT'
          allprojects {
            afterEvaluate {
              configurations.all {
                resolutionStrategy {
                  force 'org.mockito:mockito-core:4.11.0'
                  force 'net.bytebuddy:byte-buddy:1.14.11'
                  force 'net.bytebuddy:byte-buddy-agent:1.14.11'
                }
              }
            }
            tasks.withType(Test) {
              jvmArgs '--add-opens', 'java.base/java.lang=ALL-UNNAMED',
                      '--add-opens', 'java.base/java.lang.reflect=ALL-UNNAMED',
                      '--add-opens', 'java.base/java.lang.invoke=ALL-UNNAMED',
                      '--add-opens', 'java.base/java.util=ALL-UNNAMED'
              systemProperty 'jdk.attach.allowAttachSelf', 'true'
            }
          }
          INIT
          ./gradlew :ftgo-consumer-service:test \
            -x :ftgo-end-to-end-tests-common:test \
            -x :ftgo-end-to-end-tests:test \
            -x :ftgo-application:test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-service-test-reports
          path: |
            ftgo-consumer-service/build/reports/tests/
            ftgo-consumer-service/build/test-results/
          retention-days: 14

      - name: Generate build summary
        if: always()
        run: |
          echo "## CI: Consumer Service" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "ftgo-consumer-service/build/reports/tests/test" ]; then
            echo "Test reports uploaded as artifacts." >> $GITHUB_STEP_SUMMARY
          else
            echo "No test reports generated." >> $GITHUB_STEP_SUMMARY
          fi
