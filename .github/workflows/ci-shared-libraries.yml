# =============================================================================
# CI Pipeline - Shared Libraries
# =============================================================================
# Builds and tests all shared library modules used across microservices:
#   - ftgo-common, ftgo-common-jpa, ftgo-domain, common-swagger, ftgo-test-util
# Triggers on changes to shared library code or build configuration.
# =============================================================================

name: "CI: Shared Libraries"

on:
  push:
    branches:
      - main
      - master
      - 'feat/microservices-migration-*'
    paths:
      - 'shared-libraries/**'
      - 'ftgo-common/**'
      - 'ftgo-common-jpa/**'
      - 'ftgo-domain/**'
      - 'common-swagger/**'
      - 'ftgo-test-util/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
  pull_request:
    branches:
      - main
      - master
      - 'feat/microservices-migration-*'
    paths:
      - 'shared-libraries/**'
      - 'ftgo-common/**'
      - 'ftgo-common-jpa/**'
      - 'ftgo-domain/**'
      - 'common-swagger/**'
      - 'ftgo-test-util/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-shared-libs-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-shared-libs-
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build ftgo-common
        run: ./gradlew :shared-libraries:ftgo-common:build

      - name: Build ftgo-common-jpa
        run: ./gradlew :shared-libraries:ftgo-common-jpa:build

      - name: Build ftgo-domain
        run: ./gradlew :shared-libraries:ftgo-domain:build

      - name: Build common-swagger
        run: ./gradlew :shared-libraries:common-swagger:build

      - name: Build ftgo-test-util
        run: ./gradlew :shared-libraries:ftgo-test-util:build

      - name: Run shared library tests
        run: |
          ./gradlew :shared-libraries:ftgo-common:test \
                    :shared-libraries:ftgo-common-jpa:test \
                    :shared-libraries:ftgo-domain:test \
                    :shared-libraries:common-swagger:test \
                    :shared-libraries:ftgo-test-util:test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-libraries-test-reports
          path: |
            shared-libraries/ftgo-common/build/reports/tests/
            shared-libraries/ftgo-common-jpa/build/reports/tests/
            shared-libraries/ftgo-domain/build/reports/tests/
            shared-libraries/common-swagger/build/reports/tests/
            shared-libraries/ftgo-test-util/build/reports/tests/
          retention-days: 14
