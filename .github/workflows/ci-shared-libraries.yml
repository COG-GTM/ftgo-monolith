# =============================================================================
# CI Pipeline - Shared Libraries
# =============================================================================
# Builds and tests all shared library modules used across microservices:
#   - ftgo-common, ftgo-common-jpa, ftgo-domain, common-swagger, ftgo-test-util
# Triggers on changes to shared library code or build configuration.
# =============================================================================

name: "CI: Shared Libraries"

on:
  push:
    branches:
      - main
      - master
      - 'feat/microservices-migration-*'
    paths:
      - 'shared-libraries/**'
      - 'ftgo-common/**'
      - 'ftgo-common-jpa/**'
      - 'ftgo-domain/**'
      - 'common-swagger/**'
      - 'ftgo-test-util/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - '.github/workflows/ci-shared-libraries.yml'
  pull_request:
    branches:
      - main
      - master
      - 'feat/microservices-migration-*'
    paths:
      - 'shared-libraries/**'
      - 'ftgo-common/**'
      - 'ftgo-common-jpa/**'
      - 'ftgo-domain/**'
      - 'common-swagger/**'
      - 'ftgo-test-util/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - '.github/workflows/ci-shared-libraries.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test shared libraries
        run: |
          ./gradlew :shared-libraries:ftgo-common:build \
                    :shared-libraries:ftgo-common-jpa:build \
                    :shared-libraries:ftgo-domain:build \
                    :shared-libraries:common-swagger:build \
                    :shared-libraries:ftgo-test-util:build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-libraries-test-reports
          path: |
            shared-libraries/*/build/reports/tests/
            shared-libraries/*/build/test-results/
          retention-days: 14
