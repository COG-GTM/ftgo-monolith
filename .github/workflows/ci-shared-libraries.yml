# =============================================================================
# CI Pipeline - Shared Libraries
# =============================================================================
# Builds and tests all shared library modules (ftgo-common, ftgo-common-jpa,
# ftgo-domain, common-swagger, ftgo-test-util) on PRs and pushes to main.
# =============================================================================

name: "CI: Shared Libraries"

on:
  push:
    branches: [main]
    paths:
      - 'shared-libraries/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/ci-shared-libraries.yml'
  pull_request:
    branches: [main]
    paths:
      - 'shared-libraries/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/ci-shared-libraries.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build ftgo-common
        run: ./gradlew :shared-libraries:ftgo-common:build

      - name: Build ftgo-common-jpa
        run: ./gradlew :shared-libraries:ftgo-common-jpa:build

      - name: Build ftgo-domain
        run: ./gradlew :shared-libraries:ftgo-domain:build

      - name: Build common-swagger
        run: ./gradlew :shared-libraries:common-swagger:build

      - name: Build ftgo-test-util
        run: ./gradlew :shared-libraries:ftgo-test-util:build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-libraries-test-reports
          path: |
            shared-libraries/*/build/reports/tests/
            shared-libraries/*/build/test-results/
          retention-days: 14
