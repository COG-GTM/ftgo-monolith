# =============================================================================
# CI Build Pipeline
# =============================================================================
# Runs Gradle builds and tests for each microservice independently, triggered
# only when relevant code changes are detected via path-based filtering.
#
# Trigger Rules:
#   - On pull_request targeting feat/microservices-migration, main, or master
#   - On push to feat/microservices-migration, main, or master
#   - Only when files under services/, shared-libraries/, buildSrc/, or this
#     workflow are modified
#
# Build Strategy:
#   - Detects which services changed and builds only those
#   - Changes to shared-libraries/ or buildSrc/ trigger all service builds
#   - Uses JDK 8 (project requirement) with Gradle 4.10.2
#   - Caches Gradle dependencies for faster builds
#   - Uploads test reports as artifacts on failure
# =============================================================================

name: CI Build

on:
  push:
    branches:
      - feat/microservices-migration
      - main
      - master
    paths:
      - 'services/**'
      - 'shared-libraries/**'
      - 'buildSrc/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - '.github/workflows/ci-build.yml'
  pull_request:
    branches:
      - feat/microservices-migration
      - main
      - master
    paths:
      - 'services/**'
      - 'shared-libraries/**'
      - 'buildSrc/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - '.github/workflows/ci-build.yml'

# Cancel redundant builds on the same branch/PR
concurrency:
  group: ci-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect which services have changed to enable selective builds
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      order-service: ${{ steps.filter.outputs.order-service }}
      consumer-service: ${{ steps.filter.outputs.consumer-service }}
      restaurant-service: ${{ steps.filter.outputs.restaurant-service }}
      courier-service: ${{ steps.filter.outputs.courier-service }}
      shared-changed: ${{ steps.filter.outputs.shared }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: filter
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          else
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} 2>/dev/null || echo "")
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Check for shared infrastructure changes that affect all services
          SHARED_CHANGED="false"
          if echo "$CHANGED_FILES" | grep -qE '^(shared-libraries/|buildSrc/|build\.gradle|settings\.gradle|gradle\.properties|\.github/workflows/ci-build\.yml)'; then
            SHARED_CHANGED="true"
          fi
          echo "shared=${SHARED_CHANGED}" >> $GITHUB_OUTPUT

          # Check each service for changes
          for service in order-service consumer-service restaurant-service courier-service; do
            if [[ "$SHARED_CHANGED" == "true" ]] || echo "$CHANGED_FILES" | grep -q "^services/${service}/"; then
              echo "${service}=true" >> $GITHUB_OUTPUT
            else
              echo "${service}=false" >> $GITHUB_OUTPUT
            fi
          done

          echo "--- Outputs ---"
          cat $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # Build and test: Order Service
  # ---------------------------------------------------------------------------
  build-order-service:
    name: "Build: order-service"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.order-service == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Compile order-service
        run: |
          ./gradlew :services:order-service:compileJava \
            -x :ftgo-end-to-end-tests-common:compileJava \
            -x :ftgo-end-to-end-tests:compileJava

      - name: Test order-service
        run: |
          ./gradlew :services:order-service:test \
            -x :ftgo-end-to-end-tests-common:compileJava \
            -x :ftgo-end-to-end-tests:compileJava

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: order-service-test-reports
          path: services/order-service/build/reports/tests/
          retention-days: 14

      - name: Generate build summary
        if: always()
        run: |
          echo "## order-service Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| JDK | \`8 (temurin)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Build and test: Consumer Service
  # ---------------------------------------------------------------------------
  build-consumer-service:
    name: "Build: consumer-service"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.consumer-service == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Compile consumer-service
        run: |
          ./gradlew :services:consumer-service:compileJava \
            -x :ftgo-end-to-end-tests-common:compileJava \
            -x :ftgo-end-to-end-tests:compileJava

      - name: Test consumer-service
        run: |
          ./gradlew :services:consumer-service:test \
            -x :ftgo-end-to-end-tests-common:compileJava \
            -x :ftgo-end-to-end-tests:compileJava

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-service-test-reports
          path: services/consumer-service/build/reports/tests/
          retention-days: 14

      - name: Generate build summary
        if: always()
        run: |
          echo "## consumer-service Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| JDK | \`8 (temurin)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Build and test: Restaurant Service
  # ---------------------------------------------------------------------------
  build-restaurant-service:
    name: "Build: restaurant-service"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.restaurant-service == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Compile restaurant-service
        run: |
          ./gradlew :services:restaurant-service:compileJava \
            -x :ftgo-end-to-end-tests-common:compileJava \
            -x :ftgo-end-to-end-tests:compileJava

      - name: Test restaurant-service
        run: |
          ./gradlew :services:restaurant-service:test \
            -x :ftgo-end-to-end-tests-common:compileJava \
            -x :ftgo-end-to-end-tests:compileJava

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: restaurant-service-test-reports
          path: services/restaurant-service/build/reports/tests/
          retention-days: 14

      - name: Generate build summary
        if: always()
        run: |
          echo "## restaurant-service Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| JDK | \`8 (temurin)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Build and test: Courier Service
  # ---------------------------------------------------------------------------
  build-courier-service:
    name: "Build: courier-service"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.courier-service == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: |
          chmod +x ./gradlew

      - name: Compile courier-service
        run: |
          ./gradlew :services:courier-service:compileJava \
            -x :ftgo-end-to-end-tests-common:compileJava \
            -x :ftgo-end-to-end-tests:compileJava

      - name: Test courier-service
        run: |
          ./gradlew :services:courier-service:test \
            -x :ftgo-end-to-end-tests-common:compileJava \
            -x :ftgo-end-to-end-tests:compileJava

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: courier-service-test-reports
          path: services/courier-service/build/reports/tests/
          retention-days: 14

      - name: Generate build summary
        if: always()
        run: |
          echo "## courier-service Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| JDK | \`8 (temurin)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Overall CI summary - aggregates results from all service builds
  # ---------------------------------------------------------------------------
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - build-order-service
      - build-consumer-service
      - build-restaurant-service
      - build-courier-service
    if: always()
    steps:
      - name: Check build results
        run: |
          echo "## CI Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Triggered | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| order-service | \`${{ needs.detect-changes.outputs.order-service }}\` | \`${{ needs.build-order-service.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| consumer-service | \`${{ needs.detect-changes.outputs.consumer-service }}\` | \`${{ needs.build-consumer-service.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| restaurant-service | \`${{ needs.detect-changes.outputs.restaurant-service }}\` | \`${{ needs.build-restaurant-service.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| courier-service | \`${{ needs.detect-changes.outputs.courier-service }}\` | \`${{ needs.build-courier-service.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger**: \`${{ github.event_name }}\` on \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

          # Fail if any triggered build failed
          FAILED="false"
          for result in "${{ needs.build-order-service.result }}" "${{ needs.build-consumer-service.result }}" "${{ needs.build-restaurant-service.result }}" "${{ needs.build-courier-service.result }}"; do
            if [[ "$result" == "failure" ]]; then
              FAILED="true"
            fi
          done

          if [[ "$FAILED" == "true" ]]; then
            echo "::error::One or more service builds failed"
            exit 1
          fi
          echo "All triggered service builds passed."
