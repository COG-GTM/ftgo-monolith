# =============================================================================
# CI Pipeline - Courier Service
# =============================================================================
# Builds and tests the Courier bounded context (service + API module).
# Triggers on changes to the service code, shared libraries, or build config.
# =============================================================================

name: "CI: Courier Service"

on:
  push:
    branches:
      - main
      - master
      - 'feat/microservices-migration-*'
    paths:
      - 'services/courier-service/**'
      - 'services/courier-service-api/**'
      - 'ftgo-courier-service/**'
      - 'ftgo-courier-service-api/**'
      - 'shared-libraries/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
  pull_request:
    branches:
      - main
      - master
      - 'feat/microservices-migration-*'
    paths:
      - 'services/courier-service/**'
      - 'services/courier-service-api/**'
      - 'ftgo-courier-service/**'
      - 'ftgo-courier-service-api/**'
      - 'shared-libraries/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-courier-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-courier-
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and test Courier Service
        run: ./gradlew :services:courier-service-api:build :services:courier-service:build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: courier-service-test-reports
          path: |
            services/courier-service/build/reports/tests/
            services/courier-service-api/build/reports/tests/
          retention-days: 14
