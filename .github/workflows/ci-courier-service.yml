# =============================================================================
# CI Pipeline - Courier Service
# =============================================================================
# Builds and tests the Courier bounded context on PRs and pushes to main.
# Path-based filtering ensures this workflow only runs when relevant files change.
# =============================================================================

name: "CI: Courier Service"

on:
  push:
    branches: [main]
    paths:
      - 'services/courier-service/**'
      - 'services/courier-service-api/**'
      - 'shared-libraries/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/ci-courier-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/courier-service/**'
      - 'services/courier-service-api/**'
      - 'shared-libraries/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/ci-courier-service.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Courier Service API
        run: ./gradlew :services:courier-service-api:build

      - name: Build & Test Courier Service
        run: ./gradlew :services:courier-service:build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: courier-service-test-reports
          path: |
            services/courier-service/build/reports/tests/
            services/courier-service/build/test-results/
          retention-days: 14
