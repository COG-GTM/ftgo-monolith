    steps:
      - name: Check test results
        run: |
          echo "## Integration Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Triggered | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Monolith modules | \`${{ needs.detect-changes.outputs.monolith-modules }}\` | \`${{ needs.integration-test-monolith.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| order-service | \`${{ needs.detect-changes.outputs.order-service }}\` | \`${{ needs.integration-test-order-service.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| consumer-service | \`${{ needs.detect-changes.outputs.consumer-service }}\` | \`${{ needs.integration-test-consumer-service.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| restaurant-service | \`${{ needs.detect-changes.outputs.restaurant-service }}\` | \`${{ needs.integration-test-restaurant-service.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| courier-service | \`${{ needs.detect-changes.outputs.courier-service }}\` | \`${{ needs.integration-test-courier-service.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Infrastructure**: MySQL 5.7 service container" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger**: \`${{ github.event_name }}\` on \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

          # Fail if any triggered integration test job failed
          FAILED="false"
          for result in \
            "${{ needs.integration-test-monolith.result }}" \
            "${{ needs.integration-test-order-service.result }}" \
            "${{ needs.integration-test-consumer-service.result }}" \
            "${{ needs.integration-test-restaurant-service.result }}" \
            "${{ needs.integration-test-courier-service.result }}"; do
            if [[ "$result" == "failure" ]]; then
              FAILED="true"
            fi
          done

          if [[ "$FAILED" == "true" ]]; then
            echo "::error::One or more integration test jobs failed"
            exit 1
          fi
          echo "All triggered integration test jobs passed."
