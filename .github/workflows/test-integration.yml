  # ---------------------------------------------------------------------------
  # Integration test summary
  # ---------------------------------------------------------------------------
  integration-test-summary:
    name: Integration Test Summary
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - integration-test-monolith
      - integration-test-order-service
      - integration-test-consumer-service
      - integration-test-restaurant-service
      - integration-test-courier-service
