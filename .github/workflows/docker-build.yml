# =============================================================================
# Docker Build and Push CI Workflow
# =============================================================================
# Builds Docker images for each microservice and pushes them to GitHub
# Container Registry (ghcr.io) on merge to the microservices migration branch.
#
# Image Tagging Strategy:
#   - <service>:<version>-<git-sha>    (immutable, for production deployments)
#   - <service>:<branch-name>          (mutable, tracks latest on branch)
#   - <service>:latest                 (mutable, only on default branch)
#   - <service>:sha-<git-sha>         (immutable, short SHA for convenience)
# =============================================================================

name: Docker Build and Push

on:
  push:
    branches:
      - feat/microservices-migration
      - main
      - master
    paths:
      - 'services/**'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches:
      - feat/microservices-migration
      - main
      - master
    paths:
      - 'services/**'
      - '.github/workflows/docker-build.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ftgo

# Ensure only one build per branch runs at a time
concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect which services have changed to avoid unnecessary builds
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: changes
        run: |
          # On push to branch, build all services; on PR, detect changes
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo 'services=["order-service","consumer-service","restaurant-service","courier-service"]' >> $GITHUB_OUTPUT
          else
            CHANGED_SERVICES="[]"
            for service in order-service consumer-service restaurant-service courier-service; do
              if git diff --name-only HEAD~1 HEAD | grep -q "services/${service}/"; then
                CHANGED_SERVICES=$(echo $CHANGED_SERVICES | jq -c ". + [\"${service}\"]")
              fi
            done
            # If workflow file changed, build all
            if git diff --name-only HEAD~1 HEAD | grep -q ".github/workflows/docker-build.yml"; then
              CHANGED_SERVICES='["order-service","consumer-service","restaurant-service","courier-service"]'
            fi
            # If no services changed (shouldn't happen due to paths filter), build all
            if [[ "$CHANGED_SERVICES" == "[]" ]]; then
              CHANGED_SERVICES='["order-service","consumer-service","restaurant-service","courier-service"]'
            fi
            echo "services=${CHANGED_SERVICES}" >> $GITHUB_OUTPUT
          fi
          echo "Services to build: $(cat $GITHUB_OUTPUT | grep services)"

  # ---------------------------------------------------------------------------
  # Build and push Docker images for each microservice
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
        include:
          - service: order-service
            context: .
            dockerfile: services/order-service/docker/Dockerfile
          - service: consumer-service
            context: .
            dockerfile: services/consumer-service/docker/Dockerfile
          - service: restaurant-service
            context: .
            dockerfile: services/restaurant-service/docker/Dockerfile
          - service: courier-service
            context: .
            dockerfile: services/courier-service/docker/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            # Semantic version tag from git tag (e.g., v1.0.0 -> 1.0.0)
            type=semver,pattern={{version}}
            # Version with git SHA (e.g., 1.0.0-abc1234)
            type=semver,pattern={{version}}-{{sha}}
            # Branch name tag (e.g., feat-microservices-migration)
            type=ref,event=branch
            # PR number tag (e.g., pr-42)
            type=ref,event=pr
            # Short SHA tag (e.g., sha-abc1234)
            type=sha,prefix=sha-
            # Latest tag only on default branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          labels: |
            org.opencontainers.image.title=FTGO ${{ matrix.service }}
            org.opencontainers.image.description=FTGO Microservice - ${{ matrix.service }}
            org.opencontainers.image.vendor=COG-GTM

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Generate build summary
        if: always()
        run: |
          echo "## Docker Build Summary - ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | \`${{ matrix.service }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | \`${{ env.REGISTRY }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_PREFIX }}/${{ matrix.service }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Pushed | \`${{ github.event_name == 'push' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Git SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tags" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Summary job - reports overall build status
  # ---------------------------------------------------------------------------
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-push]
    if: always()
    steps:
      - name: Check build results
        run: |
          if [[ "${{ needs.build-and-push.result }}" == "failure" ]]; then
            echo "::error::One or more Docker image builds failed"
            exit 1
          fi
          echo "All Docker image builds completed successfully"

      - name: Generate overall summary
        run: |
          echo "## Overall Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Change Detection | ${{ needs.detect-changes.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Builds | ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger**: \`${{ github.event_name }}\` on \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
