name: CD - Deploy to Dev

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - 'infrastructure/kubernetes/**'
      - 'deployment/kubernetes/**'
      - 'shared/**'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev

env:
  KUSTOMIZE_VERSION: '5.3.0'

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      order-service: ${{ steps.changes.outputs.order-service }}
      consumer-service: ${{ steps.changes.outputs.consumer-service }}
      restaurant-service: ${{ steps.changes.outputs.restaurant-service }}
      courier-service: ${{ steps.changes.outputs.courier-service }}
      infrastructure: ${{ steps.changes.outputs.infrastructure }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")

          echo "order-service=false" >> $GITHUB_OUTPUT
          echo "consumer-service=false" >> $GITHUB_OUTPUT
          echo "restaurant-service=false" >> $GITHUB_OUTPUT
          echo "courier-service=false" >> $GITHUB_OUTPUT
          echo "infrastructure=false" >> $GITHUB_OUTPUT

          if echo "$CHANGED_FILES" | grep -q "services/ftgo-order-service/\|infrastructure/kubernetes/base/order-service/"; then
            echo "order-service=true" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED_FILES" | grep -q "services/ftgo-consumer-service/\|infrastructure/kubernetes/base/consumer-service/"; then
            echo "consumer-service=true" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED_FILES" | grep -q "services/ftgo-restaurant-service/\|infrastructure/kubernetes/base/restaurant-service/"; then
            echo "restaurant-service=true" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED_FILES" | grep -q "services/ftgo-courier-service/\|infrastructure/kubernetes/base/courier-service/"; then
            echo "courier-service=true" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED_FILES" | grep -q "infrastructure/kubernetes/\|deployment/kubernetes/"; then
            echo "infrastructure=true" >> $GITHUB_OUTPUT
          fi

  validate-manifests:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: ${{ env.KUSTOMIZE_VERSION }}

      - name: Validate base kustomization
        run: |
          echo "Validating base kustomization..."
          kustomize build infrastructure/kubernetes/base/ > /dev/null
          echo "Base kustomization is valid."

      - name: Validate dev overlay
        run: |
          echo "Validating dev overlay..."
          kustomize build infrastructure/kubernetes/overlays/dev/ > /dev/null
          echo "Dev overlay is valid."

      - name: Validate staging overlay
        run: |
          echo "Validating staging overlay..."
          kustomize build infrastructure/kubernetes/overlays/staging/ > /dev/null
          echo "Staging overlay is valid."

      - name: Validate prod overlay
        run: |
          echo "Validating prod overlay..."
          kustomize build infrastructure/kubernetes/overlays/prod/ > /dev/null
          echo "Prod overlay is valid."

      - name: Validate per-service kustomizations
        run: |
          for svc in order-service consumer-service restaurant-service courier-service; do
            echo "Validating services/ftgo-${svc}/k8s/..."
            kustomize build "services/ftgo-${svc}/k8s/" > /dev/null
            echo "services/ftgo-${svc}/k8s/ is valid."
          done

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: validate-manifests
    environment: dev
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: ${{ env.KUSTOMIZE_VERSION }}

      - name: Build dev manifests
        run: |
          mkdir -p /tmp/k8s-manifests
          kustomize build infrastructure/kubernetes/overlays/dev/ > /tmp/k8s-manifests/dev-all.yml
          echo "Generated dev manifests:"
          echo "---"
          wc -l /tmp/k8s-manifests/dev-all.yml

      - name: Create namespace (if not exists)
        run: |
          echo "Would run: kubectl create namespace ftgo-dev --dry-run=client -o yaml | kubectl apply -f -"
          echo "NOTE: Actual kubectl commands require cluster credentials configured via KUBECONFIG secret."

      - name: Deploy to dev
        run: |
          echo "Would run: kubectl apply -f /tmp/k8s-manifests/dev-all.yml"
          echo "NOTE: Configure KUBECONFIG secret in GitHub repository settings to enable actual deployment."
          echo ""
          echo "To enable deployment:"
          echo "  1. Add KUBECONFIG secret to GitHub repository secrets"
          echo "  2. Uncomment the kubectl apply commands"
          echo "  3. Ensure the cluster has the ftgo-dev namespace"

      - name: Verify deployment rollout
        run: |
          echo "Would run: kubectl -n ftgo-dev rollout status deployment/ftgo-order-service --timeout=300s"
          echo "Would run: kubectl -n ftgo-dev rollout status deployment/ftgo-consumer-service --timeout=300s"
          echo "Would run: kubectl -n ftgo-dev rollout status deployment/ftgo-restaurant-service --timeout=300s"
          echo "Would run: kubectl -n ftgo-dev rollout status deployment/ftgo-courier-service --timeout=300s"
          echo "NOTE: Actual rollout verification requires cluster credentials."
