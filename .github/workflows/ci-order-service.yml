# =============================================================================
# CI Pipeline - Order Service
# =============================================================================
# Builds and tests the Order bounded context (service + API module).
# Path-based filtering ensures this workflow only runs when relevant files change.
#
# Note: Order Service depends on all other service API modules
# (consumer, restaurant, courier) so changes to any of those trigger this build.
# =============================================================================

name: "CI: Order Service"

on:
  push:
    branches:
      - main
      - master
      - 'feat/microservices-migration-*'
    paths:
      - 'services/order-service/**'
      - 'services/order-service-api/**'
      - 'services/consumer-service-api/**'
      - 'services/restaurant-service-api/**'
      - 'services/courier-service-api/**'
      - 'ftgo-order-service/**'
      - 'ftgo-order-service-api/**'
      - 'shared-libraries/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - '.github/workflows/ci-order-service.yml'
  pull_request:
    branches:
      - main
      - master
      - 'feat/microservices-migration-*'
    paths:
      - 'services/order-service/**'
      - 'services/order-service-api/**'
      - 'services/consumer-service-api/**'
      - 'services/restaurant-service-api/**'
      - 'services/courier-service-api/**'
      - 'ftgo-order-service/**'
      - 'ftgo-order-service-api/**'
      - 'shared-libraries/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - '.github/workflows/ci-order-service.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Order Service API
        run: ./gradlew :services:order-service-api:build

      - name: Build & Test Order Service
        run: ./gradlew :services:order-service:build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: order-service-test-reports
          path: |
            services/order-service/build/reports/tests/
            services/order-service/build/test-results/
            services/order-service-api/build/reports/tests/
            services/order-service-api/build/test-results/
          retention-days: 14
