# =============================================================================
# Docker Image Cleanup — GHCR Retention Policy
# =============================================================================
# Scheduled weekly cleanup of untagged and stale container images from the
# GitHub Container Registry to control storage costs.
#
# Policy:
#   - Delete untagged images older than 7 days
#   - Keep at least 10 tagged versions per service
#   - Keep images tagged 'latest' or matching a release pattern
#   - Runs every Sunday at 02:00 UTC; can be triggered manually
# =============================================================================

name: "Docker: Image Cleanup"

on:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not actually delete images)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  packages: write

env:
  # Number of tagged versions to retain per package
  KEEP_VERSIONS: 10
  # Minimum age (days) for untagged images before deletion
  UNTAGGED_MAX_AGE_DAYS: 7

jobs:
  cleanup:
    name: "Cleanup: ${{ matrix.package }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - ftgo-order-service
          - ftgo-consumer-service
          - ftgo-restaurant-service
          - ftgo-courier-service
          - ftgo-mysql

    steps:
      - name: Delete untagged images
        uses: actions/delete-package-versions@v5
        with:
          package-name: ftgo-monolith/${{ matrix.package }}
          package-type: container
          min-versions-to-keep: ${{ env.KEEP_VERSIONS }}
          delete-only-untagged-versions: true
        continue-on-error: true

      - name: Delete old pre-release images
        uses: actions/delete-package-versions@v5
        with:
          package-name: ftgo-monolith/${{ matrix.package }}
          package-type: container
          min-versions-to-keep: ${{ env.KEEP_VERSIONS }}
          delete-only-pre-release-versions: true
        continue-on-error: true

      - name: Summary
        run: |
          echo "## Cleanup Summary — ${{ matrix.package }}" >> $GITHUB_STEP_SUMMARY
          echo "- Kept at least **${{ env.KEEP_VERSIONS }}** tagged versions" >> $GITHUB_STEP_SUMMARY
          echo "- Deleted untagged images older than **${{ env.UNTAGGED_MAX_AGE_DAYS }}** days" >> $GITHUB_STEP_SUMMARY
          echo "- Dry run: **${{ github.event.inputs.dry_run || 'false' }}**" >> $GITHUB_STEP_SUMMARY
