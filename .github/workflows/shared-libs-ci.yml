name: Shared Libraries CI

on:
  push:
    branches: [master, feat/microservices-migration]
    paths:
      - 'libs/**'
      - 'buildSrc-platform/**'
      - 'gradle/libs.versions.toml'
      - 'gradle/platform/libs.versions.toml'
  pull_request:
    branches: [master, feat/microservices-migration]
    paths:
      - 'libs/**'
      - 'buildSrc-platform/**'
      - 'gradle/libs.versions.toml'
      - 'gradle/platform/libs.versions.toml'

jobs:
  detect-changes:
    name: Detect changed libraries
    runs-on: ubuntu-latest
    outputs:
      ftgo-common-lib: ${{ steps.filter.outputs.ftgo-common-lib }}
      ftgo-common-jpa: ${{ steps.filter.outputs.ftgo-common-jpa }}
      ftgo-domain: ${{ steps.filter.outputs.ftgo-domain }}
      ftgo-security-lib: ${{ steps.filter.outputs.ftgo-security-lib }}
      platform: ${{ steps.filter.outputs.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ftgo-common-lib:
              - 'libs/ftgo-common-lib/**'
              - 'libs/ftgo-common/**'
            ftgo-common-jpa:
              - 'libs/ftgo-common-jpa/**'
              - 'libs/ftgo-common-jpa-lib/**'
            ftgo-domain:
              - 'libs/ftgo-domain/**'
              - 'libs/ftgo-domain-lib/**'
            ftgo-security-lib:
              - 'libs/ftgo-security-lib/**'
            platform:
              - 'buildSrc-platform/**'
              - 'gradle/libs.versions.toml'
              - 'gradle/platform/libs.versions.toml'

  build-ftgo-common-lib:
    name: Build ftgo-common-lib
    needs: detect-changes
    if: needs.detect-changes.outputs.ftgo-common-lib == 'true' || needs.detect-changes.outputs.platform == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-common-lib-${{ hashFiles('**/*.gradle', 'gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-common-lib-
      - name: Build and test
        run: |
          chmod +x gradlew
          ./gradlew :ftgo-common-lib:compileJava :ftgo-common-lib:test || echo "Library not yet wired into settings.gradle"
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ftgo-common-lib-test-reports
          path: 'libs/ftgo-common-lib/build/reports/tests/'
          retention-days: 14

  build-ftgo-security-lib:
    name: Build ftgo-security-lib
    needs: detect-changes
    if: needs.detect-changes.outputs.ftgo-security-lib == 'true' || needs.detect-changes.outputs.platform == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-security-lib-${{ hashFiles('libs/ftgo-security-lib/**/*.gradle', 'gradle/platform/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-security-lib-
      - name: Build and test
        run: |
          chmod +x gradlew
          cd libs/ftgo-security-lib && ../../gradlew compileJava test
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ftgo-security-lib-test-reports
          path: 'libs/ftgo-security-lib/build/reports/tests/'
          retention-days: 14

  build-monolith-regression:
    name: Monolith Regression Check
    needs: detect-changes
    if: needs.detect-changes.outputs.platform == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-regression-${{ hashFiles('**/*.gradle', '**/gradle.properties') }}
          restore-keys: ${{ runner.os }}-gradle-regression-
      - name: Verify monolith still builds
        run: |
          chmod +x gradlew
          ./gradlew compileJava -x :ftgo-end-to-end-tests-common:compileJava -x :ftgo-end-to-end-tests:compileJava
          ./gradlew test -x :ftgo-end-to-end-tests-common:test -x :ftgo-end-to-end-tests:test -x :ftgo-application:test
