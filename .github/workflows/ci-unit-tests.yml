# =============================================================================
# FTGO Unit Tests - CI Pipeline
# =============================================================================
# Runs unit tests across all service modules in parallel with JaCoCo code
# coverage. Provides fast feedback on PRs with per-service test isolation.
#
# Target: < 2 minutes per service
# Coverage: JaCoCo XML/HTML reports uploaded as artifacts
# =============================================================================

name: "CI: Unit Tests"

on:
  push:
    branches:
      - main
      - master
      - 'feat/microservices-migration'
    paths:
      - 'ftgo-*/src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/libs.versions.toml'
      - 'buildSrc/**'
      - 'build-logic/**'
      - '.github/workflows/ci-unit-tests.yml'
  pull_request:
    branches:
      - main
      - master
      - 'feat/microservices-migration'
    paths:
      - 'ftgo-*/src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/libs.versions.toml'
      - 'buildSrc/**'
      - 'build-logic/**'
      - '.github/workflows/ci-unit-tests.yml'

permissions:
  contents: read
  checks: write
  pull-requests: write

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Compile all modules first (shared step to catch compilation errors early)
  # ---------------------------------------------------------------------------
  compile:
    name: Compile All Modules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Compile all modules
        run: |
          ./gradlew compileJava compileTestJava \
            -x :ftgo-end-to-end-tests-common:compileJava \
            -x :ftgo-end-to-end-tests:compileJava \
            -x :ftgo-end-to-end-tests-common:compileTestJava \
            -x :ftgo-end-to-end-tests:compileTestJava

  # ---------------------------------------------------------------------------
  # Run unit tests per service in parallel (matrix strategy)
  # ---------------------------------------------------------------------------
  unit-tests:
    name: "Test: ${{ matrix.service.name }}"
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: order-service
            module: ftgo-order-service
          - name: consumer-service
            module: ftgo-consumer-service
          - name: restaurant-service
            module: ftgo-restaurant-service
          - name: courier-service
            module: ftgo-courier-service
          - name: domain
            module: ftgo-domain
          - name: common
            module: ftgo-common
          - name: common-jpa
            module: ftgo-common-jpa

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Configure JDK 17 compatibility
        run: |
          # Legacy Mockito 2.x / ByteBuddy 1.7.x cannot create mocks on JDK 17.
          # Force JDK 17-compatible versions and add required module opens.
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/jdk17-compat.gradle << 'INIT'
          allprojects {
            afterEvaluate {
              configurations.all {
                resolutionStrategy {
                  force 'org.mockito:mockito-core:4.11.0'
                  force 'net.bytebuddy:byte-buddy:1.14.11'
                  force 'net.bytebuddy:byte-buddy-agent:1.14.11'
                }
              }
            }
            // Apply JaCoCo plugin for coverage
            apply plugin: 'jacoco'
            jacoco {
              toolVersion = '0.8.11'
            }
            tasks.withType(Test) {
              jvmArgs '--add-opens', 'java.base/java.lang=ALL-UNNAMED',
                      '--add-opens', 'java.base/java.lang.reflect=ALL-UNNAMED',
                      '--add-opens', 'java.base/java.lang.invoke=ALL-UNNAMED',
                      '--add-opens', 'java.base/java.util=ALL-UNNAMED'
              systemProperty 'jdk.attach.allowAttachSelf', 'true'
              // Enable parallel test execution within the module
              maxParallelForks = Runtime.runtime.availableProcessors().intdiv(2) ?: 1
            }
          }
          INIT

      - name: Run unit tests for ${{ matrix.service.name }}
        id: run_tests
        run: |
          START_TIME=$(date +%s)
          ./gradlew :${{ matrix.service.module }}:test \
            -x :ftgo-end-to-end-tests-common:test \
            -x :ftgo-end-to-end-tests:test \
            -x :ftgo-application:test \
            --no-daemon
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "duration=${DURATION}" >> $GITHUB_OUTPUT
          echo "Test execution time: ${DURATION}s"

      - name: Generate JaCoCo coverage report
        if: always()
        run: |
          ./gradlew :${{ matrix.service.module }}:jacocoTestReport \
            -x :ftgo-end-to-end-tests-common:test \
            -x :ftgo-end-to-end-tests:test \
            -x :ftgo-application:test \
            --no-daemon || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ matrix.service.name }}
          path: |
            ${{ matrix.service.module }}/build/test-results/test/
          retention-days: 30

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports-${{ matrix.service.name }}
          path: |
            ${{ matrix.service.module }}/build/reports/tests/
          retention-days: 14

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service.name }}
          path: |
            ${{ matrix.service.module }}/build/reports/jacoco/
            ${{ matrix.service.module }}/build/jacoco/
          retention-days: 30

      - name: Generate test summary
        if: always()
        run: |
          echo "## Unit Tests: ${{ matrix.service.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Module | \`${{ matrix.service.module }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ${{ steps.run_tests.outputs.duration }}s |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Parse test results XML if available
          TEST_RESULTS_DIR="${{ matrix.service.module }}/build/test-results/test"
          if [ -d "$TEST_RESULTS_DIR" ]; then
            TOTAL=0
            FAILURES=0
            ERRORS=0
            SKIPPED=0
            for xml in "$TEST_RESULTS_DIR"/*.xml; do
              if [ -f "$xml" ]; then
                T=$(grep -o 'tests="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*' || echo 0)
                F=$(grep -o 'failures="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*' || echo 0)
                E=$(grep -o 'errors="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*' || echo 0)
                S=$(grep -o 'skipped="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*' || echo 0)
                TOTAL=$((TOTAL + T))
                FAILURES=$((FAILURES + F))
                ERRORS=$((ERRORS + E))
                SKIPPED=$((SKIPPED + S))
              fi
            done
            PASSED=$((TOTAL - FAILURES - ERRORS - SKIPPED))
            echo "| Total Tests | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| Skipped | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
          else
            echo "No test results found." >> $GITHUB_STEP_SUMMARY
          fi

          # Check if duration exceeds 2 minute target
          if [ "${{ steps.run_tests.outputs.duration }}" -gt 120 ] 2>/dev/null; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> **Warning**: Test execution exceeded 2-minute target." >> $GITHUB_STEP_SUMMARY
          fi

  # ---------------------------------------------------------------------------
  # Aggregate results and publish test report
  # ---------------------------------------------------------------------------
  test-summary:
    name: Unit Test Summary
    runs-on: ubuntu-latest
    needs: unit-tests
    if: always()
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: unit-test-results-*
          path: test-results
          merge-multiple: false

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Test Results
          path: 'test-results/**/TEST-*.xml'
          reporter: java-junit
          fail-on-error: true

      - name: Download all coverage reports
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-reports
          merge-multiple: false

      - name: Generate coverage summary
        if: always()
        run: |
          echo "## Unit Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Coverage Report |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|----------------|" >> $GITHUB_STEP_SUMMARY

          for dir in coverage-reports/coverage-*/; do
            if [ -d "$dir" ]; then
              SERVICE=$(basename "$dir" | sed 's/coverage-//')
              # Try to extract coverage percentage from JaCoCo XML
              XML_FILE=$(find "$dir" -name "*.xml" -path "*/jacocoTestReport/*" 2>/dev/null | head -1)
              if [ -n "$XML_FILE" ] && [ -f "$XML_FILE" ]; then
                # Extract instruction coverage from the XML counter
                MISSED=$(grep -o 'type="INSTRUCTION" missed="[0-9]*"' "$XML_FILE" | tail -1 | grep -o 'missed="[0-9]*"' | grep -o '[0-9]*' || echo 0)
                COVERED=$(grep -o 'type="INSTRUCTION"[^/]*covered="[0-9]*"' "$XML_FILE" | tail -1 | grep -o 'covered="[0-9]*"' | grep -o '[0-9]*' || echo 0)
                if [ "$((MISSED + COVERED))" -gt 0 ]; then
                  PERCENT=$(( (COVERED * 100) / (MISSED + COVERED) ))
                  if [ "$PERCENT" -ge 70 ]; then
                    echo "| $SERVICE | ${PERCENT}% |" >> $GITHUB_STEP_SUMMARY
                  else
                    echo "| $SERVICE | ${PERCENT}% (below 70% target) |" >> $GITHUB_STEP_SUMMARY
                  fi
                else
                  echo "| $SERVICE | No coverage data |" >> $GITHUB_STEP_SUMMARY
                fi
              else
                echo "| $SERVICE | Report uploaded |" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done
