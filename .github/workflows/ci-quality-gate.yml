# =============================================================================
# FTGO Quality Gate - CI Pipeline
# =============================================================================
# Runs static analysis tools (Checkstyle, SpotBugs, PMD) and generates JaCoCo
# code coverage reports. Quality gate failures block PR merge.
#
# Tools:
#   - Checkstyle: Code style enforcement (Google Java Style)
#   - SpotBugs:   Static bug detection
#   - PMD:        Code quality rules
#   - JaCoCo:     Code coverage (70% minimum threshold)
#
# IMPORTANT: This workflow is additive. It does NOT modify existing workflows.
# =============================================================================

name: "CI: Quality Gate"

on:
  push:
    branches:
      - main
      - master
      - 'feat/microservices-migration'
    paths:
      - 'services/**/src/**'
      - 'shared/**/src/**'
      - 'build-logic/**'
      - 'gradle/libs.versions.toml'
      - '.editorconfig'
      - '.github/workflows/ci-quality-gate.yml'
  pull_request:
    branches:
      - main
      - master
      - 'feat/microservices-migration'
    paths:
      - 'services/**/src/**'
      - 'shared/**/src/**'
      - 'build-logic/**'
      - 'gradle/libs.versions.toml'
      - '.editorconfig'
      - '.github/workflows/ci-quality-gate.yml'

permissions:
  contents: read
  checks: write
  pull-requests: write

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Static Analysis - Checkstyle, SpotBugs, PMD
  # ---------------------------------------------------------------------------
  static-analysis:
    name: "Static Analysis: ${{ matrix.service.name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: order-service
            module: services:ftgo-order-service
          - name: consumer-service
            module: services:ftgo-consumer-service
          - name: restaurant-service
            module: services:ftgo-restaurant-service
          - name: courier-service
            module: services:ftgo-courier-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Run Checkstyle
        id: checkstyle
        if: always()
        run: |
          ./gradlew :${{ matrix.service.module }}:checkstyleMain \
            :${{ matrix.service.module }}:checkstyleTest \
            --no-daemon || echo "checkstyle_failed=true" >> $GITHUB_OUTPUT

      - name: Run SpotBugs
        id: spotbugs
        if: always()
        run: |
          ./gradlew :${{ matrix.service.module }}:spotbugsMain \
            --no-daemon || echo "spotbugs_failed=true" >> $GITHUB_OUTPUT

      - name: Run PMD
        id: pmd
        if: always()
        run: |
          ./gradlew :${{ matrix.service.module }}:pmdMain \
            :${{ matrix.service.module }}:pmdTest \
            --no-daemon || echo "pmd_failed=true" >> $GITHUB_OUTPUT

      - name: Upload Checkstyle reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-${{ matrix.service.name }}
          path: |
            ${{ matrix.service.module }}/build/reports/checkstyle/
          retention-days: 14

      - name: Upload SpotBugs reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-${{ matrix.service.name }}
          path: |
            ${{ matrix.service.module }}/build/reports/spotbugs/
          retention-days: 14

      - name: Upload PMD reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-${{ matrix.service.name }}
          path: |
            ${{ matrix.service.module }}/build/reports/pmd/
          retention-days: 14

      - name: Generate analysis summary
        if: always()
        run: |
          echo "## Static Analysis: ${{ matrix.service.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.checkstyle.outputs.checkstyle_failed }}" = "true" ]; then
            echo "| Checkstyle | Failed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Checkstyle | Passed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.spotbugs.outputs.spotbugs_failed }}" = "true" ]; then
            echo "| SpotBugs | Failed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| SpotBugs | Passed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.pmd.outputs.pmd_failed }}" = "true" ]; then
            echo "| PMD | Failed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| PMD | Passed |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if any analysis failed
        if: always()
        run: |
          if [ "${{ steps.checkstyle.outputs.checkstyle_failed }}" = "true" ] || \
             [ "${{ steps.spotbugs.outputs.spotbugs_failed }}" = "true" ] || \
             [ "${{ steps.pmd.outputs.pmd_failed }}" = "true" ]; then
            echo "One or more static analysis checks failed. See reports above."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Code Coverage - JaCoCo
  # ---------------------------------------------------------------------------
  code-coverage:
    name: "Coverage: ${{ matrix.service.name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: order-service
            module: services:ftgo-order-service
          - name: consumer-service
            module: services:ftgo-consumer-service
          - name: restaurant-service
            module: services:ftgo-restaurant-service
          - name: courier-service
            module: services:ftgo-courier-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Run tests with coverage
        run: |
          ./gradlew :${{ matrix.service.module }}:test \
            :${{ matrix.service.module }}:jacocoTestReport \
            --no-daemon

      - name: Verify coverage threshold (70%)
        id: coverage_check
        run: |
          ./gradlew :${{ matrix.service.module }}:jacocoTestCoverageVerification \
            --no-daemon || echo "coverage_failed=true" >> $GITHUB_OUTPUT

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-${{ matrix.service.name }}
          path: |
            ${{ matrix.service.module }}/build/reports/jacoco/
            ${{ matrix.service.module }}/build/jacoco/
          retention-days: 30

      - name: Generate coverage summary
        if: always()
        run: |
          echo "## Code Coverage: ${{ matrix.service.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          MODULE_PATH=$(echo "${{ matrix.service.module }}" | tr ':' '/')
          XML_FILE="${MODULE_PATH}/build/reports/jacoco/test/jacocoTestReport.xml"
          if [ -f "$XML_FILE" ]; then
            MISSED=$(grep -o 'type="INSTRUCTION" missed="[0-9]*"' "$XML_FILE" | tail -1 | grep -o 'missed="[0-9]*"' | grep -o '[0-9]*' || echo 0)
            COVERED=$(grep -o 'type="INSTRUCTION"[^/]*covered="[0-9]*"' "$XML_FILE" | tail -1 | grep -o 'covered="[0-9]*"' | grep -o '[0-9]*' || echo 0)
            if [ "$((MISSED + COVERED))" -gt 0 ]; then
              PERCENT=$(( (COVERED * 100) / (MISSED + COVERED) ))
              echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
              echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
              echo "| Instruction Coverage | ${PERCENT}% |" >> $GITHUB_STEP_SUMMARY
              echo "| Minimum Threshold | 70% |" >> $GITHUB_STEP_SUMMARY
              if [ "$PERCENT" -ge 70 ]; then
                echo "| Status | Passed |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| Status | **FAILED** - below 70% threshold |" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "No coverage data found." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "JaCoCo report not generated. Module may not have tests yet." >> $GITHUB_STEP_SUMMARY
          fi

  # ---------------------------------------------------------------------------
  # Quality Gate Decision
  # ---------------------------------------------------------------------------
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [static-analysis, code-coverage]
    if: always()
    steps:
      - name: Check quality gate results
        run: |
          echo "## Quality Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          STATIC_RESULT="${{ needs.static-analysis.result }}"
          COVERAGE_RESULT="${{ needs.code-coverage.result }}"

          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Static Analysis (Checkstyle, SpotBugs, PMD) | ${STATIC_RESULT} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Coverage (JaCoCo >= 70%) | ${COVERAGE_RESULT} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$STATIC_RESULT" = "failure" ] || [ "$COVERAGE_RESULT" = "failure" ]; then
            echo "**Quality gate FAILED.** Please fix the issues above before merging." >> $GITHUB_STEP_SUMMARY
            echo ""
            echo "Quality gate failed. See individual job results for details."
            exit 1
          elif [ "$STATIC_RESULT" = "cancelled" ] || [ "$COVERAGE_RESULT" = "cancelled" ]; then
            echo "**Quality gate skipped** (jobs were cancelled)." >> $GITHUB_STEP_SUMMARY
            echo "Quality gate was cancelled."
            exit 1
          else
            echo "**Quality gate PASSED.** All checks meet the required standards." >> $GITHUB_STEP_SUMMARY
            echo "Quality gate passed."
          fi
