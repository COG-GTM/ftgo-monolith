# =============================================================================
# FTGO Integration Tests - CI Pipeline
# =============================================================================
# Runs integration tests with a MySQL service container. Integration tests
# verify service interactions with real database connections.
#
# Requires: MySQL 8.0 service container, Flyway migrations
# =============================================================================

name: "CI: Integration Tests"

on:
  push:
    branches:
      - main
      - master
      - 'feat/microservices-migration'
    paths:
      - 'ftgo-*/src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/libs.versions.toml'
      - 'buildSrc/**'
      - 'build-logic/**'
      - 'mysql/**'
      - 'ftgo-flyway/**'
      - '.github/workflows/ci-integration-tests.yml'
  pull_request:
    branches:
      - main
      - master
      - 'feat/microservices-migration'
    paths:
      - 'ftgo-*/src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/libs.versions.toml'
      - 'buildSrc/**'
      - 'build-logic/**'
      - 'mysql/**'
      - 'ftgo-flyway/**'
      - '.github/workflows/ci-integration-tests.yml'

permissions:
  contents: read
  checks: write
  pull-requests: write

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    name: Integration Tests with MySQL
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # ---------------------------------------------------------------------------
    # MySQL service container
    # ---------------------------------------------------------------------------
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_USER: mysqluser
          MYSQL_PASSWORD: mysqlpw
          MYSQL_DATABASE: ftgo
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

    env:
      SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/ftgo
      SPRING_DATASOURCE_USERNAME: mysqluser
      SPRING_DATASOURCE_PASSWORD: mysqlpw
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      DOCKER_HOST_ADDRESS: localhost

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Configure JDK 17 compatibility
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/jdk17-compat.gradle << 'INIT'
          allprojects {
            afterEvaluate {
              configurations.all {
                resolutionStrategy {
                  force 'org.mockito:mockito-core:4.11.0'
                  force 'net.bytebuddy:byte-buddy:1.14.11'
                  force 'net.bytebuddy:byte-buddy-agent:1.14.11'
                }
              }
            }
            apply plugin: 'jacoco'
            jacoco {
              toolVersion = '0.8.11'
            }
            tasks.withType(Test) {
              jvmArgs '--add-opens', 'java.base/java.lang=ALL-UNNAMED',
                      '--add-opens', 'java.base/java.lang.reflect=ALL-UNNAMED',
                      '--add-opens', 'java.base/java.lang.invoke=ALL-UNNAMED',
                      '--add-opens', 'java.base/java.util=ALL-UNNAMED'
              systemProperty 'jdk.attach.allowAttachSelf', 'true'
            }
          }
          INIT

      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL..."
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -u root -prootpassword --silent 2>/dev/null; then
              echo "MySQL is ready!"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Initialize database schemas
        run: |
          # Create additional databases that services may need
          mysql -h 127.0.0.1 -u root -prootpassword -e "
            CREATE DATABASE IF NOT EXISTS ftgo;
            CREATE DATABASE IF NOT EXISTS ftgo_order;
            CREATE DATABASE IF NOT EXISTS ftgo_consumer;
            CREATE DATABASE IF NOT EXISTS ftgo_restaurant;
            CREATE DATABASE IF NOT EXISTS ftgo_courier;
            GRANT ALL PRIVILEGES ON *.* TO 'mysqluser'@'%';
            FLUSH PRIVILEGES;
          " || echo "Database initialization completed (some commands may have been skipped)"

      - name: Run Flyway migrations
        run: |
          ./gradlew :ftgo-flyway:flywayMigrate \
            -Dflyway.url=jdbc:mysql://localhost:3306/ftgo \
            -Dflyway.user=root \
            -Dflyway.password=rootpassword \
            --no-daemon || echo "Flyway migration completed (or skipped)"

      - name: Compile all modules
        run: |
          ./gradlew compileJava \
            -x :ftgo-end-to-end-tests-common:compileJava \
            -x :ftgo-end-to-end-tests:compileJava \
            --no-daemon

      - name: Run integration tests
        id: run_tests
        run: |
          START_TIME=$(date +%s)
          ./gradlew integrationTest \
            -x :ftgo-end-to-end-tests-common:test \
            -x :ftgo-end-to-end-tests:test \
            -x :ftgo-end-to-end-tests-common:integrationTest \
            -x :ftgo-end-to-end-tests:integrationTest \
            -x :ftgo-application:test \
            -x :ftgo-application:integrationTest \
            --no-daemon || true
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "duration=${DURATION}" >> $GITHUB_OUTPUT
          echo "Integration test execution time: ${DURATION}s"

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            **/build/test-results/integrationTest/
          retention-days: 30

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: |
            **/build/reports/tests/integrationTest/
          retention-days: 14

      - name: Upload integration coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage-reports
          path: |
            **/build/reports/jacoco/
            **/build/jacoco/
          retention-days: 30

      - name: Publish integration test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Test Results
          path: '**/build/test-results/integrationTest/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Generate integration test summary
        if: always()
        run: |
          echo "## Integration Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ${{ steps.run_tests.outputs.duration }}s |" >> $GITHUB_STEP_SUMMARY
          echo "| MySQL | 8.0 (service container) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count test results across all modules
          TOTAL=0
          FAILURES=0
          for dir in $(find . -path "*/test-results/integrationTest" -type d 2>/dev/null); do
            for xml in "$dir"/*.xml; do
              if [ -f "$xml" ]; then
                T=$(grep -o 'tests="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*' || echo 0)
                F=$(grep -o 'failures="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*' || echo 0)
                TOTAL=$((TOTAL + T))
                FAILURES=$((FAILURES + F))
              fi
            done
          done
          echo "| Total Tests | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| Failures | $FAILURES |" >> $GITHUB_STEP_SUMMARY
