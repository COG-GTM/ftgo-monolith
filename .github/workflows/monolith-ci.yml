name: Monolith CI

on:
  push:
    branches: [master, feat/microservices-migration]
    paths:
      - 'ftgo-*/src/**'
      - 'buildSrc/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'ftgo-flyway/**'
      - 'common-swagger/**'
  pull_request:
    branches: [master, feat/microservices-migration]
    paths:
      - 'ftgo-*/src/**'
      - 'buildSrc/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'ftgo-flyway/**'
      - 'common-swagger/**'

jobs:
  build:
    name: Build & Test Monolith
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-monolith-${{ hashFiles('**/*.gradle', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-monolith-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile
        run: ./gradlew compileJava -x :ftgo-end-to-end-tests-common:compileJava -x :ftgo-end-to-end-tests:compileJava

      - name: Run unit tests
        run: ./gradlew test -x :ftgo-end-to-end-tests-common:test -x :ftgo-end-to-end-tests:test -x :ftgo-application:test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monolith-test-reports
          path: '**/build/reports/tests/'
          retention-days: 14
