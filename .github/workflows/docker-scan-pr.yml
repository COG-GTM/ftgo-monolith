# =============================================================================
# FTGO Microservices - Docker Build Validation for Pull Requests
# =============================================================================
# Validates Dockerfiles and builds images (without pushing) on PRs.
# Includes Trivy filesystem scan on Dockerfiles.
# =============================================================================

name: Docker PR Validation

on:
  pull_request:
    branches:
      - main
      - master
      - 'feat/microservices-migration'
    paths:
      - 'services/**/Dockerfile'
      - 'services/**/docker/**'
      - 'infrastructure/docker/**'
      - '.github/workflows/docker-*.yml'

permissions:
  contents: read
  security-events: write

jobs:
  # ---------------------------------------------------------------------------
  # Lint Dockerfiles with hadolint
  # ---------------------------------------------------------------------------
  lint-dockerfiles:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hadolint on all Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: services/ftgo-order-service/Dockerfile
          failure-threshold: warning

      - name: Lint consumer service Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: services/ftgo-consumer-service/Dockerfile
          failure-threshold: warning

      - name: Lint restaurant service Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: services/ftgo-restaurant-service/Dockerfile
          failure-threshold: warning

      - name: Lint courier service Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: services/ftgo-courier-service/Dockerfile
          failure-threshold: warning

  # ---------------------------------------------------------------------------
  # Build images (no push) to validate Dockerfiles
  # ---------------------------------------------------------------------------
  build-validation:
    name: Validate Build - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - ftgo-order-service
          - ftgo-consumer-service
          - ftgo-restaurant-service
          - ftgo-courier-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: ftgo-${{ matrix.service }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Trivy filesystem scan on Dockerfiles and configs
  # ---------------------------------------------------------------------------
  trivy-config-scan:
    name: Trivy Config Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy config scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'services/'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Run Trivy config scanner (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'services/'
          format: 'sarif'
          output: 'trivy-config-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-config-results.sarif'
          category: 'trivy-dockerfile-config'
