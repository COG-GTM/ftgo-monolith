name: CI — OpenAPI Lib

on:
  push:
    branches: [master, feat/microservices-migration]
    paths:
      - 'libs/ftgo-openapi-lib/**'
      - 'buildSrc-platform/**'
      - 'gradle/libs.versions.toml'
  pull_request:
    branches: [master, feat/microservices-migration]
    paths:
      - 'libs/ftgo-openapi-lib/**'
      - 'buildSrc-platform/**'
      - 'gradle/libs.versions.toml'

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-openapi-lib-${{ hashFiles('**/*.gradle', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-openapi-lib-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile
        run: |
          if [ -f libs/ftgo-openapi-lib/build.gradle ]; then
            ./gradlew :libs:ftgo-openapi-lib:compileJava || echo "Library not yet wired into settings.gradle"
          fi

      - name: Run tests
        run: |
          if [ -f libs/ftgo-openapi-lib/build.gradle ]; then
            ./gradlew :libs:ftgo-openapi-lib:test || echo "Library tests not yet wired into settings.gradle"
          fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-lib-test-reports
          path: 'libs/ftgo-openapi-lib/build/reports/tests/'
          retention-days: 14
