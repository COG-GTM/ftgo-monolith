name: 'Quality Gate'

on:
  push:
    branches:
      - main
      - 'feat/microservices-migration-v2'
    paths:
      - 'services/**'
      - 'libs/**'
      - 'build-logic/**'
      - 'gradle/**'
      - 'config/checkstyle/**'
      - 'config/spotbugs/**'
      - '.github/workflows/quality-gate.yml'
  pull_request:
    branches:
      - main
      - 'feat/microservices-migration-v2'
    paths:
      - 'services/**'
      - 'libs/**'
      - 'build-logic/**'
      - 'gradle/**'
      - 'config/checkstyle/**'
      - 'config/spotbugs/**'
      - '.github/workflows/quality-gate.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checkstyle:
    name: Checkstyle Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Checkstyle on services
        run: |
          echo "Running Checkstyle analysis on new microservices code..."
          MODULES=""
          for dir in services/*/; do
            MODULE=$(echo "$dir" | sed 's|/|:|g' | sed 's|:$||')
            if ./gradlew projects 2>/dev/null | grep -q ":${MODULE}"; then
              MODULES="$MODULES :${MODULE}:checkstyleMain :${MODULE}:checkstyleTest"
            fi
          done
          if [ -n "$MODULES" ]; then
            ./gradlew $MODULES --continue || true
          else
            echo "No registered service modules found. Skipping."
          fi
        env:
          GRADLE_OPTS: '-Dorg.gradle.daemon=false'

      - name: Run Checkstyle on libs
        run: |
          echo "Running Checkstyle analysis on shared libraries..."
          MODULES=""
          for dir in libs/*/; do
            MODULE=$(echo "$dir" | sed 's|/|:|g' | sed 's|:$||')
            if ./gradlew projects 2>/dev/null | grep -q ":${MODULE}"; then
              MODULES="$MODULES :${MODULE}:checkstyleMain :${MODULE}:checkstyleTest"
            fi
          done
          if [ -n "$MODULES" ]; then
            ./gradlew $MODULES --continue || true
          else
            echo "No registered library modules found. Skipping."
          fi
        env:
          GRADLE_OPTS: '-Dorg.gradle.daemon=false'

      - name: Upload Checkstyle reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: |
            **/build/reports/checkstyle/
          retention-days: 14

  spotbugs:
    name: SpotBugs Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run SpotBugs on services
        run: |
          echo "Running SpotBugs analysis on new microservices code..."
          MODULES=""
          for dir in services/*/; do
            MODULE=$(echo "$dir" | sed 's|/|:|g' | sed 's|:$||')
            if ./gradlew projects 2>/dev/null | grep -q ":${MODULE}"; then
              MODULES="$MODULES :${MODULE}:spotbugsMain"
            fi
          done
          if [ -n "$MODULES" ]; then
            ./gradlew $MODULES --continue || true
          else
            echo "No registered service modules found. Skipping."
          fi
        env:
          GRADLE_OPTS: '-Dorg.gradle.daemon=false'

      - name: Run SpotBugs on libs
        run: |
          echo "Running SpotBugs analysis on shared libraries..."
          MODULES=""
          for dir in libs/*/; do
            MODULE=$(echo "$dir" | sed 's|/|:|g' | sed 's|:$||')
            if ./gradlew projects 2>/dev/null | grep -q ":${MODULE}"; then
              MODULES="$MODULES :${MODULE}:spotbugsMain"
            fi
          done
          if [ -n "$MODULES" ]; then
            ./gradlew $MODULES --continue || true
          else
            echo "No registered library modules found. Skipping."
          fi
        env:
          GRADLE_OPTS: '-Dorg.gradle.daemon=false'

      - name: Upload SpotBugs reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports
          path: |
            **/build/reports/spotbugs/
          retention-days: 14

  quality-summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [checkstyle, spotbugs]
    if: always()

    steps:
      - name: Check quality gate results
        run: |
          echo "=== Quality Gate Summary ==="
          echo ""
          echo "Checkstyle: ${{ needs.checkstyle.result }}"
          echo "SpotBugs:   ${{ needs.spotbugs.result }}"
          echo ""
          if [ "${{ needs.checkstyle.result }}" = "failure" ] || [ "${{ needs.spotbugs.result }}" = "failure" ]; then
            echo "Quality gate FAILED. Please review the reports above."
            echo "See docs/code-review/quality-standards.md for details on how to fix violations."
            exit 1
          else
            echo "Quality gate PASSED."
          fi
