# =============================================================================
# CI Pipeline - Legacy Monolith Modules
# =============================================================================
# Builds and tests the legacy flat-structure modules that have not yet been
# migrated to the new services/ and shared-libraries/ layout.
#
# This workflow excludes the end-to-end test modules which have a known
# pre-existing dependency issue with eventuate-util-test.
# =============================================================================

name: "CI: Legacy Monolith"

on:
  push:
    branches: [main]
    paths:
      - 'ftgo-application/**'
      - 'ftgo-order-service/**'
      - 'ftgo-order-service-api/**'
      - 'ftgo-consumer-service/**'
      - 'ftgo-consumer-service-api/**'
      - 'ftgo-restaurant-service/**'
      - 'ftgo-restaurant-service-api/**'
      - 'ftgo-courier-service/**'
      - 'ftgo-courier-service-api/**'
      - 'ftgo-domain/**'
      - 'ftgo-common/**'
      - 'ftgo-common-jpa/**'
      - 'ftgo-test-util/**'
      - 'ftgo-flyway/**'
      - 'common-swagger/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/ci-legacy-monolith.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ftgo-application/**'
      - 'ftgo-order-service/**'
      - 'ftgo-order-service-api/**'
      - 'ftgo-consumer-service/**'
      - 'ftgo-consumer-service-api/**'
      - 'ftgo-restaurant-service/**'
      - 'ftgo-restaurant-service-api/**'
      - 'ftgo-courier-service/**'
      - 'ftgo-courier-service-api/**'
      - 'ftgo-domain/**'
      - 'ftgo-common/**'
      - 'ftgo-common-jpa/**'
      - 'ftgo-test-util/**'
      - 'ftgo-flyway/**'
      - 'common-swagger/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/ci-legacy-monolith.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Build legacy modules
        run: ./gradlew build -x :ftgo-end-to-end-tests:test -x :ftgo-end-to-end-tests-common:test -x :ftgo-end-to-end-tests:build -x :ftgo-end-to-end-tests-common:build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-monolith-test-reports
          path: |
            ftgo-*/build/reports/tests/
            ftgo-*/build/test-results/
            common-swagger/build/reports/tests/
            common-swagger/build/test-results/
          retention-days: 14
