name: 'CI: Restaurant Service'

on:
  push:
    branches:
      - main
      - 'feat/microservices-migration-v2'
    paths:
      - 'services/restaurant-service/**'
      - 'libs/ftgo-common/**'
      - 'libs/ftgo-domain/**'
      - 'build-logic/**'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/ci-restaurant-service.yml'
      - '.github/workflows/reusable-gradle-build.yml'
  pull_request:
    branches:
      - main
      - 'feat/microservices-migration-v2'
    paths:
      - 'services/restaurant-service/**'
      - 'libs/ftgo-common/**'
      - 'libs/ftgo-domain/**'
      - 'build-logic/**'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/ci-restaurant-service.yml'
      - '.github/workflows/reusable-gradle-build.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/reusable-gradle-build.yml
    with:
      module-path: 'services/restaurant-service'
      module-name: 'restaurant-service'
