# =============================================================================
# FTGO Microservices - Docker Build and Push to GHCR
# =============================================================================
# Builds and pushes Docker images for each microservice on merge to main.
# Images are tagged with semantic version, git SHA, and branch name.
# =============================================================================

name: Docker Build and Push

on:
  push:
    branches:
      - main
      - master
      - 'feat/microservices-migration'
    paths:
      - 'services/**/Dockerfile'
      - 'services/**/docker/**'
      - 'ftgo-common/**'
      - 'ftgo-common-jpa/**'
      - 'ftgo-domain/**'
      - 'ftgo-order-service/**'
      - 'ftgo-consumer-service/**'
      - 'ftgo-restaurant-service/**'
      - 'ftgo-courier-service/**'
      - '.github/workflows/docker-build-push.yml'
  pull_request:
    branches:
      - main
      - master
      - 'feat/microservices-migration'
    paths:
      - 'services/**/Dockerfile'
      - 'services/**/docker/**'
      - '.github/workflows/docker-build-push.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ftgo

permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Detect which services have changed
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
      order: ${{ steps.changes.outputs.order }}
      consumer: ${{ steps.changes.outputs.consumer }}
      restaurant: ${{ steps.changes.outputs.restaurant }}
      courier: ${{ steps.changes.outputs.courier }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: changes
        run: |
          # On push to main, build all services
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "order=true" >> $GITHUB_OUTPUT
            echo "consumer=true" >> $GITHUB_OUTPUT
            echo "restaurant=true" >> $GITHUB_OUTPUT
            echo "courier=true" >> $GITHUB_OUTPUT
            echo 'services=["ftgo-order-service","ftgo-consumer-service","ftgo-restaurant-service","ftgo-courier-service"]' >> $GITHUB_OUTPUT
          else
            # For PRs, detect which services changed
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
            
            ORDER=false
            CONSUMER=false
            RESTAURANT=false
            COURIER=false
            SERVICES="[]"
            
            if echo "$CHANGED_FILES" | grep -qE "(ftgo-order-service|services/ftgo-order-service)"; then
              ORDER=true
            fi
            if echo "$CHANGED_FILES" | grep -qE "(ftgo-consumer-service|services/ftgo-consumer-service)"; then
              CONSUMER=true
            fi
            if echo "$CHANGED_FILES" | grep -qE "(ftgo-restaurant-service|services/ftgo-restaurant-service)"; then
              RESTAURANT=true
            fi
            if echo "$CHANGED_FILES" | grep -qE "(ftgo-courier-service|services/ftgo-courier-service)"; then
              COURIER=true
            fi
            
            # If shared libraries changed, rebuild all
            if echo "$CHANGED_FILES" | grep -qE "(ftgo-common|ftgo-domain|ftgo-common-jpa)"; then
              ORDER=true
              CONSUMER=true
              RESTAURANT=true
              COURIER=true
            fi
            
            echo "order=$ORDER" >> $GITHUB_OUTPUT
            echo "consumer=$CONSUMER" >> $GITHUB_OUTPUT
            echo "restaurant=$RESTAURANT" >> $GITHUB_OUTPUT
            echo "courier=$COURIER" >> $GITHUB_OUTPUT
            
            # Build services array
            SVCS=()
            [[ "$ORDER" == "true" ]] && SVCS+=("ftgo-order-service")
            [[ "$CONSUMER" == "true" ]] && SVCS+=("ftgo-consumer-service")
            [[ "$RESTAURANT" == "true" ]] && SVCS+=("ftgo-restaurant-service")
            [[ "$COURIER" == "true" ]] && SVCS+=("ftgo-courier-service")
            
            printf -v SERVICES_JSON '"%s",' "${SVCS[@]}"
            SERVICES_JSON="[${SERVICES_JSON%,}]"
            echo "services=$SERVICES_JSON" >> $GITHUB_OUTPUT
          fi

  # ---------------------------------------------------------------------------
  # Build and push Docker images
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            # Git SHA (short)
            type=sha,prefix=,format=short
            # Branch name
            type=ref,event=branch
            # Semantic version from tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Latest tag for default branch
            type=raw,value=latest,enable={{is_default_branch}}
            # PR number
            type=ref,event=pr
          labels: |
            org.opencontainers.image.title=FTGO ${{ matrix.service }}
            org.opencontainers.image.description=FTGO ${{ matrix.service }} microservice
            org.opencontainers.image.vendor=COG-GTM

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Generate image summary
        if: github.event_name == 'push'
        run: |
          echo "## Docker Image Built: ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.REGISTRY }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_PREFIX }}-${{ matrix.service }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | while read -r tag; do
            echo "- \`${tag}\`" >> $GITHUB_STEP_SUMMARY
          done

  # ---------------------------------------------------------------------------
  # Vulnerability scanning with Trivy
  # ---------------------------------------------------------------------------
  security-scan:
    name: Scan ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-push]
    if: github.event_name == 'push' && needs.detect-changes.outputs.services != '[]'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ steps.sha.outputs.short }}'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'
          category: 'trivy-${{ matrix.service }}'

      - name: Run Trivy (table output for logs)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ steps.sha.outputs.short }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Generate scan summary
        if: always()
        run: |
          echo "## Security Scan: ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Trivy vulnerability scan completed for \`${{ env.IMAGE_PREFIX }}-${{ matrix.service }}\`" >> $GITHUB_STEP_SUMMARY
