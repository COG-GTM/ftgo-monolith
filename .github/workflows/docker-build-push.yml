# =============================================================================
# FTGO Microservices - Docker Build and Push to GHCR
# =============================================================================
# Builds and pushes Docker images for each microservice on merge to main.
# Uses GitHub Container Registry (ghcr.io) with semantic versioning + git SHA.
#
# Image tagging strategy:
#   - <service>:latest                    (latest from default branch)
#   - <service>:<version>-<git-sha>       (immutable, traceable tag)
#   - <service>:<branch>                  (branch-based tag)
# =============================================================================

name: Docker Build and Push

on:
  push:
    branches:
      - main
      - master
      - 'feat/microservices-migration-*'
    paths:
      - 'services/*-service/**'
      - 'shared-libraries/**'
      - 'buildSrc/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
  workflow_dispatch:
    inputs:
      services:
        description: 'Comma-separated list of services to build (e.g., consumer-service,order-service). Leave empty for all.'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ftgo

# Prevent concurrent builds on the same branch
concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect which services changed (for selective builds)
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      consumer-service: ${{ steps.changes.outputs.consumer-service }}
      order-service: ${{ steps.changes.outputs.order-service }}
      restaurant-service: ${{ steps.changes.outputs.restaurant-service }}
      courier-service: ${{ steps.changes.outputs.courier-service }}
      shared-changed: ${{ steps.changes.outputs.shared }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            consumer-service:
              - 'services/consumer-service/**'
              - 'services/consumer-service-api/**'
            order-service:
              - 'services/order-service/**'
              - 'services/order-service-api/**'
              - 'services/consumer-service-api/**'
              - 'services/restaurant-service-api/**'
              - 'services/courier-service-api/**'
            restaurant-service:
              - 'services/restaurant-service/**'
              - 'services/restaurant-service-api/**'
            courier-service:
              - 'services/courier-service/**'
              - 'services/courier-service-api/**'
            shared:
              - 'shared-libraries/**'
              - 'buildSrc/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'

  # ---------------------------------------------------------------------------
  # Build and push Docker images (matrix strategy for parallel builds)
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: consumer-service
            context: .
            dockerfile: services/consumer-service/docker/Dockerfile
            changed: ${{ needs.detect-changes.outputs.consumer-service }}
          - service: order-service
            context: .
            dockerfile: services/order-service/docker/Dockerfile
            changed: ${{ needs.detect-changes.outputs.order-service }}
          - service: restaurant-service
            context: .
            dockerfile: services/restaurant-service/docker/Dockerfile
            changed: ${{ needs.detect-changes.outputs.restaurant-service }}
          - service: courier-service
            context: .
            dockerfile: services/courier-service/docker/Dockerfile
            changed: ${{ needs.detect-changes.outputs.courier-service }}

    # Build if: service changed, shared libs changed, manual dispatch, or workflow_dispatch with specific service
    if: |
      always() &&
      needs.detect-changes.result == 'success'

    steps:
      - name: Check if build is needed
        id: should-build
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            INPUT_SERVICES="${{ github.event.inputs.services }}"
            if [[ -z "$INPUT_SERVICES" ]] || echo "$INPUT_SERVICES" | grep -q "${{ matrix.service }}"; then
              echo "build=true" >> "$GITHUB_OUTPUT"
            else
              echo "build=false" >> "$GITHUB_OUTPUT"
            fi
          elif [[ "${{ matrix.changed }}" == "true" ]] || [[ "${{ needs.detect-changes.outputs.shared-changed }}" == "true" ]]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.should-build.outputs.build == 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: steps.should-build.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.should-build.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        if: steps.should-build.outputs.build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            # Tag with version + git SHA (immutable)
            type=raw,value=0.1.0-{{sha}}
            # Tag with branch name
            type=ref,event=branch
            # Tag latest on default branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        if: steps.should-build.outputs.build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/amd64

      - name: Generate build summary
        if: steps.should-build.outputs.build == 'true'
        run: |
          echo "### Docker Image Built :whale:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Service** | \`${{ matrix.service }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Tags** | \`${{ steps.meta.outputs.tags }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Digest** | \`${{ steps.meta.outputs.digest }}\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Skip notification
        if: steps.should-build.outputs.build == 'false'
        run: |
          echo "### Skipped :fast_forward:" >> "$GITHUB_STEP_SUMMARY"
          echo "No changes detected for **${{ matrix.service }}**" >> "$GITHUB_STEP_SUMMARY"
