plugins {
    id 'java-library'
}

group = 'net.chrisrichardson.ftgo'
version = '1.0.0-SNAPSHOT'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

dependencies {
    api 'org.springframework.boot:spring-boot-starter-actuator:3.2.1'
    api 'io.micrometer:micrometer-registry-prometheus:1.12.1'

    api 'io.micrometer:micrometer-tracing-bridge-brave:1.2.1'
    api 'io.zipkin.reporter2:zipkin-reporter-brave:2.17.1'

    implementation 'org.springframework.boot:spring-boot-starter:3.2.1'
    implementation 'org.slf4j:slf4j-api:2.0.9'
    implementation 'ch.qos.logback:logback-classic:1.4.14'
    implementation 'net.logstash.logback:logstash-logback-encoder:7.4'

    testImplementation 'org.springframework.boot:spring-boot-starter-test:3.2.1'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.1'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
    useJUnitPlatform()
}
