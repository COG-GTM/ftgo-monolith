spring:
  application:
    name: consumer-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/ftgo_consumer?useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:ftgo_user}
    password: ${MYSQL_PASSWORD:ftgo_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      service: ${spring.application.name}

logging:
  level:
    root: INFO
    net.chrisrichardson.ftgo: DEBUG
