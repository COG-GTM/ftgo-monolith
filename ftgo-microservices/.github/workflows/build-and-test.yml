name: Build and Test

on:
  push:
    branches: [ main, master ]
    paths:
      - 'ftgo-microservices/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'ftgo-microservices/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ftgo-microservices

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('ftgo-microservices/**/*.gradle*', 'ftgo-microservices/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build all modules
        run: ./gradlew build -x test

      - name: Run unit tests
        run: ./gradlew test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: ftgo-microservices/**/build/reports/tests/

  integration-test:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ftgo-microservices

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_USER: ftgo_user
          MYSQL_PASSWORD: ftgo_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create databases
        run: |
          mysql -h 127.0.0.1 -u root -prootpassword -e "CREATE DATABASE IF NOT EXISTS ftgo_consumer;"
          mysql -h 127.0.0.1 -u root -prootpassword -e "CREATE DATABASE IF NOT EXISTS ftgo_restaurant;"
          mysql -h 127.0.0.1 -u root -prootpassword -e "CREATE DATABASE IF NOT EXISTS ftgo_order;"
          mysql -h 127.0.0.1 -u root -prootpassword -e "CREATE DATABASE IF NOT EXISTS ftgo_courier;"
          mysql -h 127.0.0.1 -u root -prootpassword -e "GRANT ALL ON *.* TO 'ftgo_user'@'%';"

      - name: Run integration tests
        run: ./gradlew integrationTest || true
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: ftgo_user
          MYSQL_PASSWORD: ftgo_password

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        service:
          - consumer-service
          - restaurant-service
          - order-service
          - courier-service
          - api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build service jar
        working-directory: ftgo-microservices
        run: |
          chmod +x gradlew
          if [ "${{ matrix.service }}" = "api-gateway" ]; then
            ./gradlew :infrastructure:api-gateway:bootJar
          else
            ./gradlew :services:${{ matrix.service }}:bootJar
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'api-gateway' && 'ftgo-microservices/infrastructure/api-gateway' || format('ftgo-microservices/services/{0}', matrix.service) }}
          push: false
          tags: ftgo/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ftgo-microservices

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build for dependency check
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'ftgo-microservices'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
