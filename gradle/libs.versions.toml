# =============================================================================
# FTGO Microservices - Gradle Version Catalog
# =============================================================================
# Centralized dependency management for all new microservices under services/
# and shared libraries under shared/. Legacy monolith modules at the repo root
# continue to use gradle.properties for version management.
#
# Usage in build.gradle:
#   implementation libs.spring.boot.starter.web
#   testImplementation libs.junit.jupiter
#
# See docs/adr/0002-shared-gradle-configuration.md for details.
# =============================================================================

[versions]
# --- Platform & Language ---
java                        = "17"

# --- Spring Boot & Spring Framework ---
spring-boot                 = "3.2.5"
spring-dependency-management = "1.1.5"

# --- Database & Persistence ---
flyway                      = "10.11.0"
mysql-connector             = "8.3.0"
hibernate                   = "6.4.4.Final"

# --- Observability ---
micrometer                  = "1.12.5"
micrometer-tracing          = "1.2.5"

# --- Logging ---
logstash-logback-encoder    = "7.4"
logback                     = "1.4.14"

# --- Serialization ---
jackson                     = "2.17.0"

# --- API Documentation ---
springdoc-openapi           = "2.4.0"

# --- Testing ---
junit-jupiter               = "5.10.2"
rest-assured                = "5.4.0"
mockito                     = "5.11.0"
testcontainers              = "1.19.7"
assertj                     = "3.25.3"

# --- JWT / Security ---
jjwt                        = "0.12.5"
nimbus-jose-jwt             = "9.37.3"

# --- Utilities ---
commons-lang3               = "3.14.0"
lombok                      = "1.18.32"
mapstruct                   = "1.5.5.Final"
jakarta-validation          = "3.0.2"
jakarta-persistence         = "3.1.0"
jakarta-el                  = "5.0.1"

# --- Docker & Build ---
docker-compose-plugin       = "0.17.7"
spring-boot-plugin          = "3.2.5"
versions-plugin             = "0.51.0"

[libraries]
# --- Spring Boot Starters ---
spring-boot-starter-web             = { module = "org.springframework.boot:spring-boot-starter-web" }
spring-boot-starter-data-jpa        = { module = "org.springframework.boot:spring-boot-starter-data-jpa" }
spring-boot-starter-actuator        = { module = "org.springframework.boot:spring-boot-starter-actuator" }
spring-boot-starter-validation      = { module = "org.springframework.boot:spring-boot-starter-validation" }
spring-boot-starter-test            = { module = "org.springframework.boot:spring-boot-starter-test" }
spring-boot-starter-security        = { module = "org.springframework.boot:spring-boot-starter-security" }
spring-boot-devtools                = { module = "org.springframework.boot:spring-boot-devtools" }
spring-boot-configuration-processor = { module = "org.springframework.boot:spring-boot-configuration-processor" }

# --- Database & Persistence ---
flyway-core                         = { module = "org.flywaydb:flyway-core", version.ref = "flyway" }
flyway-mysql                        = { module = "org.flywaydb:flyway-mysql", version.ref = "flyway" }
mysql-connector                     = { module = "com.mysql:mysql-connector-j", version.ref = "mysql-connector" }
jakarta-persistence-api             = { module = "jakarta.persistence:jakarta.persistence-api", version.ref = "jakarta-persistence" }

# --- Observability ---
micrometer-core                     = { module = "io.micrometer:micrometer-core", version.ref = "micrometer" }
micrometer-registry-prometheus      = { module = "io.micrometer:micrometer-registry-prometheus", version.ref = "micrometer" }
micrometer-tracing-bridge-brave     = { module = "io.micrometer:micrometer-tracing-bridge-brave", version.ref = "micrometer-tracing" }

# --- Logging ---
logstash-logback-encoder            = { module = "net.logstash.logback:logstash-logback-encoder", version.ref = "logstash-logback-encoder" }
logback-classic                     = { module = "ch.qos.logback:logback-classic", version.ref = "logback" }
logback-core                        = { module = "ch.qos.logback:logback-core", version.ref = "logback" }

# --- Serialization ---
jackson-databind                    = { module = "com.fasterxml.jackson.core:jackson-databind", version.ref = "jackson" }
jackson-core                        = { module = "com.fasterxml.jackson.core:jackson-core", version.ref = "jackson" }
jackson-datatype-jsr310             = { module = "com.fasterxml.jackson.datatype:jackson-datatype-jsr310", version.ref = "jackson" }

# --- API Documentation ---
springdoc-openapi-starter-webmvc-ui = { module = "org.springdoc:springdoc-openapi-starter-webmvc-ui", version.ref = "springdoc-openapi" }

# --- Testing ---
junit-jupiter                       = { module = "org.junit.jupiter:junit-jupiter", version.ref = "junit-jupiter" }
junit-jupiter-api                   = { module = "org.junit.jupiter:junit-jupiter-api", version.ref = "junit-jupiter" }
junit-jupiter-engine                = { module = "org.junit.jupiter:junit-jupiter-engine", version.ref = "junit-jupiter" }
rest-assured                        = { module = "io.rest-assured:rest-assured", version.ref = "rest-assured" }
rest-assured-spring-mock-mvc        = { module = "io.rest-assured:spring-mock-mvc", version.ref = "rest-assured" }
rest-assured-json-path              = { module = "io.rest-assured:json-path", version.ref = "rest-assured" }
mockito-core                        = { module = "org.mockito:mockito-core", version.ref = "mockito" }
mockito-junit-jupiter               = { module = "org.mockito:mockito-junit-jupiter", version.ref = "mockito" }
testcontainers-bom                  = { module = "org.testcontainers:testcontainers-bom", version.ref = "testcontainers" }
testcontainers-mysql                = { module = "org.testcontainers:mysql", version.ref = "testcontainers" }
testcontainers-junit-jupiter        = { module = "org.testcontainers:junit-jupiter", version.ref = "testcontainers" }
assertj-core                        = { module = "org.assertj:assertj-core", version.ref = "assertj" }
spring-security-test                = { module = "org.springframework.security:spring-security-test" }
spring-boot-starter-oauth2-resource-server = { module = "org.springframework.boot:spring-boot-starter-oauth2-resource-server" }
spring-security-oauth2-jose         = { module = "org.springframework.security:spring-security-oauth2-jose" }

# --- JWT ---
jjwt-api                            = { module = "io.jsonwebtoken:jjwt-api", version.ref = "jjwt" }
jjwt-impl                           = { module = "io.jsonwebtoken:jjwt-impl", version.ref = "jjwt" }
jjwt-jackson                        = { module = "io.jsonwebtoken:jjwt-jackson", version.ref = "jjwt" }

# --- Utilities ---
commons-lang3                       = { module = "org.apache.commons:commons-lang3", version.ref = "commons-lang3" }
lombok                              = { module = "org.projectlombok:lombok", version.ref = "lombok" }
mapstruct                           = { module = "org.mapstruct:mapstruct", version.ref = "mapstruct" }
mapstruct-processor                 = { module = "org.mapstruct:mapstruct-processor", version.ref = "mapstruct" }
jakarta-validation-api              = { module = "jakarta.validation:jakarta.validation-api", version.ref = "jakarta-validation" }
jakarta-el-api                      = { module = "jakarta.el:jakarta.el-api", version.ref = "jakarta-el" }

[bundles]
# Common Spring Boot web service dependencies
spring-boot-web = [
    "spring-boot-starter-web",
    "spring-boot-starter-actuator",
    "spring-boot-starter-validation",
]

# Spring Boot data/persistence dependencies
spring-boot-data = [
    "spring-boot-starter-data-jpa",
    "flyway-core",
    "flyway-mysql",
    "mysql-connector",
]

# Observability dependencies
observability = [
    "micrometer-core",
    "micrometer-registry-prometheus",
    "micrometer-tracing-bridge-brave",
]

# Structured logging dependencies
logging = [
    "logstash-logback-encoder",
    "logback-classic",
    "logback-core",
]

# Jackson serialization
jackson = [
    "jackson-databind",
    "jackson-core",
    "jackson-datatype-jsr310",
]

# Spring Security
spring-boot-security = [
    "spring-boot-starter-security",
]

# Standard test dependencies
testing = [
    "spring-boot-starter-test",
    "junit-jupiter",
    "mockito-core",
    "mockito-junit-jupiter",
    "assertj-core",
]

# Security testing
testing-security = [
    "spring-boot-starter-test",
    "spring-security-test",
    "junit-jupiter",
    "mockito-core",
    "mockito-junit-jupiter",
    "assertj-core",
]

# JWT dependencies
jjwt = [
    "jjwt-api",
    "jjwt-impl",
    "jjwt-jackson",
]

# REST API testing
testing-rest = [
    "rest-assured",
    "rest-assured-spring-mock-mvc",
    "rest-assured-json-path",
]

# Testcontainers for integration tests
testing-containers = [
    "testcontainers-mysql",
    "testcontainers-junit-jupiter",
]

[plugins]
spring-boot         = { id = "org.springframework.boot", version.ref = "spring-boot" }
spring-dependency-management = { id = "io.spring.dependency-management", version.ref = "spring-dependency-management" }
flyway              = { id = "org.flywaydb.flyway", version.ref = "flyway" }
versions            = { id = "com.github.ben-manes.versions", version.ref = "versions-plugin" }
