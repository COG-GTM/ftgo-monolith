plugins {
    id 'ftgo.java-conventions'
    id 'org.springframework.boot'
    id 'io.spring.dependency-management'
}

springBoot {
    buildInfo()
}

bootJar {
    archiveClassifier = ''
}

jar {
    enabled = false
}

dependencies {
    implementation platform(org.springframework.boot.gradle.plugin.SpringBootPlugin.BOM_COORDINATES)
}
