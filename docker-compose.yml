version: '3'
services:
  mysql:
    build: ./mysql
    ports:
      - 3306:3306
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_USER=mysqluser
      - MYSQL_PASSWORD=mysqlpw
  ftgo-api-gateway:
    build:
      context: ./services/ftgo-api-gateway
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - ftgo-application
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: "DockerComposeDevSecretKeyMustBeAtLeast256BitsLong!!"
      JWT_ISSUER: "ftgo-platform"
      RATE_LIMIT_REDIS_ENABLED: "false"
      ORDER_SERVICE_URL: "http://ftgo-application:8080"
      CONSUMER_SERVICE_URL: "http://ftgo-application:8080"
      RESTAURANT_SERVICE_URL: "http://ftgo-application:8080"
      COURIER_SERVICE_URL: "http://ftgo-application:8080"
      JAVA_OPTS: -Xmx192m

  ftgo-application:
    build: ./ftgo-application
    ports:
      - "8081:8080"
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql/ftgo
      SPRING_DATASOURCE_USERNAME: mysqluser
      SPRING_DATASOURCE_PASSWORD: mysqlpw
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.jdbc.Driver
      EVENTUATELOCAL_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EVENTUATELOCAL_ZOOKEEPER_CONNECTION_STRING: zookeeper:2181
      JAVA_OPTS: -Xmx192m
      SPRING_SLEUTH_ENABLED: "true"
      SPRING_SLEUTH_SAMPLER_PROBABILITY: 1
      SPRING_ZIPKIN_BASE_URL: http://zipkin:9411/
