# ============================================================================
# Prometheus Configuration for FTGO Microservices Platform
# ============================================================================
# Scrapes metrics from all FTGO microservices via Spring Boot Actuator
# /actuator/prometheus endpoint.
# ============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alert manager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load alerting rules
rule_files:
  - "alert_rules.yml"

# Scrape configurations
scrape_configs:
  # ---------------------------------------------------------------------------
  # Prometheus self-monitoring
  # ---------------------------------------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ---------------------------------------------------------------------------
  # FTGO Order Service
  # ---------------------------------------------------------------------------
  - job_name: "order-service"
    metrics_path: "/actuator/prometheus"
    scrape_interval: 10s
    static_configs:
      - targets: ["order-service:8080"]
        labels:
          service: "order-service"
          team: "order"

  # ---------------------------------------------------------------------------
  # FTGO Consumer Service
  # ---------------------------------------------------------------------------
  - job_name: "consumer-service"
    metrics_path: "/actuator/prometheus"
    scrape_interval: 10s
    static_configs:
      - targets: ["consumer-service:8080"]
        labels:
          service: "consumer-service"
          team: "consumer"

  # ---------------------------------------------------------------------------
  # FTGO Restaurant Service
  # ---------------------------------------------------------------------------
  - job_name: "restaurant-service"
    metrics_path: "/actuator/prometheus"
    scrape_interval: 10s
    static_configs:
      - targets: ["restaurant-service:8080"]
        labels:
          service: "restaurant-service"
          team: "restaurant"

  # ---------------------------------------------------------------------------
  # FTGO Courier Service
  # ---------------------------------------------------------------------------
  - job_name: "courier-service"
    metrics_path: "/actuator/prometheus"
    scrape_interval: 10s
    static_configs:
      - targets: ["courier-service:8080"]
        labels:
          service: "courier-service"
          team: "courier"
