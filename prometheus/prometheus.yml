# ============================================================================
# Prometheus Configuration for FTGO Microservices Platform
# ============================================================================
# Scrapes metrics from all FTGO microservices via Spring Boot Actuator
# endpoints on the dedicated management port (8081).
# ============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # --- Order Service ---
  - job_name: 'order-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['order-service:8081']
        labels:
          service: 'order-service'

  # --- Consumer Service ---
  - job_name: 'consumer-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['consumer-service:8081']
        labels:
          service: 'consumer-service'

  # --- Restaurant Service ---
  - job_name: 'restaurant-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['restaurant-service:8081']
        labels:
          service: 'restaurant-service'

  # --- Courier Service ---
  - job_name: 'courier-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['courier-service:8081']
        labels:
          service: 'courier-service'

  # --- Prometheus self-monitoring ---
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
