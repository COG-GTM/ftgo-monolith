spring.application.name=ftgo-courier-service
server.port=${SERVER_PORT:8083}

spring.jpa.generate-ddl=false
spring.datasource.url=jdbc:mysql://${DOCKER_HOST_IP:localhost}:3306/ftgo_courier?useSSL=false
spring.datasource.username=${DB_USERNAME:mysqluser}
spring.datasource.password=${DB_PASSWORD:mysqlpw}
spring.datasource.driver-class-name=com.mysql.jdbc.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
