# Application configuration for the service
# Override with environment-specific profiles: application-{profile}.yml
#
# Replace <service-name> with the actual service name before use.
spring:
  application:
    name: <service-name>
  datasource:
    url: jdbc:mysql://localhost:3306/<service-name>
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
