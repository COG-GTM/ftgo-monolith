apply plugin: 'org.springframework.boot'
apply plugin: 'io.spring.dependency-management'

// TODO: Update the group to match the new service's bounded context
// group = 'com.ftgo.<service-name>'

dependencies {
    // Shared libraries
    compile project(":shared-libraries:ftgo-common")
    compile project(":shared-libraries:ftgo-common-jpa")
    compile project(":shared-libraries:ftgo-domain")

    // Spring Boot starters
    compile "org.springframework.boot:spring-boot-starter-web"
    compile "org.springframework.boot:spring-boot-starter-data-jpa"
    compile "org.springframework.boot:spring-boot-starter-actuator"

    // Testing
    testCompile "org.springframework.boot:spring-boot-starter-test"
    testCompile project(":shared-libraries:ftgo-test-util")
}
