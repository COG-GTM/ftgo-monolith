plugins {
    id 'java-library'
}

group = 'com.ftgo'
version = '1.0.0-SNAPSHOT'
sourceCompatibility = '17'
targetCompatibility = '17'

repositories {
    mavenCentral()
}

dependencies {
    api 'org.junit.jupiter:junit-jupiter-api:5.10.2'
    api 'org.assertj:assertj-core:3.25.3'
    api 'org.mockito:mockito-core:5.11.0'
    api 'org.mockito:mockito-junit-jupiter:5.11.0'

    api 'org.springframework.boot:spring-boot-starter-test:3.2.5'
    api 'org.springframework.security:spring-security-core:6.2.4'

    api 'org.testcontainers:testcontainers:1.19.7'
    api 'org.testcontainers:junit-jupiter:1.19.7'
    api 'org.testcontainers:mysql:1.19.7'
    api 'org.testcontainers:kafka:1.19.7'

    api 'io.rest-assured:rest-assured:5.4.0'
    api 'io.rest-assured:spring-mock-mvc:5.4.0'

    api 'com.fasterxml.jackson.core:jackson-databind:2.17.0'
    api 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.17.0'

    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.10.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
    useJUnitPlatform()
    testLogging {
        events 'passed', 'skipped', 'failed'
        showExceptions = true
        showCauses = true
        showStackTraces = true
    }
}

java {
    withSourcesJar()
}
