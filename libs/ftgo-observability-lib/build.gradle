plugins {
    id 'java-library'
    id 'maven-publish'
}

group = 'net.chrisrichardson.ftgo'
version = '1.0.0'

sourceCompatibility = '17'
targetCompatibility = '17'

repositories {
    mavenCentral()
}

dependencies {
    // Micrometer + Prometheus
    api 'io.micrometer:micrometer-core:1.12.2'
    api 'io.micrometer:micrometer-registry-prometheus:1.12.2'

    // Spring Boot Actuator
    api 'org.springframework.boot:spring-boot-starter-actuator:3.2.0'

    // Spring Boot (provided by consuming services)
    compileOnly 'org.springframework.boot:spring-boot-autoconfigure:3.2.0'
    compileOnly 'org.springframework.boot:spring-boot-starter-web:3.2.0'

    // Testing
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.1'
    testImplementation 'org.springframework.boot:spring-boot-starter-test:3.2.0'
}

tasks.named('test') {
    useJUnitPlatform()
}

publishing {
    publications {
        maven(MavenPublication) {
            from components.java
            artifactId = 'ftgo-observability-lib'
        }
    }
    repositories {
        maven {
            name = 'local'
            url = layout.buildDirectory.dir('repo')
        }
    }
}
