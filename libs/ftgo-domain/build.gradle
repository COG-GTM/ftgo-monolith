plugins {
    id 'java-library'
    id 'maven-publish'
}

group = 'net.chrisrichardson.ftgo'
version = '1.0.0'

sourceCompatibility = '8'
targetCompatibility = '8'

repositories {
    mavenCentral()
}

dependencies {
    api project(':ftgo-common')
    api project(':libs:ftgo-common-jpa')

    api 'javax.persistence:javax.persistence-api:2.2'

    compileOnly 'org.springframework.boot:spring-boot-starter-data-jpa:2.7.18'
    compileOnly 'org.springframework.boot:spring-boot-autoconfigure:2.7.18'
    compileOnly 'org.hibernate:hibernate-core:5.6.15.Final'

    implementation 'commons-lang:commons-lang:2.6'
    implementation 'org.apache.commons:commons-lang3:3.12.0'

    testImplementation 'junit:junit:4.13.2'
}

publishing {
    publications {
        maven(MavenPublication) {
            from components.java
            artifactId = 'ftgo-domain'
        }
    }
    repositories {
        maven {
            name = 'local'
            url = layout.buildDirectory.dir('repo')
        }
    }
}
