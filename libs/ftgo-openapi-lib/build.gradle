plugins {
    id 'java-library'
    id 'maven-publish'
}

group = 'net.chrisrichardson.ftgo'
version = '1.0.0'

sourceCompatibility = '17'
targetCompatibility = '17'

repositories {
    mavenCentral()
}

dependencies {
    // SpringDoc OpenAPI 3
    api 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.3.0'

    // Spring Boot
    compileOnly 'org.springframework.boot:spring-boot-starter-web:3.2.0'
    compileOnly 'org.springframework.boot:spring-boot-autoconfigure:3.2.0'

    // Testing
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.1'
    testImplementation 'org.springframework.boot:spring-boot-starter-test:3.2.0'
}

tasks.named('test') {
    useJUnitPlatform()
}

publishing {
    publications {
        maven(MavenPublication) {
            from components.java
            artifactId = 'ftgo-openapi-lib'
        }
    }
    repositories {
        maven {
            name = 'local'
            url = layout.buildDirectory.dir('repo')
        }
    }
}
