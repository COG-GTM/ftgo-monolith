plugins {
    id 'java-library'
}

group = 'com.ftgo'
version = '1.0.0-SNAPSHOT'
sourceCompatibility = '17'
targetCompatibility = '17'

repositories {
    mavenCentral()
}

dependencies {
    api 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.5.0'
    api 'org.springdoc:springdoc-openapi-starter-common:2.5.0'

    implementation 'org.springframework.boot:spring-boot-starter-web:3.2.5'
    implementation 'org.springframework.boot:spring-boot-autoconfigure:3.2.5'
    implementation 'com.fasterxml.jackson.core:jackson-annotations:2.17.0'

    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor:3.2.5'

    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testImplementation 'org.assertj:assertj-core:3.25.3'
    testImplementation 'org.springframework.boot:spring-boot-starter-test:3.2.5'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
    useJUnitPlatform()
}

java {
    withSourcesJar()
}
