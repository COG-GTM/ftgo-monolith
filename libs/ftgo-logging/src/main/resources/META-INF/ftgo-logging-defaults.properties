ftgo.logging.enabled=true
ftgo.logging.json-enabled=true
ftgo.logging.trace-correlation-enabled=true
ftgo.logging.logstash.enabled=false
ftgo.logging.logstash.host=localhost
ftgo.logging.logstash.port=5000
ftgo.logging.logstash.queue-size=512
ftgo.logging.logstash.include-caller-data=false
ftgo.logging.console.enabled=true
ftgo.logging.console.pretty-print=false

logging.pattern.correlation=[${spring.application.name:},%mdc{traceId:-},%mdc{spanId:-}]
