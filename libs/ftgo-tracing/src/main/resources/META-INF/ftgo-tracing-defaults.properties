ftgo.tracing.enabled=true
ftgo.tracing.sampling-probability=1.0
ftgo.tracing.propagation.type=W3C
ftgo.tracing.propagation.baggage-enabled=true
ftgo.tracing.exporter.type=ZIPKIN
ftgo.tracing.exporter.zipkin-endpoint=http://localhost:9411/api/v2/spans
ftgo.tracing.exporter.otlp-endpoint=http://localhost:4317

management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.tracing.propagation.type=w3c
management.tracing.baggage.enabled=true
management.tracing.baggage.remote-fields=x-request-id,x-correlation-id
management.tracing.baggage.correlation.fields=x-request-id,x-correlation-id

management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

logging.pattern.correlation=[${spring.application.name:},%mdc{traceId:-},%mdc{spanId:-}] 
