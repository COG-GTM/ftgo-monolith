// Shared Library: ftgo-resilience-lib
// Resilience4j configuration for circuit breakers, retries with exponential backoff,
// bulkhead thread pool isolation, and rate limiting for inter-service communication.

version = '1.0.0'
group = 'net.chrisrichardson.ftgo'

apply plugin: 'ftgo.java-conventions'
apply plugin: 'ftgo.publishing-conventions'

dependencies {
    compile "org.springframework.boot:spring-boot-starter-web:${FtgoVersions.SPRING_BOOT}"
    compile "org.springframework.boot:spring-boot-starter-actuator:${FtgoVersions.SPRING_BOOT}"

    compile "io.github.resilience4j:resilience4j-circuitbreaker:0.13.2"
    compile "io.github.resilience4j:resilience4j-retry:0.13.2"
    compile "io.github.resilience4j:resilience4j-bulkhead:0.13.2"
    compile "io.github.resilience4j:resilience4j-ratelimiter:0.13.2"

    compile "io.vavr:vavr:0.9.2"

    testCompile "org.springframework.boot:spring-boot-starter-test:${FtgoVersions.SPRING_BOOT}"
}
