spring:
  security:
    user:
      name: user
      password: password

ftgo:
  security:
    enabled: true
    cors:
      allowed-origins:
        - http://localhost:3000
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
