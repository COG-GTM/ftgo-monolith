# FTGO Security Profile Configuration
# Activate with: spring.profiles.active=security
#
# Default security settings for all microservices.
# Override per-service with service-specific application-security.yml

ftgo:
  security:
    cors:
      allowed-origins: "${FTGO_CORS_ALLOWED_ORIGINS:*}"
      allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
      allowed-headers: "*"
      max-age: 3600
    public-paths:
      - /actuator/health
      - /actuator/info
      - /swagger-ui/**
      - /swagger-ui.html
      - /v3/api-docs/**

# Spring Security default user for development/testing
# In production, replace with proper identity provider configuration
spring:
  security:
    user:
      name: "${FTGO_SECURITY_USER:ftgo-service}"
      password: "${FTGO_SECURITY_PASSWORD}"
      roles: SERVICE
