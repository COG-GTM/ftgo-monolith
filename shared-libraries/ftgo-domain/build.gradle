// Shared Library: ftgo-domain
// Core domain entities shared across services (Order, Consumer, Restaurant, Courier).
// Migrated from monolith module: ftgo-domain

version = '1.0.0'
group = 'net.chrisrichardson.ftgo'

apply plugin: 'ftgo.java-conventions'
apply plugin: 'ftgo.testing-conventions'
apply plugin: 'ftgo.publishing-conventions'

dependencies {
    compile project(":shared-libraries:ftgo-common")
    compile project(":shared-libraries:ftgo-common-jpa")
}
