plugins {
    id 'ftgo.spring-boot-conventions'
    id 'ftgo.publishing-conventions'
}

version = '1.0.0'
group = 'net.chrisrichardson.ftgo'

dependencies {
    api project(":shared-libraries:ftgo-common")
    api libs.spring.boot.starter.data.jpa
}

publishing {
    publications {
        mavenJava {
            artifactId = 'ftgo-common-jpa-lib'

            pom {
                name = 'FTGO Common JPA Library'
                description = 'JPA utility classes, ORM mappings, and persistence configuration for the FTGO microservices platform'
            }
        }
    }

    repositories {
        maven {
            name = 'local'
            url = "${rootProject.buildDir}/repo"
        }
    }
}
