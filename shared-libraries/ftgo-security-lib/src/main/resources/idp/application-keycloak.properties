# =============================================================================
# Keycloak IdP Integration - Example Service Configuration
# =============================================================================
# Copy this file into a service's src/main/resources/ directory and activate
# the "keycloak" Spring profile to use Keycloak as the identity provider.
#
# When using Keycloak, the API Gateway validates tokens issued by Keycloak
# and forwards verified claims to downstream services via the JWT.
# Downstream services use ftgo-security-lib's JwtAuthenticationFilter to
# validate the forwarded token.
#
# Usage:  java -jar service.jar --spring.profiles.active=keycloak
# =============================================================================

# --- JWT secret must match the signing key configured in the API Gateway ---
# When using Keycloak with symmetric signing (HS256), set this to the shared secret.
# When using asymmetric signing (RS256), this library does not apply — use
# Spring Security OAuth2 Resource Server instead.
ftgo.security.jwt.secret=${FTGO_JWT_SECRET:}

# --- Issuer must match the Keycloak realm issuer URL ---
ftgo.security.jwt.issuer=${KEYCLOAK_ISSUER:http://localhost:8180/auth/realms/ftgo}

# --- Token lifetimes should align with Keycloak realm settings ---
ftgo.security.jwt.expiration-ms=3600000
ftgo.security.jwt.refresh-expiration-ms=86400000

# --- Keycloak server connection (for reference / future OAuth2 integration) ---
# keycloak.auth-server-url=http://localhost:8180/auth
# keycloak.realm=ftgo
# keycloak.resource=ftgo-api-gateway
# keycloak.credentials.secret=CHANGE_ME_IN_PRODUCTION
