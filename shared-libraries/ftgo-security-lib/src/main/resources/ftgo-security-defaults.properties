# =============================================================================
# FTGO Security Library - Default Properties
# =============================================================================
# These defaults are loaded by the library. Services can override any of these
# in their own application.properties or application.yml.

# --- Public Paths (comma-separated, no authentication required) ---
ftgo.security.public-paths=/actuator/health,/actuator/info

# --- CORS Configuration ---
ftgo.security.cors.allowed-origins=*
ftgo.security.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
ftgo.security.cors.allowed-headers=Authorization,Content-Type,X-Requested-With,Accept,Origin
ftgo.security.cors.allow-credentials=false
ftgo.security.cors.max-age=3600
