// Shared Library: ftgo-tracing-lib
// Distributed tracing with Spring Cloud Sleuth and Zipkin/Jaeger.
// Provides auto-configuration, trace context propagation (B3),
// custom span utilities, and trace-to-log correlation.

version = '1.0.0'
group = 'net.chrisrichardson.ftgo'

apply plugin: 'ftgo.java-conventions'
apply plugin: 'ftgo.publishing-conventions'
apply plugin: 'io.spring.dependency-management'

dependencyManagement {
    imports {
        mavenBom "org.springframework.cloud:spring-cloud-dependencies:Finchley.SR4"
    }
}

dependencies {
    compile "org.springframework.boot:spring-boot-starter-web:${FtgoVersions.SPRING_BOOT}"
    compile "org.springframework.boot:spring-boot-starter-actuator:${FtgoVersions.SPRING_BOOT}"

    compile "org.springframework.cloud:spring-cloud-starter-sleuth"
    compile "org.springframework.cloud:spring-cloud-starter-zipkin"

    compile "ch.qos.logback:logback-classic:1.2.3"

    compileOnly "javax.servlet:javax.servlet-api:3.1.0"

    testCompile "org.springframework.boot:spring-boot-starter-test:${FtgoVersions.SPRING_BOOT}"
}
