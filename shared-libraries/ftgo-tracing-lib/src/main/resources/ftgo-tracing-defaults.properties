# FTGO Tracing Library - Default Configuration
# These defaults are applied when the library is included as a dependency.
# Services can override these in their own application.properties.

# Enable distributed tracing
ftgo.tracing.enabled=true

# Sleuth sampling probability (1.0 = trace every request, 0.1 = 10%)
spring.sleuth.sampler.probability=1.0

# B3 propagation format (single-header or multi-header)
spring.sleuth.propagation.type=B3

# Zipkin reporter configuration
spring.zipkin.enabled=true
spring.zipkin.base-url=http://localhost:9411/
spring.zipkin.sender.type=web

# Log correlation - inject traceId/spanId into MDC
ftgo.tracing.log-correlation.enabled=true

# Actuator endpoint exposure
management.endpoints.web.exposure.include=health,info,prometheus,metrics
