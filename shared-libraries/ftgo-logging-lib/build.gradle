// Shared Library: ftgo-logging-lib
// Centralized structured logging configuration with JSON format,
// MDC context propagation, and correlation ID support.

version = '1.0.0'
group = 'net.chrisrichardson.ftgo'

apply plugin: 'ftgo.java-conventions'
apply plugin: 'ftgo.publishing-conventions'

dependencies {
    compile "org.springframework.boot:spring-boot-starter-web:$springBootVersion"
    compile "ch.qos.logback:logback-classic:1.2.3"
    compile "ch.qos.logback:logback-core:1.2.3"
    compile "net.logstash.logback:logstash-logback-encoder:5.3"

    compileOnly "javax.servlet:javax.servlet-api:3.1.0"

    testCompile "org.springframework.boot:spring-boot-starter-test:$springBootVersion"
}
