// Shared Library: ftgo-openapi-lib
// OpenAPI 3.0 standards library for FTGO microservices.
// Provides standard API documentation configuration, response envelope models,
// pagination models, and error response models using SpringDoc OpenAPI.
//
// NOTE: This library coexists with common-swagger (Springfox 2.8.0).
// New microservices should use this library; the monolith retains Springfox.

version = '1.0.0'
group = 'net.chrisrichardson.ftgo'

apply plugin: 'ftgo.java-conventions'
apply plugin: 'ftgo.publishing-conventions'

dependencies {
    compile "org.springframework.boot:spring-boot-starter-web:${FtgoVersions.SPRING_BOOT}"
    compile "org.springframework.boot:spring-boot-autoconfigure:${FtgoVersions.SPRING_BOOT}"

    // SpringDoc OpenAPI 1.6.x – last version supporting Spring Boot 2.x and Java 8
    compile "org.springdoc:springdoc-openapi-ui:1.6.15"
    compile "org.springdoc:springdoc-openapi-common:1.6.15"

    // Swagger/OpenAPI annotations
    compile "io.swagger.core.v3:swagger-annotations:2.2.8"

    compileOnly "org.springframework.boot:spring-boot-configuration-processor:${FtgoVersions.SPRING_BOOT}"

    testCompile "org.springframework.boot:spring-boot-starter-test:${FtgoVersions.SPRING_BOOT}"
}
