# ============================================================================
# FTGO OpenAPI Library - Default Configuration
# ============================================================================
# These defaults are provided by the ftgo-openapi-lib shared library.
# Services can override any property in their own application.properties.
# ============================================================================

# --- Swagger UI Configuration ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.doc-expansion=list
springdoc.swagger-ui.default-models-expand-depth=3
springdoc.swagger-ui.display-request-duration=true

# --- OpenAPI Spec Configuration ---
springdoc.api-docs.path=/v3/api-docs
springdoc.packages-to-scan=net.chrisrichardson.ftgo
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json

# --- Date/Time Format (ISO 8601) ---
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false
