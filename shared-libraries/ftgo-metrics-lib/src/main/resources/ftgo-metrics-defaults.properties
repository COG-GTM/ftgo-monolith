# FTGO Metrics Library - Default Configuration
# These defaults are applied when the library is included as a dependency.
# Services can override these in their own application.properties.

# Expose Prometheus endpoint via Spring Boot Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Enable JVM and system metrics
management.metrics.binders.jvm.enabled=true
management.metrics.binders.processor.enabled=true
management.metrics.binders.uptime.enabled=true

# Default environment tag
ftgo.metrics.environment=local
