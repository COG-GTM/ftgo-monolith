# FTGO Platform - Base Kustomization
# This file defines the base Kubernetes resources for the FTGO platform.
# Environment-specific overlays are in overlays/{env}/

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: ftgo-platform

# Resources will be added as services are migrated
# resources:
#   - ../services/ftgo-order-service/k8s/deployment.yml
#   - ../services/ftgo-consumer-service/k8s/deployment.yml
#   - ../services/ftgo-restaurant-service/k8s/deployment.yml
#   - ../services/ftgo-courier-service/k8s/deployment.yml

commonLabels:
  platform: ftgo
  managed-by: kustomize
