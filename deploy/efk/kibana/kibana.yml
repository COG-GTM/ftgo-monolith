# =============================================================================
# Kibana Configuration — FTGO Platform
# =============================================================================
# Kibana configuration for local development and default settings.
# =============================================================================

server.name: ftgo-kibana
server.host: "0.0.0.0"
server.port: 5601

# Elasticsearch connection
elasticsearch.hosts: ["http://elasticsearch:9200"]

# Request timeout
elasticsearch.requestTimeout: 30000

# Default index pattern
kibana.defaultAppId: "discover"

# Telemetry (disabled for local development)
telemetry.enabled: false
telemetry.optIn: false

# Logging
logging.root.level: info

# Security (disabled for local development)
xpack.security.enabled: false
xpack.encryptedSavedObjects.encryptionKey: "ftgo-kibana-encryption-key-dev-only-32chars!"
