# =============================================================================
# Fluentd Configuration — FTGO Platform
# =============================================================================
# Collects structured JSON logs from Kubernetes pods and forwards them to
# Elasticsearch. Designed for the EFK (Elasticsearch + Fluentd + Kibana) stack.
#
# Log flow:
#   K8s container stdout -> Fluentd tail input -> JSON parser -> 
#   Kubernetes metadata filter -> Elasticsearch output
# =============================================================================

# ---- System Configuration ---------------------------------------------------
<system>
  log_level info
</system>

# ---- Input: Kubernetes Container Logs ---------------------------------------
# Tail container log files from the K8s node's /var/log/containers/ directory.
# Logs are expected in JSON format (structured logging from ftgo-logging-lib).
<source>
  @type tail
  @id input_kubernetes_containers
  path /var/log/containers/ftgo-*.log
  pos_file /var/log/fluentd-containers.log.pos
  tag kubernetes.*
  read_from_head true
  <parse>
    @type json
    time_key @timestamp
    time_format %Y-%m-%dT%H:%M:%S.%N%z
    keep_time_key true
  </parse>
</source>

# ---- Input: Docker Compose Container Logs (Local Development) ---------------
# For local Docker Compose development, collect logs from Docker log driver.
<source>
  @type forward
  @id input_forward
  port 24224
  bind 0.0.0.0
</source>

# ---- Filter: Kubernetes Metadata Enrichment --------------------------------
# Enriches log events with Kubernetes metadata (namespace, pod name, labels).
<filter kubernetes.**>
  @type kubernetes_metadata
  @id filter_kubernetes_metadata
  kubernetes_url "#{ENV['KUBERNETES_SERVICE_HOST']}:#{ENV['KUBERNETES_SERVICE_PORT']}"
  verify_ssl false
  <label_transformer>
    tag_prefix kubernetes
  </label_transformer>
</filter>

# ---- Filter: FTGO Service Logs ---------------------------------------------
# Process FTGO service logs, ensuring required fields are present.
<filter **>
  @type record_transformer
  @id filter_ftgo_record
  enable_ruby true
  <record>
    # Ensure service field is present
    service ${record["service"] || record.dig("kubernetes", "labels", "app.kubernetes.io/name") || "unknown"}
    # Ensure level field is normalized to uppercase
    level ${record["level"] ? record["level"].upcase : "INFO"}
    # Add environment tag
    environment "#{ENV['FTGO_ENVIRONMENT'] || 'dev'}"
  </record>
</filter>

# ---- Filter: Remove unnecessary fields -------------------------------------
<filter **>
  @type record_transformer
  @id filter_cleanup
  remove_keys $.stream,$.docker
</filter>

# ---- Output: Elasticsearch -------------------------------------------------
# Forward processed logs to Elasticsearch with daily index rotation.
<match **>
  @type elasticsearch
  @id output_elasticsearch
  host "#{ENV['ELASTICSEARCH_HOST'] || 'elasticsearch'}"
  port "#{ENV['ELASTICSEARCH_PORT'] || '9200'}"
  scheme "#{ENV['ELASTICSEARCH_SCHEME'] || 'http'}"
  
  # Index naming: ftgo-logs-YYYY.MM.DD
  index_name ftgo-logs
  type_name _doc
  include_timestamp true
  
  # Use logstash-style index naming for daily rotation
  logstash_format true
  logstash_prefix ftgo-logs
  logstash_dateformat %Y.%m.%d
  
  # Connection settings
  reconnect_on_error true
  reload_on_failure true
  reload_connections false
  request_timeout 30s
  
  # Buffering for reliability
  <buffer>
    @type file
    path /var/log/fluentd-buffers/ftgo-logs.buffer
    flush_mode interval
    flush_interval 5s
    flush_thread_count 2
    retry_type exponential_backoff
    retry_wait 1s
    retry_max_interval 60s
    retry_forever true
    chunk_limit_size 8M
    queue_limit_length 256
    overflow_action block
  </buffer>
</match>
