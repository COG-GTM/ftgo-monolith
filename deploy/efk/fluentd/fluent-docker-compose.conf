# =============================================================================
# Fluentd Configuration — FTGO Platform (Docker Compose / Local Development)
# =============================================================================
# Collects structured JSON logs from services via the forward protocol and
# sends them to Elasticsearch. This config is for local development only;
# K8s-specific features (tail input, metadata enrichment) are disabled.
#
# Log flow:
#   Service stdout -> Docker log driver -> Fluentd forward input ->
#   JSON parser -> Elasticsearch output
# =============================================================================

# ---- System Configuration ---------------------------------------------------
<system>
  log_level info
</system>

# ---- Input: Forward Protocol (Docker log driver) ----------------------------
# Services send logs via Docker's fluentd log driver on port 24224.
<source>
  @type forward
  @id input_forward
  port 24224
  bind 0.0.0.0
</source>

# ---- Filter: Parse JSON from Docker log driver ------------------------------
# Docker's fluentd log driver wraps the log line in a "log" field.
# Extract JSON fields from the log line if present.
<filter **>
  @type parser
  @id filter_parse_json
  key_name log
  reserve_data true
  remove_key_name_field true
  emit_invalid_record_to_error false
  <parse>
    @type json
    time_key @timestamp
    time_format %Y-%m-%dT%H:%M:%S.%N%z
    keep_time_key true
  </parse>
</filter>

# ---- Filter: FTGO Service Logs ---------------------------------------------
# Process FTGO service logs, ensuring required fields are present.
<filter **>
  @type record_transformer
  @id filter_ftgo_record
  enable_ruby true
  <record>
    # Ensure service field is present; use container_name as fallback
    service ${record["service"] || record["container_name"] || tag_parts[0] || "unknown"}
    # Ensure level field is normalized to uppercase
    level ${record["level"] ? record["level"].upcase : "INFO"}
    # Add environment tag
    environment "#{ENV['FTGO_ENVIRONMENT'] || 'dev'}"
  </record>
</filter>

# ---- Output: Elasticsearch -------------------------------------------------
# Forward processed logs to Elasticsearch with daily index rotation.
<match **>
  @type elasticsearch
  @id output_elasticsearch
  host "#{ENV['ELASTICSEARCH_HOST'] || 'elasticsearch'}"
  port "#{ENV['ELASTICSEARCH_PORT'] || '9200'}"
  scheme "#{ENV['ELASTICSEARCH_SCHEME'] || 'http'}"

  # Use logstash-style index naming for daily rotation
  logstash_format true
  logstash_prefix ftgo-logs
  logstash_dateformat %Y.%m.%d
  include_timestamp true

  # Connection settings
  reconnect_on_error true
  reload_on_failure true
  reload_connections false
  request_timeout 30s

  # Buffering for reliability
  <buffer>
    @type file
    path /var/log/fluentd-buffers/ftgo-logs.buffer
    flush_mode interval
    flush_interval 5s
    flush_thread_count 2
    retry_type exponential_backoff
    retry_wait 1s
    retry_max_interval 30s
    retry_forever false
    retry_max_times 10
    chunk_limit_size 8M
    queue_limit_length 64
    overflow_action drop_oldest_chunk
  </buffer>
</match>
