# =============================================================================
# FTGO Platform — Development Environment Values
# =============================================================================
# Overrides for the ftgo-dev namespace. Minimal resources, single replicas,
# relaxed autoscaling. Deployed automatically on merge to main.
# =============================================================================

global:
  namespace: ftgo-dev
  imageTag: latest

mysql:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  storage:
    size: 5Gi

serviceDefaults:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 384Mi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: false
  env:
    SPRING_PROFILES_ACTIVE: kubernetes,dev
    JAVA_OPTS: "-Xmx256m -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    LOG_LEVEL: DEBUG
    FTGO_LOGGING_JSON_ENABLED: "true"
    FTGO_LOGGING_ASYNC_ENABLED: "true"
    FTGO_LOGGING_INCLUDE_CALLER_DATA: "true"

# -- Logging / EFK Stack (Dev) ------------------------------------------------
logging:
  enabled: true
  retentionDays: 7
  elasticsearch:
    replicas: 1
    javaOpts: "-Xms256m -Xmx256m"
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    storage:
      size: 5Gi
  fluentd:
    logLevel: info
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
  kibana:
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 250m
        memory: 512Mi
