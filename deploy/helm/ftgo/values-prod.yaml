# =============================================================================
# FTGO Platform — Production Environment Values
# =============================================================================
# Overrides for the ftgo-prod namespace. Full production configuration
# with HA replicas, strict resource limits, and autoscaling enabled.
# Requires approval gate for promotion.
# =============================================================================

global:
  namespace: ftgo-prod
  imageTag: ""  # Set by CD pipeline to promoted image tag

mysql:
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  storage:
    size: 50Gi
    storageClassName: gp3

serviceDefaults:
  replicas: 3
  resources:
    requests:
      cpu: 250m
      memory: 384Mi
    limits:
      cpu: "1"
      memory: 768Mi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  env:
    SPRING_PROFILES_ACTIVE: kubernetes,prod
    JAVA_OPTS: "-Xmx512m -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    LOG_LEVEL: WARN
