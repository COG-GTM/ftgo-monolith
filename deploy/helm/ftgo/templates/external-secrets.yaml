{{- if .Values.externalSecrets.enabled }}
# =============================================================================
# External Secrets — MySQL Credentials
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ftgo-mysql-credentials
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ftgo.labels" (dict "name" "ftgo-mysql-credentials" "context" $) | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: ftgo-mysql-credentials
    creationPolicy: Owner
  data:
    - secretKey: root-password
      remoteRef:
        key: ftgo/{{ .Values.global.namespace }}/mysql
        property: root-password
    - secretKey: username
      remoteRef:
        key: ftgo/{{ .Values.global.namespace }}/mysql
        property: username
    - secretKey: password
      remoteRef:
        key: ftgo/{{ .Values.global.namespace }}/mysql
        property: password
    - secretKey: database
      remoteRef:
        key: ftgo/{{ .Values.global.namespace }}/mysql
        property: database
---
# =============================================================================
# External Secrets — JWT Secret
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ftgo-jwt-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ftgo.labels" (dict "name" "ftgo-jwt-secret" "context" $) | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: ftgo-jwt-secret
    creationPolicy: Owner
  data:
    - secretKey: jwt-secret
      remoteRef:
        key: ftgo/{{ .Values.global.namespace }}/jwt
        property: secret
---
# =============================================================================
# External Secrets — GHCR Pull Credentials
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ghcr-credentials
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ftgo.labels" (dict "name" "ghcr-credentials" "context" $) | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: ghcr-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
  data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: ftgo/{{ .Values.global.namespace }}/ghcr
        property: dockerconfigjson
{{- end }}
