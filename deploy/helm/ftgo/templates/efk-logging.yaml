{{- /*
=============================================================================
EFK Logging Stack — Elasticsearch, Fluentd, Kibana
=============================================================================
Deploys the EFK stack for centralized log aggregation when logging is enabled.
*/}}

{{- if .Values.logging.enabled }}

# --- Elasticsearch StatefulSet -----------------------------------------------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ftgo-elasticsearch
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ftgo.labels" (dict "name" "ftgo-elasticsearch" "context" $) | nindent 4 }}
    app.kubernetes.io/component: logging
spec:
  serviceName: ftgo-elasticsearch
  replicas: {{ .Values.logging.elasticsearch.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ftgo-elasticsearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ftgo-elasticsearch
        app.kubernetes.io/part-of: ftgo-platform
        app.kubernetes.io/component: logging
    spec:
      containers:
        - name: elasticsearch
          image: "{{ .Values.logging.elasticsearch.image.repository }}:{{ .Values.logging.elasticsearch.image.tag }}"
          imagePullPolicy: {{ .Values.logging.elasticsearch.image.pullPolicy }}
          ports:
            - containerPort: 9200
              name: http
            - containerPort: 9300
              name: transport
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: {{ .Values.logging.elasticsearch.javaOpts | quote }}
            - name: cluster.name
              value: ftgo-logging
          resources:
            {{- toYaml .Values.logging.elasticsearch.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_cluster/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: elasticsearch-data
              mountPath: /usr/share/elasticsearch/data
  volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.logging.elasticsearch.storage.storageClassName }}
        storageClassName: {{ .Values.logging.elasticsearch.storage.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.logging.elasticsearch.storage.size }}

---
# --- Elasticsearch Service ---------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: ftgo-elasticsearch
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ftgo.labels" (dict "name" "ftgo-elasticsearch" "context" $) | nindent 4 }}
    app.kubernetes.io/component: logging
spec:
  type: ClusterIP
  ports:
    - port: 9200
      targetPort: http
      name: http
    - port: 9300
      targetPort: transport
      name: transport
  selector:
    app.kubernetes.io/name: ftgo-elasticsearch

---
# --- Fluentd ConfigMap -------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: ftgo-fluentd-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ftgo.labels" (dict "name" "ftgo-fluentd" "context" $) | nindent 4 }}
    app.kubernetes.io/component: logging
data:
  fluent.conf: |
    <system>
      log_level {{ .Values.logging.fluentd.logLevel }}
    </system>

    <source>
      @type tail
      @id input_kubernetes_containers
      path /var/log/containers/ftgo-*.log
      pos_file /var/log/fluentd-containers.log.pos
      tag kubernetes.*
      read_from_head true
      <parse>
        @type json
        time_key @timestamp
        time_format %Y-%m-%dT%H:%M:%S.%N%z
        keep_time_key true
      </parse>
    </source>

    <filter kubernetes.**>
      @type kubernetes_metadata
      @id filter_kubernetes_metadata
    </filter>

    <filter **>
      @type record_transformer
      @id filter_ftgo_record
      enable_ruby true
      <record>
        service ${record["service"] || record.dig("kubernetes", "labels", "app.kubernetes.io/name") || "unknown"}
        level ${record["level"] ? record["level"].upcase : "INFO"}
        environment {{ .Values.global.namespace }}
      </record>
    </filter>

    <match **>
      @type elasticsearch
      @id output_elasticsearch
      host ftgo-elasticsearch
      port 9200
      scheme http
      logstash_format true
      logstash_prefix ftgo-logs
      logstash_dateformat %Y.%m.%d
      include_timestamp true
      reconnect_on_error true
      reload_on_failure true
      request_timeout 30s
      <buffer>
        @type file
        path /var/log/fluentd-buffers/ftgo-logs.buffer
        flush_mode interval
        flush_interval 5s
        flush_thread_count 2
        retry_type exponential_backoff
        retry_wait 1s
        retry_max_interval 60s
        retry_forever true
        chunk_limit_size 8M
        queue_limit_length 256
        overflow_action block
      </buffer>
    </match>

---
# --- Fluentd ServiceAccount --------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ftgo-fluentd
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ftgo.labels" (dict "name" "ftgo-fluentd" "context" $) | nindent 4 }}
    app.kubernetes.io/component: logging

---
# --- Fluentd ClusterRole -----------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ftgo-fluentd
  labels:
    {{- include "ftgo.labels" (dict "name" "ftgo-fluentd" "context" $) | nindent 4 }}
    app.kubernetes.io/component: logging
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]

---
# --- Fluentd ClusterRoleBinding ----------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ftgo-fluentd
  labels:
    {{- include "ftgo.labels" (dict "name" "ftgo-fluentd" "context" $) | nindent 4 }}
    app.kubernetes.io/component: logging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ftgo-fluentd
subjects:
  - kind: ServiceAccount
    name: ftgo-fluentd
    namespace: {{ .Values.global.namespace }}

---
# --- Fluentd DaemonSet -------------------------------------------------------
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ftgo-fluentd
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ftgo.labels" (dict "name" "ftgo-fluentd" "context" $) | nindent 4 }}
    app.kubernetes.io/component: logging
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ftgo-fluentd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ftgo-fluentd
        app.kubernetes.io/part-of: ftgo-platform
        app.kubernetes.io/component: logging
    spec:
      serviceAccountName: ftgo-fluentd
      tolerations:
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
      containers:
        - name: fluentd
          image: "{{ .Values.logging.fluentd.image.repository }}:{{ .Values.logging.fluentd.image.tag }}"
          imagePullPolicy: {{ .Values.logging.fluentd.image.pullPolicy }}
          env:
            - name: FLUENT_ELASTICSEARCH_HOST
              value: ftgo-elasticsearch
            - name: FLUENT_ELASTICSEARCH_PORT
              value: "9200"
            - name: FLUENT_ELASTICSEARCH_SCHEME
              value: http
          resources:
            {{- toYaml .Values.logging.fluentd.resources | nindent 12 }}
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: containers
              mountPath: /var/log/containers
              readOnly: true
            - name: fluentd-config
              mountPath: /fluentd/etc
            - name: buffer
              mountPath: /var/log/fluentd-buffers
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: containers
          hostPath:
            path: /var/log/containers
        - name: fluentd-config
          configMap:
            name: ftgo-fluentd-config
        - name: buffer
          emptyDir: {}

---
# --- Kibana Deployment -------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftgo-kibana
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ftgo.labels" (dict "name" "ftgo-kibana" "context" $) | nindent 4 }}
    app.kubernetes.io/component: logging
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ftgo-kibana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ftgo-kibana
        app.kubernetes.io/part-of: ftgo-platform
        app.kubernetes.io/component: logging
    spec:
      containers:
        - name: kibana
          image: "{{ .Values.logging.kibana.image.repository }}:{{ .Values.logging.kibana.image.tag }}"
          imagePullPolicy: {{ .Values.logging.kibana.image.pullPolicy }}
          ports:
            - containerPort: 5601
              name: http
          env:
            - name: ELASTICSEARCH_HOSTS
              value: http://ftgo-elasticsearch:9200
            - name: XPACK_SECURITY_ENABLED
              value: "false"
            - name: TELEMETRY_ENABLED
              value: "false"
          resources:
            {{- toYaml .Values.logging.kibana.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30

---
# --- Kibana Service ----------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: ftgo-kibana
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ftgo.labels" (dict "name" "ftgo-kibana" "context" $) | nindent 4 }}
    app.kubernetes.io/component: logging
spec:
  type: ClusterIP
  ports:
    - port: 5601
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: ftgo-kibana

{{- end }}
