{{- if not .Values.externalSecrets.enabled }}
# =============================================================================
# Sealed Secrets — Fallback when External Secrets Operator is unavailable
# =============================================================================
# These SealedSecret resources are placeholders. In a real deployment, encrypt
# with kubeseal:
#   kubeseal --format yaml < secret.yaml > sealed-secret.yaml
#
# For bootstrapping or local development, you can create regular secrets
# manually, but NEVER commit plaintext secrets to version control.
# =============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ftgo-mysql-credentials
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ftgo.labels" (dict "name" "ftgo-mysql-credentials" "context" $) | nindent 4 }}
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
spec:
  encryptedData:
    # Replace with actual sealed values using kubeseal
    root-password: AgBY...REPLACE_WITH_SEALED_VALUE
    username: AgBY...REPLACE_WITH_SEALED_VALUE
    password: AgBY...REPLACE_WITH_SEALED_VALUE
    database: AgBY...REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      name: ftgo-mysql-credentials
      namespace: {{ .Values.global.namespace }}
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ftgo-jwt-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ftgo.labels" (dict "name" "ftgo-jwt-secret" "context" $) | nindent 4 }}
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
spec:
  encryptedData:
    # Replace with actual sealed value using kubeseal
    jwt-secret: AgBY...REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      name: ftgo-jwt-secret
      namespace: {{ .Values.global.namespace }}
    type: Opaque
{{- end }}
