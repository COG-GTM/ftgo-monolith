# =============================================================================
# Zipkin — Kubernetes Deployment & Service
# =============================================================================
# Distributed trace collector for the FTGO platform.
# Collects and visualizes traces from all FTGO microservices.
#
# Access the Zipkin UI via:
#   kubectl port-forward svc/zipkin 9411:9411 -n <namespace>
#   Then open http://localhost:9411
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipkin
  labels:
    app: zipkin
    component: tracing
    platform: ftgo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zipkin
  template:
    metadata:
      labels:
        app: zipkin
        component: tracing
        platform: ftgo
    spec:
      containers:
        - name: zipkin
          image: openzipkin/zipkin:3.4
          ports:
            - containerPort: 9411
              name: http
          env:
            - name: STORAGE_TYPE
              value: "mem"
          readinessProbe:
            httpGet:
              path: /health
              port: 9411
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 9411
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: zipkin
  labels:
    app: zipkin
    component: tracing
    platform: ftgo
spec:
  selector:
    app: zipkin
  ports:
    - protocol: TCP
      port: 9411
      targetPort: 9411
      name: http
  type: ClusterIP
