# =============================================================================
# Kustomize Overlay — Production (ftgo-prod)
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ftgo-prod

resources:
  - ../../base

patches:
  # 3 replicas for production
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  # Production resource limits
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 250m
            memory: 384Mi
          limits:
            cpu: "1"
            memory: 768Mi
  # Production MySQL resources
  - target:
      kind: StatefulSet
      name: ftgo-mysql
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 2Gi
  # Production MySQL storage
  - target:
      kind: StatefulSet
      name: ftgo-mysql
    patch: |
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: 50Gi
  # Production HPA scaling
  - target:
      kind: HorizontalPodAutoscaler
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 10
  # Production PDB
  - target:
      kind: PodDisruptionBudget
    patch: |
      - op: replace
        path: /spec/minAvailable
        value: 2

commonLabels:
  environment: prod

commonAnnotations:
  ftgo.io/environment: prod
