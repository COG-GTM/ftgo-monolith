apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftgo-api-gateway
  labels:
    app.kubernetes.io/name: ftgo-api-gateway
    app.kubernetes.io/part-of: ftgo-platform
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: ftgo-api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ftgo-api-gateway
        app.kubernetes.io/part-of: ftgo-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: ftgo-api-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
        - name: ftgo-api-gateway
          image: ghcr.io/cog-gtm/ftgo-monolith/ftgo-api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: SPRING_APPLICATION_NAME
              value: ftgo-api-gateway
            - name: SPRING_PROFILES_ACTIVE
              value: kubernetes
            - name: JAVA_OPTS
              value: "-Xmx384m -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
            - name: FTGO_ORDER_SERVICE_URL
              value: "http://ftgo-order-service:8081"
            - name: FTGO_CONSUMER_SERVICE_URL
              value: "http://ftgo-consumer-service:8082"
            - name: FTGO_RESTAURANT_SERVICE_URL
              value: "http://ftgo-restaurant-service:8083"
            - name: FTGO_COURIER_SERVICE_URL
              value: "http://ftgo-courier-service:8084"
            - name: SPRING_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: ftgo-common-config
                  key: redis-host
                  optional: true
            - name: FTGO_SECURITY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ftgo-jwt-secret
                  key: jwt-secret
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 768Mi
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ftgo-api-gateway
  labels:
    app.kubernetes.io/name: ftgo-api-gateway
    app.kubernetes.io/part-of: ftgo-platform
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
    - port: 443
      targetPort: http
      protocol: TCP
      name: https
  selector:
    app.kubernetes.io/name: ftgo-api-gateway
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ftgo-api-gateway
  labels:
    app.kubernetes.io/name: ftgo-api-gateway
    app.kubernetes.io/part-of: ftgo-platform
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ftgo-api-gateway
  labels:
    app.kubernetes.io/name: ftgo-api-gateway
    app.kubernetes.io/part-of: ftgo-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ftgo-api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 3
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ftgo-api-gateway
  labels:
    app.kubernetes.io/name: ftgo-api-gateway
    app.kubernetes.io/part-of: ftgo-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ftgo-api-gateway
