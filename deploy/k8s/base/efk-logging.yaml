# =============================================================================
# EFK Logging Stack — Kubernetes Base Resources
# =============================================================================
# Deploys Elasticsearch, Fluentd (DaemonSet), and Kibana for centralized
# log aggregation across all FTGO microservices.
# =============================================================================

# --- Elasticsearch StatefulSet -----------------------------------------------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ftgo-elasticsearch
  namespace: ftgo-dev
  labels:
    app.kubernetes.io/name: ftgo-elasticsearch
    app.kubernetes.io/part-of: ftgo-platform
    app.kubernetes.io/component: logging
spec:
  serviceName: ftgo-elasticsearch
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ftgo-elasticsearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ftgo-elasticsearch
        app.kubernetes.io/part-of: ftgo-platform
        app.kubernetes.io/component: logging
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
          ports:
            - containerPort: 9200
              name: http
            - containerPort: 9300
              name: transport
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: cluster.name
              value: ftgo-logging
            - name: bootstrap.memory_lock
              value: "false"
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /_cluster/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          volumeMounts:
            - name: elasticsearch-data
              mountPath: /usr/share/elasticsearch/data
  volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

---
# --- Elasticsearch Service ---------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: ftgo-elasticsearch
  namespace: ftgo-dev
  labels:
    app.kubernetes.io/name: ftgo-elasticsearch
    app.kubernetes.io/part-of: ftgo-platform
    app.kubernetes.io/component: logging
spec:
  type: ClusterIP
  ports:
    - port: 9200
      targetPort: http
      name: http
    - port: 9300
      targetPort: transport
      name: transport
  selector:
    app.kubernetes.io/name: ftgo-elasticsearch

---
# --- Fluentd ConfigMap -------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: ftgo-fluentd-config
  namespace: ftgo-dev
  labels:
    app.kubernetes.io/name: ftgo-fluentd
    app.kubernetes.io/part-of: ftgo-platform
    app.kubernetes.io/component: logging
data:
  fluent.conf: |
    <system>
      log_level info
    </system>

    # Kubernetes container logs
    <source>
      @type tail
      @id input_kubernetes_containers
      path /var/log/containers/ftgo-*.log
      pos_file /var/log/fluentd-containers.log.pos
      tag kubernetes.*
      read_from_head true
      <parse>
        @type json
        time_key @timestamp
        time_format %Y-%m-%dT%H:%M:%S.%N%z
        keep_time_key true
      </parse>
    </source>

    # Kubernetes metadata enrichment
    <filter kubernetes.**>
      @type kubernetes_metadata
      @id filter_kubernetes_metadata
    </filter>

    # Record transformation
    <filter **>
      @type record_transformer
      @id filter_ftgo_record
      enable_ruby true
      <record>
        service ${record["service"] || record.dig("kubernetes", "labels", "app.kubernetes.io/name") || "unknown"}
        level ${record["level"] ? record["level"].upcase : "INFO"}
        environment "#{ENV['FTGO_ENVIRONMENT'] || 'dev'}"
      </record>
    </filter>

    # Elasticsearch output
    <match **>
      @type elasticsearch
      @id output_elasticsearch
      host ftgo-elasticsearch
      port 9200
      scheme http
      logstash_format true
      logstash_prefix ftgo-logs
      logstash_dateformat %Y.%m.%d
      include_timestamp true
      reconnect_on_error true
      reload_on_failure true
      reload_connections false
      request_timeout 30s
      <buffer>
        @type file
        path /var/log/fluentd-buffers/ftgo-logs.buffer
        flush_mode interval
        flush_interval 5s
        flush_thread_count 2
        retry_type exponential_backoff
        retry_wait 1s
        retry_max_interval 60s
        retry_forever true
        chunk_limit_size 8M
        queue_limit_length 256
        overflow_action block
      </buffer>
    </match>

---
# --- Fluentd DaemonSet -------------------------------------------------------
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ftgo-fluentd
  namespace: ftgo-dev
  labels:
    app.kubernetes.io/name: ftgo-fluentd
    app.kubernetes.io/part-of: ftgo-platform
    app.kubernetes.io/component: logging
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ftgo-fluentd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ftgo-fluentd
        app.kubernetes.io/part-of: ftgo-platform
        app.kubernetes.io/component: logging
    spec:
      serviceAccountName: ftgo-fluentd
      tolerations:
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
      containers:
        - name: fluentd
          image: fluent/fluentd-kubernetes-daemonset:v1.16-debian-elasticsearch8-1
          env:
            - name: FLUENT_ELASTICSEARCH_HOST
              value: ftgo-elasticsearch
            - name: FLUENT_ELASTICSEARCH_PORT
              value: "9200"
            - name: FLUENT_ELASTICSEARCH_SCHEME
              value: http
            - name: FTGO_ENVIRONMENT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: containers
              mountPath: /var/log/containers
              readOnly: true
            - name: fluentd-config
              mountPath: /fluentd/etc
            - name: buffer
              mountPath: /var/log/fluentd-buffers
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: containers
          hostPath:
            path: /var/log/containers
        - name: fluentd-config
          configMap:
            name: ftgo-fluentd-config
        - name: buffer
          emptyDir: {}

---
# --- Fluentd ServiceAccount --------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ftgo-fluentd
  namespace: ftgo-dev
  labels:
    app.kubernetes.io/name: ftgo-fluentd
    app.kubernetes.io/part-of: ftgo-platform
    app.kubernetes.io/component: logging

---
# --- Fluentd ClusterRole -----------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ftgo-fluentd
  labels:
    app.kubernetes.io/name: ftgo-fluentd
    app.kubernetes.io/part-of: ftgo-platform
    app.kubernetes.io/component: logging
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]

---
# --- Fluentd ClusterRoleBinding ----------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ftgo-fluentd
  labels:
    app.kubernetes.io/name: ftgo-fluentd
    app.kubernetes.io/part-of: ftgo-platform
    app.kubernetes.io/component: logging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ftgo-fluentd
subjects:
  - kind: ServiceAccount
    name: ftgo-fluentd
    namespace: ftgo-dev

---
# --- Kibana Deployment -------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftgo-kibana
  namespace: ftgo-dev
  labels:
    app.kubernetes.io/name: ftgo-kibana
    app.kubernetes.io/part-of: ftgo-platform
    app.kubernetes.io/component: logging
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ftgo-kibana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ftgo-kibana
        app.kubernetes.io/part-of: ftgo-platform
        app.kubernetes.io/component: logging
    spec:
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.12.0
          ports:
            - containerPort: 5601
              name: http
          env:
            - name: ELASTICSEARCH_HOSTS
              value: http://ftgo-elasticsearch:9200
            - name: XPACK_SECURITY_ENABLED
              value: "false"
            - name: TELEMETRY_ENABLED
              value: "false"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10

---
# --- Kibana Service ----------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: ftgo-kibana
  namespace: ftgo-dev
  labels:
    app.kubernetes.io/name: ftgo-kibana
    app.kubernetes.io/part-of: ftgo-platform
    app.kubernetes.io/component: logging
spec:
  type: ClusterIP
  ports:
    - port: 5601
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: ftgo-kibana
