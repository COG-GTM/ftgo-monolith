spring.application.name=ftgo-order-service
server.port=8085

spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto=validate
logging.level.org.springframework.orm.jpa=INFO
logging.level.org.hibernate.SQL=DEBUG
spring.datasource.url=jdbc:mysql://${DOCKER_HOST_IP:localhost}/ftgo_order_service?useSSL=false&createDatabaseIfNotExist=true
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:mysqluser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mysqlpw}
spring.datasource.driver-class-name=com.mysql.jdbc.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/service-migration

# Service URLs for inter-service communication
ftgo.services.consumer.url=http://${CONSUMER_SERVICE_HOST:localhost}:8082
ftgo.services.restaurant.url=http://${RESTAURANT_SERVICE_HOST:localhost}:8083
ftgo.services.courier.url=http://${COURIER_SERVICE_HOST:localhost}:8084
