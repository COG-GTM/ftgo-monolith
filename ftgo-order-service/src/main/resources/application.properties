spring.application.name=ftgo-order-service
server.port=${SERVER_PORT:8084}

spring.jpa.generate-ddl=false
spring.datasource.url=jdbc:mysql://${DOCKER_HOST_IP:localhost}:3306/ftgo_order?useSSL=false
spring.datasource.username=${DB_USERNAME:mysqluser}
spring.datasource.password=${DB_PASSWORD:mysqlpw}
spring.datasource.driver-class-name=com.mysql.jdbc.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

consumer.service.url=${CONSUMER_SERVICE_URL:http://localhost:8081}
restaurant.service.url=${RESTAURANT_SERVICE_URL:http://localhost:8082}
courier.service.url=${COURIER_SERVICE_URL:http://localhost:8083}
