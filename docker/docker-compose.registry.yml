# =============================================================================
# FTGO Microservices - Local Development Docker Compose (Registry Images)
# =============================================================================
# Uses pre-built images from GitHub Container Registry for local development.
#
# Usage:
#   # Pull latest images and start all services:
#   docker compose -f docker/docker-compose.registry.yml up -d
#
#   # Start specific services:
#   docker compose -f docker/docker-compose.registry.yml up -d consumer-service order-service
#
#   # View logs:
#   docker compose -f docker/docker-compose.registry.yml logs -f order-service
#
#   # Stop all services:
#   docker compose -f docker/docker-compose.registry.yml down
#
# Prerequisites:
#   docker login ghcr.io -u <github-username> --password-stdin < <(echo <PAT>)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Infrastructure Services
  # ---------------------------------------------------------------------------
  mysql:
    build:
      context: ../mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: mysqluser
      MYSQL_PASSWORD: mysqlpw
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Microservices (from GHCR registry)
  # ---------------------------------------------------------------------------
  consumer-service:
    image: ghcr.io/cog-gtm/ftgo-consumer-service:latest
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ftgo
      SPRING_DATASOURCE_USERNAME: mysqluser
      SPRING_DATASOURCE_PASSWORD: mysqlpw
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      JAVA_OPTS: "-Xmx256m"
    restart: unless-stopped

  order-service:
    image: ghcr.io/cog-gtm/ftgo-order-service:latest
    ports:
      - "8082:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ftgo
      SPRING_DATASOURCE_USERNAME: mysqluser
      SPRING_DATASOURCE_PASSWORD: mysqlpw
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      JAVA_OPTS: "-Xmx256m"
    restart: unless-stopped

  restaurant-service:
    image: ghcr.io/cog-gtm/ftgo-restaurant-service:latest
    ports:
      - "8083:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ftgo
      SPRING_DATASOURCE_USERNAME: mysqluser
      SPRING_DATASOURCE_PASSWORD: mysqlpw
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      JAVA_OPTS: "-Xmx256m"
    restart: unless-stopped

  courier-service:
    image: ghcr.io/cog-gtm/ftgo-courier-service:latest
    ports:
      - "8084:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ftgo
      SPRING_DATASOURCE_USERNAME: mysqluser
      SPRING_DATASOURCE_PASSWORD: mysqlpw
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      JAVA_OPTS: "-Xmx256m"
    restart: unless-stopped

volumes:
  mysql-data:
    driver: local
