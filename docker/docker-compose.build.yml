# =============================================================================
# FTGO Microservices - Local Development Docker Compose (Local Build)
# =============================================================================
# Builds Docker images locally for development and testing.
#
# Usage:
#   # Build and start all services:
#   docker compose -f docker/docker-compose.build.yml up -d --build
#
#   # Rebuild a specific service:
#   docker compose -f docker/docker-compose.build.yml build order-service
#
#   # Stop all services:
#   docker compose -f docker/docker-compose.build.yml down
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Infrastructure Services
  # ---------------------------------------------------------------------------
  mysql:
    build:
      context: ../mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: mysqluser
      MYSQL_PASSWORD: mysqlpw
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Microservices (local build)
  # ---------------------------------------------------------------------------
  consumer-service:
    build:
      context: ..
      dockerfile: services/consumer-service/docker/Dockerfile
    image: ftgo-consumer-service:local
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ftgo
      SPRING_DATASOURCE_USERNAME: mysqluser
      SPRING_DATASOURCE_PASSWORD: mysqlpw
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      JAVA_OPTS: "-Xmx256m"
    restart: unless-stopped

  order-service:
    build:
      context: ..
      dockerfile: services/order-service/docker/Dockerfile
    image: ftgo-order-service:local
    ports:
      - "8082:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ftgo
      SPRING_DATASOURCE_USERNAME: mysqluser
      SPRING_DATASOURCE_PASSWORD: mysqlpw
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      JAVA_OPTS: "-Xmx256m"
    restart: unless-stopped

  restaurant-service:
    build:
      context: ..
      dockerfile: services/restaurant-service/docker/Dockerfile
    image: ftgo-restaurant-service:local
    ports:
      - "8083:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ftgo
      SPRING_DATASOURCE_USERNAME: mysqluser
      SPRING_DATASOURCE_PASSWORD: mysqlpw
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      JAVA_OPTS: "-Xmx256m"
    restart: unless-stopped

  courier-service:
    build:
      context: ..
      dockerfile: services/courier-service/docker/Dockerfile
    image: ftgo-courier-service:local
    ports:
      - "8084:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ftgo
      SPRING_DATASOURCE_USERNAME: mysqluser
      SPRING_DATASOURCE_PASSWORD: mysqlpw
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      JAVA_OPTS: "-Xmx256m"
    restart: unless-stopped

volumes:
  mysql-data:
    driver: local
