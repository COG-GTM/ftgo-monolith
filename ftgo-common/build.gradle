apply plugin: 'java-library'

dependencies {
    // TODO eliminate this - problem is value objects like Money need to be embeddable.
    // TODO https://en.wikibooks.org/wiki/Java_Persistence/Embeddables#Example_of_an_Embeddable_object_XML

    api "org.springframework.boot:spring-boot-starter-data-jpa:$springBootVersion"

    // Keep Jackson 2.9.7 for now to avoid breaking MoneyModule.java (would need code changes for 2.17.x)
    implementation group: 'com.fasterxml.jackson.core', name: 'jackson-core', version: '2.9.7'
    implementation group: 'com.fasterxml.jackson.core', name: 'jackson-databind', version: '2.9.7'
    implementation "com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.9.7"
    
    api group: 'commons-lang', name: 'commons-lang', version: '2.6'

    implementation 'com.mysql:mysql-connector-j:8.4.0'

    testImplementation "org.springframework.boot:spring-boot-starter-test:$springBootVersion"

    // Removed old javax JAXB and activation dependencies (CDDL/GPL license issues) - not needed with Java 21 and Spring Boot 3.x
}
